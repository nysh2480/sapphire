<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="sph-ext" content="media_studio">
  <meta name="sph-version" content="3.2">
  <title>MEDIA STUDIO EXT</title>
</head>
<body>

<!-- 
  MEDIA_STUDIO EXT v3.2
  [A] Action: Integrated UI & Production Workflow
  [C] Control: Orchestration between Audio, Video, and Timeline engines
-->

<script type="sph/meta" data-ext-id="media_studio">
{
  "cat": "A",
  "version": "3.2",
  "label": "MEDIA STUDIO",
  "icon": "🎬",
  "consumes": ["media_core", "audio_engine", "video_engine", "timeline_manager", "media_definition", "ui_mml"],
  "produces": ["project_bundle", "mml_source", "image_snapshot"],
  "signals": [
    "studio:ready",
    "studio:sync_complete",
    "studio:snapshot_taken",
    "studio:cleared"
  ],
  "permissions": ["dom", "file", "clipboard", "canvas"]
}
</script>

<script type="sph/doc" data-ext-id="media_studio">
{
  "title": "Media Studio v3.2 Reference",
  "description": "The central command center for AI-human co-creation. It manages MML injection, dynamic GUI generation, and real-time AV synchronization.",
  "api": [
    { "method": "media_studio.apply", "description": "Parses the editor content and syncs all engines." },
    { "method": "media_studio.snapshot", "description": "Captures the current preview frame as a PNG." },
    { "method": "media_studio.clear", "description": "Resets the editor and clears all engine states." },
    { "method": "media_studio.get_stats", "description": "Returns counts of waves, notes, and UI elements." }
  ],
  "workflow": "1. Paste MML -> 2. Click APPLY -> 3. Tweak via Dynamic GUI -> 4. Export or Save."
}
</script>

<script type="sph/sec" id="studio-main-ui">
<style>
  .studio-container { display: grid; grid-template-columns: 1fr 340px; grid-template-rows: 40px 1fr 240px; height: 100%; background: var(--sph-bg); color: var(--sph-text); }
  .studio-toolbar { grid-column: 1 / 3; display: flex; align-items: center; gap: 10px; padding: 0 15px; background: var(--sph-surface); border-bottom: 1px solid var(--sph-border); }
  .studio-editor-area { grid-column: 1; grid-row: 2; display: flex; flex-direction: column; border-right: 1px solid var(--sph-border); position: relative; }
  .studio-sidebar { grid-column: 2; grid-row: 2 / 4; display: flex; flex-direction: column; background: var(--sph-surface); overflow-y: auto; padding: 15px; gap: 15px; }
  .studio-preview-area { grid-column: 1; grid-row: 3; background: #000; position: relative; display: flex; align-items: center; justify-content: center; border-top: 1px solid var(--sph-border); }
  
  .studio-mml-input { flex: 1; width: 100%; background: var(--sph-bg); color: var(--sph-text); font-family: var(--sph-font); font-size: 11px; border: none; padding: 15px; resize: none; outline: none; line-height: 1.7; tab-size: 2; }
  .preview-canvas { max-width: 100%; max-height: 100%; aspect-ratio: 16/9; background: #050505; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
  
  .stats-overlay { position: absolute; top: 10px; right: 10px; display: flex; gap: 8px; pointer-events: none; }
  .stat-badge { font-size: 9px; background: var(--sph-surface); border: 1px solid var(--sph-border); padding: 2px 8px; border-radius: 4px; color: var(--sph-dim); }
  .stat-badge b { color: var(--sph-accent); }
</style>

<div class="studio-container">
  <!-- Toolbar -->
  <div class="studio-toolbar">
    <span class="sph-head" style="font-size:13px; font-weight:900;">◆ MEDIA STUDIO</span>
    <div style="width:1px; height:16px; background:var(--sph-border);"></div>
    <button class="sph-btn sph-btn-ok" onclick="sph.call('media_studio.play')">▶ PLAY</button>
    <button class="sph-btn" onclick="sph.call('media_studio.stop')">■ STOP</button>
    <div style="flex:1"></div>
    <button class="sph-btn" onclick="sph.call('media_studio.snapshot')" title="Capture Frame">📸</button>
    <button class="sph-btn" onclick="sph.call('media_studio.clear')" title="Reset All">CLR</button>
    <button class="sph-btn sph-btn-acc" onclick="sph.call('media_studio.export_html')">EXPORT PROJECT</button>
  </div>

  <!-- Editor Area -->
  <div class="studio-editor-area">
    <div class="sph-ph" style="padding:6px 15px; border-bottom: 1px solid var(--sph-border)55; background: var(--sph-surface);">
      <span class="sph-label">MML SOURCE EDITOR</span>
      <select id="studio-recipe-sel" class="sph-input" style="font-size:9px; padding:1px 5px;" onchange="sph.call('media_studio.load_recipe', [this.value])">
        <option value="">-- AI RECIPES --</option>
        <option value="lofi">Lo-Fi HipHop</option>
        <option value="techno">Acid Techno</option>
        <option value="ambient">Deep Ambient</option>
      </select>
    </div>
    <textarea id="studio-mml-editor" class="studio-mml-input" spellcheck="false" placeholder="Paste AI-generated MML here..."></textarea>
    
    <div class="stats-overlay">
      <div class="stat-badge">WAVES: <b id="stat-waves">0</b></div>
      <div class="stat-badge">NOTES: <b id="stat-notes">0</b></div>
    </div>

    <div style="padding:10px; border-top:1px solid var(--sph-border); display:flex; gap:10px; background: var(--sph-surface);">
      <button class="sph-btn sph-btn-acc" style="flex:1; height:32px;" onclick="sph.call('media_studio.apply')">APPLY & SYNC SYSTEM</button>
      <button class="sph-btn" style="height:32px;" onclick="sph.call('media_studio.copy_prompt')">📋 COPY AI PROMPT</button>
    </div>
  </div>

  <!-- Sidebar (Dynamic GUI) -->
  <div class="studio-sidebar">
    <div class="sph-label" style="border-bottom: 1px solid var(--sph-border); padding-bottom:5px;">DYNAMIC CONTROLS</div>
    <div id="studio-gui-mount" style="display:flex; flex-direction:column; gap:10px;">
      <div class="sph-meta" style="text-align:center; padding:60px 20px; border:1px dashed var(--sph-border); opacity:0.5;">
        Apply MML to generate<br>interactive controls
      </div>
    </div>
  </div>

  <!-- Preview Area -->
  <div class="studio-preview-area">
    <canvas id="studio-preview-canvas" class="preview-canvas" width="1280" height="720"></canvas>
    <div id="studio-time-display" style="position:absolute; top:15px; left:20px; font-family:var(--sph-font); font-size:18px; color:var(--sph-accent); text-shadow:0 0 8px #000; font-weight:bold; letter-spacing:1px;">01:01:000</div>
  </div>
</div>
</script>

<script type="sph/ext" data-ext-id="media_studio">
(function(){
  'use strict';

  // ── D: AI Recipes ──
  const RECIPES = {
    lofi: `@Config { bpm: 85 }\n@Wave piano { osc: [sine, triangle:0.2], adsr: [0.1, 0.2, 0.6, 0.4] }\n@UI ctrl { label: "Lo-Fi Tone", elements: [{type: slider, name: "Warmth", target: "waves.piano.filter.freq", min: 200, max: 2000}] }`,
    techno: `@Config { bpm: 135 }\n@Wave acid { osc: [sawtooth], adsr: [0.01, 0.1, 0.4, 0.1], filter: {type: lowpass, freq: 800, q: 15} }\n@UI ctrl { label: "Acid Control", elements: [{type: slider, name: "Resonance", target: "waves.acid.filter.q", min: 1, max: 30}] }`,
    ambient: `@Config { bpm: 60 }\n@Wave pad { osc: [sine], adsr: [2.0, 1.0, 0.8, 3.0] }\n@UI ctrl { label: "Space", elements: [{type: slider, name: "Drift", target: "waves.pad.detune", min: -50, max: 50}] }`
  };

  // ── B: Internal Logic ──
  const Studio = {
    refreshUI: async () => {
      const mount = document.getElementById('studio-gui-mount');
      if (!mount) return;
      const state = await sph.call('media_core.get_state');
      
      // Update Stats
      document.getElementById('stat-waves').textContent = Object.keys(state.waves || {}).length;
      document.getElementById('stat-notes').textContent = Object.keys(state.notes || {}).length;

      // Build Dynamic GUI
      const html = await sph.call('ui_mml.build', [state.ui || []]);
      if (html) mount.innerHTML = html;
    },
    updateClock: (data) => {
      const el = document.getElementById('studio-time-display');
      if (el) el.textContent = `${String(data.bar).padStart(2,'0')}:${String(data.beat).padStart(2,'0')}:${String(data.tick).padStart(3,'0')}`;
    }
  };

  // ── API: Action Layer ──
  sph.mount('media_studio', 'STUDIO', '🎬', {
    panel: () => document.getElementById('studio-main-ui').innerHTML,
    
    api: {
      apply: async () => {
        const editor = document.getElementById('studio-mml-editor');
        if (!editor) return;
        const src = editor.value;
        
        await sph.call('media_core.apply_mml', [src]);
        await Studio.refreshUI();
        await sph.call('video_engine.attach', ['studio-preview-canvas']);
        
        sph.call('ide.log', ['[STUDIO] System Synced Successfully.']);
        sph.emit('studio:sync_complete');
      },

      play: () => {
        sph.call('timeline_manager.play');
        sph.emit('studio:preview_start');
      },

      stop: () => {
        sph.call('timeline_manager.stop');
        sph.emit('studio:preview_stop');
      },

      snapshot: () => {
        const canvas = document.getElementById('studio-preview-canvas');
        if (!canvas) return;
        const data = canvas.toDataURL('image/png');
        const link = document.createElement('a');
        link.download = `studio_snapshot_${Date.now()}.png`;
        link.href = data;
        link.click();
        sph.emit('studio:snapshot_taken');
      },

      clear: () => {
        if (!confirm("Clear all project data?")) return;
        const editor = document.getElementById('studio-mml-editor');
        if (editor) editor.value = "";
        sph.call('media_core.apply_mml', [""]);
        Studio.refreshUI();
        sph.emit('studio:cleared');
      },

      load_recipe: (id) => {
        const editor = document.getElementById('studio-mml-editor');
        if (editor && RECIPES[id]) {
          editor.value = RECIPES[id];
          sph.call('media_studio.apply');
        }
      },

      copy_prompt: () => {
        const defPrompt = sph.call('media_definition.get_system_prompt');
        const uiPrompt = sph.call('ui_mml.get_prompt');
        const fullPrompt = `[SYSTEM INSTRUCTION]\n${defPrompt}\n\n[UI_MML SPEC]\n${uiPrompt}\n\n[TASK]\nCreate a creative MEDIA_MML project including @Wave, @Note, and @UI blocks.`;
        navigator.clipboard.writeText(fullPrompt);
        sph.call('ide.log', ['[STUDIO] Master AI Prompt copied to clipboard.']);
      },

      get_stats: async () => {
        const state = await sph.call('media_core.get_state');
        return {
          waves: Object.keys(state.waves || {}).length,
          notes: Object.keys(state.notes || {}).length,
          ui_blocks: (state.ui || []).length
        };
      }
    },

    on: {
      'ide-ready': () => {
        sph.call('abcd.register', ['media_studio', 'A']);
      },
      'frame-mounted': ({id}) => {
        if (id === 'media_studio') {
          setTimeout(() => {
            Studio.refreshUI();
            sph.call('video_engine.attach', ['studio-preview-canvas']);
          }, 50);
        }
      },
      'timeline:tick': (data) => Studio.updateClock(data),
      'mml:updated': () => {
        const editor = document.getElementById('studio-mml-editor');
        if (editor && !editor.matches(':focus')) {
          editor.value = sph.call('media_core.generate_mml');
          Studio.refreshUI();
        }
      }
    }
  });
})();
</script>

<!-- 
  STUDIO_LIB (DSL Library)
  High-level automation for the Media Studio.
-->
<script type="sph/lib" data-tab-name="studio_lib">
; lib studio_lib
; High-level orchestration for the Media Studio environment.

; --- Initialize studio with a specific MML string ---
!studio.init [$_mml]
  sys.print "[STUDIO] Initializing project..."
  $editor = sys.dom.get_val "studio-mml-editor"
  sys.dom.set_val "studio-mml-editor" $_mml
  media_studio.apply
  RET 1

; --- Quick Playback Helper ---
!studio.quick_play
  media_studio.apply
  media_studio.play
  RET 1

; --- Take a snapshot after a delay ---
!studio.delayed_snapshot [#_ms]
  sys.wait #_ms
  media_studio.snapshot
  RET 1
</script>

</body>
</html>
