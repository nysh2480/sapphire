<!DOCTYPE html>
<html lang="ja">
<head><meta charset="UTF-8"><title>MONITOR EXT</title></head>
<body>
<script type="sph/meta" data-ext-id="monitor">
{
	"cat": "A",
	"version": "1.0",
	"label": "MONITOR",
	"icon": "📺",
	"consumes": ["bridge", "timeline"],
	"produces": ["ui_event"]
}
</script>
<script type="sph/ext" data-ext-id="monitor">
(function(){
'use strict';

var _canvas = null;
var _ctx = null;
var _sabView = null; // Uint8ClampedArray for SAB
var _config = { w: 1920, h: 1080 };

// 描画ループ（B層の書き込みとは独立してブラウザのVSYNCに同期）
function _draw() {
	if (!_sabView || !_ctx) return;
	
	// SABのメモリを直接ImageDataとして解釈し、Canvasへ転送
	// コピーコストを最小化するため Uint8ClampedArray を使用
	var imgData = new ImageData(_sabView, _config.w, _config.h);
	_ctx.putImageData(imgData, 0, 0);
	
	requestAnimationFrame(_draw);
}

sph.mount('monitor', 'MONITOR', '📺', {
	render: function() {
		return '<div style="width:100%; height:100%; background:#000; display:flex; align-items:center; justify-content:center;">' +
					'<canvas id="v-mon" width="' + _config.w + '" height="' + _config.h + '" style="max-width:100%; max-height:100%; object-fit:contain;"></canvas>' +
				'</div>';
	},
	on: {
		'ide-ready': function() {
			_canvas = document.getElementById('v-mon');
			_ctx = _canvas.getContext('2d', { alpha: false });
			
			// BRIDGEから共有メモリ(SAB)の参照を取得
			var sab = sph.call('bridge.getBuffer', 'video_main');
			if (sab) {
				_sabView = new Uint8ClampedArray(sab);
				_draw();
			} else {
				sph.call('ide.log', ['[MONITOR] ERR: Failed to attach SAB']);
			}
		}
	}
});
})();
</script>
</body>
</html>
