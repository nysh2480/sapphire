<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="sph-ext" content="network">
<meta name="sph-ext-version" content="1.2.2">
<title>NETWORK EXT - P2P DataChannel</title>
</head>
<body>

<!-- ==========================================
     A: CORE API & LOGIC (sph/ext)
     ========================================== -->
<script type="sph/ext" data-ext-id="network">
(function(){
'use strict';

let _pc = null;
let _dc = null;
let _config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

const _log = (msg, isErr = false) => {
  const prefix = isErr ? '❌ [net-err]' : '[net]';
  sph.call('ide.log', [`${prefix} ${msg}`]);
  const errEl = document.getElementById('net-ui-error');
  if (errEl) {
    errEl.textContent = isErr ? msg : '';
    errEl.style.display = isErr ? 'block' : 'none';
  }
};

function _setupDataChannel(channel) {
  _dc = channel;
  _dc.onopen = () => { _log('✅ Opened'); _updateUI(); sph.emit('network:connected', {state:'open'}); };
  _dc.onclose = () => {
    _log('⚠️ Closed');
    _updateUI();
    sph.emit('network:disconnected', {});
    if (sph.get('network.autoReconnect') === true) {
      _log('🔄 Auto-reconnect → generating new Offer');
      setTimeout(() => api.createOffer(), 1200);
    }
  };
  _dc.onmessage = e => {
    const data = e.data instanceof ArrayBuffer ? new Uint8Array(e.data) : e.data;
    sph.emit('network:message', { data, isBinary: e.data instanceof ArrayBuffer });
    _appendMsg('Peer', data);
  };
  _dc.onerror = e => _log('DC Error: ' + (e.message || e), true);
}

const api = {
  createOffer: async () => {
    try {
      if (_pc) _pc.close();
      _pc = new RTCPeerConnection(_config);
      _setupDataChannel(_pc.createDataChannel('sph-data'));
      _pc.onicecandidate = e => { 
        if (!e.candidate && _pc.localDescription) {
          const el = document.getElementById('net-sdp-out');
          if (el) el.value = JSON.stringify(_pc.localDescription);
          _log('Offer SDP ready');
        }
      };
      const offer = await _pc.createOffer();
      await _pc.setLocalDescription(offer);
      return offer;
    } catch (e) { _log(e.message, true); }
  },

  receiveOffer: async (sdpStr) => {
    if (!sdpStr) return _log('Input SDP is empty', true);
    try {
      const offer = JSON.parse(sdpStr);
      if (_pc) _pc.close();
      _pc = new RTCPeerConnection(_config);
      _pc.ondatachannel = e => _setupDataChannel(e.channel);
      _pc.onicecandidate = e => { 
        if (!e.candidate && _pc.localDescription) {
          const el = document.getElementById('net-sdp-out');
          if (el) el.value = JSON.stringify(_pc.localDescription);
        }
      };
      await _pc.setRemoteDescription(offer);
      const answer = await _pc.createAnswer();
      await _pc.setLocalDescription(answer);
      return answer;
    } catch (e) { _log('Invalid Offer SDP', true); }
  },

  finalize: async (sdpStr) => {
    if (!sdpStr) return _log('Input SDP is empty', true);
    try {
      await _pc.setRemoteDescription(JSON.parse(sdpStr));
      _log('✅ Connection Finalized');
    } catch (e) { _log('Invalid Answer SDP', true); }
  },

  send: (data) => {
    if (!_dc || _dc.readyState !== 'open') return false;
    try {
      if (data instanceof ArrayBuffer || data instanceof Uint8Array) {
        _dc.send(data);
        _appendMsg('Me', `[Binary ${data.byteLength} bytes]`);
      } else {
        const p = typeof data === 'string' ? data : JSON.stringify(data);
        _dc.send(p);
        _appendMsg('Me', p);
      }
      return true;
    } catch (e) { _log('Send failed: ' + e.message, true); return false; }
  },

  close: () => { if (_pc) _pc.close(); _pc = _dc = null; _updateUI(); _log('Connection closed'); },

  setIceConfig: (url, user, cred, auto) => {
    let servers = [{ urls: 'stun:stun.l.google.com:19302' }];
    if (url) {
      const turn = { urls: url };
      if (user) turn.username = user;
      if (cred) turn.credential = cred;
      servers.push(turn);
    }
    _config.iceServers = servers;
    sph.register('network.autoReconnect', !!auto);
    _log('ICE + Auto-reconnect updated');
    if (_pc) api.close();
  }
};

function _updateUI() {
  const el = document.getElementById('net-status');
  if (el) {
    const state = _dc ? _dc.readyState : 'disconnected';
    el.textContent = state.toUpperCase();
    el.style.color = state === 'open' ? 'var(--sph-ok)' : 'var(--sph-err)';
  }
}

function _appendMsg(who, data) {
  const logEl = document.getElementById('net-msg-log');
  if (!logEl) return;
  const div = document.createElement('div');
  div.className = 'sph-meta';
  div.style.fontSize = '10px';
  div.style.borderBottom = '1px solid var(--sph-border)';
  let display = (data instanceof Uint8Array) ? `Binary[${data.length}] {${Array.from(data.slice(0,4)).join(',')}}` : data;
  div.innerHTML = `<b>${who}:</b> ${String(display).replace(/</g,'&lt;')}`;
  logEl.prepend(div);
}

sph.mount('network', 'NETWORK', '🌐', {
  panel: () => sph.ui.panel('network',
    '<div id="net-ui-error" style="display:none;background:var(--sph-err);color:#fff;padding:4px;font-size:10px;margin-bottom:8px"></div>' +
    sph.ui.section('1. Configuration',
      sph.ui.row('TURN URL', sph.ui.input('net-ice-url', {placeholder:'turn:example.com'})) +
      sph.ui.row('User', sph.ui.input('net-ice-user')) +
      sph.ui.row('Pass', sph.ui.input('net-ice-cred', {type:'password'})) +
      '<label class="sph-meta" style="display:flex;align-items:center;gap:4px;margin-top:4px"><input type="checkbox" id="net-ice-auto"> Auto-reconnect on close</label>' +
      '<button class="sph-btn" style="width:100%;margin-top:8px" onclick="sph.call(\'network.setIceConfig\',[document.getElementById(\'net-ice-url\').value, document.getElementById(\'net-ice-user\').value, document.getElementById(\'net-ice-cred\').value, document.getElementById(\'net-ice-auto\').checked])">Apply Settings</button>'
    ) +
    sph.ui.section('2. Connection (SDP)',
      '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="sph-meta">Status: <b id="net-status">DISCONNECTED</b></span><button class="sph-btn" onclick="sph.call(\'network.close\')">Reset</button></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px"><button class="sph-btn sph-btn-ok" onclick="sph.call(\'network.createOffer\')">Create Offer</button><button class="sph-btn" onclick="sph.call(\'network.receiveOffer\',[document.getElementById(\'net-sdp-in\').value])">Accept Offer</button></div>' +
      '<textarea id="net-sdp-in" class="sph-input" placeholder="Paste Remote SDP here..." style="width:100%;height:40px;font-size:9px;margin-bottom:4px"></textarea>' +
      '<button class="sph-btn" style="width:100%;margin-bottom:8px" onclick="sph.call(\'network.finalize\',[document.getElementById(\'net-sdp-in\').value])">Finalize (Host Only)</button>' +
      '<textarea id="net-sdp-out" class="sph-input" readonly style="width:100%;height:40px;font-size:9px;background:rgba(0,0,0,0.1)" placeholder="Your SDP will appear here"></textarea>'
    ) +
    sph.ui.section('3. Data Transfer',
      '<div style="display:flex;gap:4px;margin-bottom:8px"><input id="net-send-in" class="sph-input" style="flex:1" placeholder="Message..." onkeydown="if(event.key===\'Enter\')sph.call(\'network.send\',[this.value])"><button class="sph-btn sph-btn-ok" onclick="sph.call(\'network.send\',[document.getElementById(\'net-send-in\').value])">Send</button></div>' +
      '<div id="net-msg-log" style="height:80px;overflow-y:auto;border:1px solid var(--sph-border);padding:4px;background:rgba(0,0,0,0.05);font-family:monospace"></div>'
    )
  ),
  api: api,
  on: { 'frame-mounted': () => _updateUI() }
});

sph.register('network.describe', () => ({
  cat: 'B',
  version: '1.2.2',
  consumes: ['bridge'],
  produces: ['p2p'],
  signals: ['network:connected', 'network:message', 'network:disconnected']
}));

})();
</script>

<!-- ==========================================
     B: BRIDGE LIBRARY (sph/lib)
     ========================================== -->
<script type="sph/lib" data-lib-id="network">
/**
 * Network Library Proxy v1.2.2
 */
export default {
  send: (data) => sph.call('network.send', [data]),
  close: () => sph.call('network.close'),
  setIceConfig: (url, user, pass, auto) => sph.call('network.setIceConfig', [url, user, pass, auto]),
  onMessage: (cb) => sph.on('network:message', cb),
  onConnected: (cb) => sph.on('network:connected', cb),
  onDisconnected: (cb) => sph.on('network:disconnected', cb)
};
</script>

<!-- ==========================================
     D: DOCUMENTATION (sph/doc & sph/sec)
     ========================================== -->
<script type="sph/doc" data-doc-ext="network">
{
  "title": "NETWORK - P2P DataChannel",
  "icon": "🌐",
  "description": "Serverless P2P communication with TURN support, binary sync, and auto-reconnect.",
  "version": "1.2.2",
  "api": [
    { "method": "network.createOffer", "args": "", "description": "Start connection as Host." },
    { "method": "network.receiveOffer", "args": "sdp", "description": "Accept offer and create Answer." },
    { "method": "network.finalize", "args": "sdp", "description": "Host completes connection." },
    { "method": "network.send", "args": "data", "description": "Send string or Uint8Array." }
  ]
}
</script>

<script type="sph/sec" data-sec-ext="network" data-sec-title="NETWORK GUIDE">
<div class="sph-doc">
  <h2>🌐 P2P Network Extension</h2>
  <p>Direct browser-to-browser communication using WebRTC DataChannel.</p>

  <h3>Features</h3>
  <ul>
    <li><strong>Binary Support:</strong> Send <code>Uint8Array</code> for high-speed sync.</li>
    <li><strong>TURN Support:</strong> Connect across different networks via TURN servers.</li>
    <li><strong>Auto-Reconnect:</strong> Automatically resets to "Offer" state on disconnection if enabled.</li>
  </ul>

  <h3>How to Connect</h3>
  <ol>
    <li><strong>Host:</strong> Click "Create Offer". Copy the SDP.</li>
    <li><strong>Peer:</strong> Paste Host's SDP, click "Accept Offer". Copy your Answer SDP.</li>
    <li><strong>Host:</strong> Paste Peer's Answer SDP, click "Finalize".</li>
  </ol>

  <h3>JS Example</h3>
  <pre><code>const net = sph.lib('network');
net.onMessage(({data}) => console.log("Received:", data));
net.send("Hello Peer!");</code></pre>
</div>
</script>

</body>
</html>
