
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="sph-ext" content="network">
<meta name="sph-ext-version" content="1.3.0">
<title>NETWORK EXT - Signaling Support</title>
</head>
<body>

<!-- ==========================================
     A: CORE API & LOGIC (sph/ext)
     ========================================== -->
<script type="sph/ext" data-ext-id="network">
(function(){
'use strict';

let _pc = null;
let _dc = null;
let _ws = null;
let _config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

const _log = (msg, isErr = false) => {
  const prefix = isErr ? '❌ [net-err]' : '[net]';
  sph.call('ide.log', [`${prefix} ${msg}`]);
  const errEl = document.getElementById('net-ui-error');
  if (errEl) {
    errEl.textContent = isErr ? msg : '';
    errEl.style.display = isErr ? 'block' : 'none';
  }
};

function _setupDataChannel(channel) {
  _dc = channel;
  _dc.onopen = () => { _log('✅ P2P Connected'); _updateUI(); sph.emit('network:connected', {state:'open'}); };
  _dc.onclose = () => {
    _log('⚠️ P2P Closed');
    _updateUI();
    sph.emit('network:disconnected', {});
    if (sph.get('network.autoReconnect') === true) {
      _log('🔄 Auto-reconnect enabled');
      setTimeout(() => api.createOffer(), 1500);
    }
  };
  _dc.onmessage = e => {
    const data = e.data instanceof ArrayBuffer ? new Uint8Array(e.data) : e.data;
    sph.emit('network:message', { data, isBinary: e.data instanceof ArrayBuffer });
    _appendMsg('Peer', data);
  };
}

// --- Signaling Logic ---
const _connectSignaling = (url, roomId) => {
  if (_ws) _ws.close();
  _ws = new WebSocket(url);
  _ws.onopen = () => {
    _log(`📡 Signaling connected. Joining room: ${roomId}`);
    _ws.send(JSON.stringify({ type: 'join', roomId }));
  };
  _ws.onmessage = async (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'offer') {
      const answer = await api.receiveOffer(JSON.stringify(msg.sdp));
      _ws.send(JSON.stringify({ type: 'answer', roomId, sdp: JSON.parse(answer) }));
    } else if (msg.type === 'answer') {
      await api.finalize(JSON.stringify(msg.sdp));
    } else if (msg.type === 'candidate') {
      if (_pc) _pc.addIceCandidate(new RTCIceCandidate(msg.candidate)).catch(e => {});
    } else if (msg.type === 'user-joined') {
      // 後から誰か来たらOfferを送る
      const offer = await api.createOffer();
      _ws.send(JSON.stringify({ type: 'offer', roomId, sdp: JSON.parse(offer) }));
    }
  };
  _ws.onerror = () => _log('Signaling Server Error', true);
};

const api = {
  createOffer: async () => {
    try {
      if (_pc) _pc.close();
      _pc = new RTCPeerConnection(_config);
      _setupDataChannel(_pc.createDataChannel('sph-data'));
      _pc.onicecandidate = e => {
        if (e.candidate && _ws && _ws.readyState === 1) {
          _ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }));
        }
        if (!e.candidate && _pc.localDescription) {
          const el = document.getElementById('net-sdp-out');
          if (el) el.value = JSON.stringify(_pc.localDescription);
          _log('Offer SDP ready');
        }
      };
      const offer = await _pc.createOffer();
      await _pc.setLocalDescription(offer);
      return JSON.stringify(offer);
    } catch (e) { _log(e.message, true); }
  },

  receiveOffer: async (sdpStr) => {
    try {
      const offer = JSON.parse(sdpStr);
      if (_pc) _pc.close();
      _pc = new RTCPeerConnection(_config);
      _pc.ondatachannel = e => _setupDataChannel(e.channel);
      _pc.onicecandidate = e => {
        if (e.candidate && _ws && _ws.readyState === 1) {
          _ws.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }));
        }
        if (!e.candidate && _pc.localDescription) {
          const el = document.getElementById('net-sdp-out');
          if (el) el.value = JSON.stringify(_pc.localDescription);
        }
      };
      await _pc.setRemoteDescription(offer);
      const answer = await _pc.createAnswer();
      await _pc.setLocalDescription(answer);
      return JSON.stringify(answer);
    } catch (e) { _log('Invalid Offer SDP', true); }
  },

  finalize: async (sdpStr) => {
    try {
      await _pc.setRemoteDescription(JSON.parse(sdpStr));
      _log('✅ Connection Finalized');
    } catch (e) { _log('Invalid Answer SDP', true); }
  },

  joinRoom: (roomId, url = 'wss://your-signaling-server.com') => {
    _connectSignaling(url, roomId);
  },

  send: (data) => {
    if (!_dc || _dc.readyState !== 'open') return false;
    if (data instanceof ArrayBuffer || data instanceof Uint8Array) {
      _dc.send(data);
      _appendMsg('Me', `[Binary ${data.byteLength} bytes]`);
    } else {
      const p = typeof data === 'string' ? data : JSON.stringify(data);
      _dc.send(p);
      _appendMsg('Me', p);
    }
    return true;
  },

  close: () => { 
    if (_pc) _pc.close(); 
    if (_ws) _ws.close();
    _pc = _dc = _ws = null; 
    _updateUI(); 
    _log('Connection closed'); 
  },

  setIceConfig: (url, user, cred, auto) => {
    let servers = [{ urls: 'stun:stun.l.google.com:19302' }];
    if (url) servers.push({ urls: url, username: user, credential: cred });
    _config.iceServers = servers;
    sph.register('network.autoReconnect', !!auto);
    _log('Config updated');
  }
};

function _updateUI() {
  const el = document.getElementById('net-status');
  if (el) {
    const state = _dc ? _dc.readyState : 'disconnected';
    el.textContent = state.toUpperCase();
    el.style.color = state === 'open' ? 'var(--sph-ok)' : 'var(--sph-err)';
  }
}

function _appendMsg(who, data) {
  const logEl = document.getElementById('net-msg-log');
  if (!logEl) return;
  const div = document.createElement('div');
  div.className = 'sph-meta';
  div.style.fontSize = '10px';
  div.style.borderBottom = '1px solid var(--sph-border)';
  let display = (data instanceof Uint8Array) ? `Binary[${data.length}]` : data;
  div.innerHTML = `<b>${who}:</b> ${String(display).replace(/</g,'&lt;')}`;
  logEl.prepend(div);
}

sph.mount('network', 'NETWORK', '🌐', {
  panel: () => sph.ui.panel('network',
    '<div id="net-ui-error" style="display:none;background:var(--sph-err);color:#fff;padding:4px;font-size:10px;margin-bottom:8px"></div>' +
    sph.ui.section('Auto-Connect (Signaling)',
      sph.ui.row('Room ID', sph.ui.input('net-room-id')) +
      sph.ui.row('Server', sph.ui.input('net-sig-url', {value:'wss://your-signaling-server.com'})) +
      '<button class="sph-btn sph-btn-ok" style="width:100%;margin-top:8px" onclick="sph.call(\'network.joinRoom\',[document.getElementById(\'net-room-id\').value, document.getElementById(\'net-sig-url\').value])">Join Room</button>'
    ) +
    sph.ui.section('Manual Connection (SDP)',
      '<div style="display:flex;justify-content:space-between;margin-bottom:8px"><span class="sph-meta">Status: <b id="net-status">DISCONNECTED</b></span><button class="sph-btn" onclick="sph.call(\'network.close\')">Reset</button></div>' +
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:8px"><button class="sph-btn" onclick="sph.call(\'network.createOffer\')">Create Offer</button><button class="sph-btn" onclick="sph.call(\'network.receiveOffer\',[document.getElementById(\'net-sdp-in\').value])">Accept Offer</button></div>' +
      '<textarea id="net-sdp-in" class="sph-input" placeholder="Paste Remote SDP here..." style="width:100%;height:40px;font-size:9px;margin-bottom:4px"></textarea>' +
      '<button class="sph-btn" style="width:100%;margin-bottom:8px" onclick="sph.call(\'network.finalize\',[document.getElementById(\'net-sdp-in\').value])">Finalize (Host Only)</button>' +
      '<textarea id="net-sdp-out" class="sph-input" readonly style="width:100%;height:40px;font-size:9px;background:rgba(0,0,0,0.1)" placeholder="Your SDP"></textarea>'
    ) +
    sph.ui.section('Data Transfer',
      '<div style="display:flex;gap:4px;margin-bottom:8px"><input id="net-send-in" class="sph-input" style="flex:1" placeholder="Message..."><button class="sph-btn sph-btn-ok" onclick="sph.call(\'network.send\',[document.getElementById(\'net-send-in\').value])">Send</button></div>' +
      '<div id="net-msg-log" style="height:80px;overflow-y:auto;border:1px solid var(--sph-border);padding:4px;background:rgba(0,0,0,0.05);font-family:monospace"></div>'
    )
  ),
  api: api,
  on: { 'frame-mounted': () => _updateUI() }
});

sph.register('network.describe', () => ({
  cat: 'B', version: '1.3.0',
  consumes: ['bridge'], produces: ['p2p'],
  signals: ['network:connected', 'network:message', 'network:disconnected']
}));

})();
</script>

<!-- ==========================================
     B: BRIDGE LIBRARY (sph/lib)
     ========================================== -->
<script type="sph/lib" data-lib-id="network">
export default {
  joinRoom: (roomId, url) => sph.call('network.joinRoom', [roomId, url]),
  send: (data) => sph.call('network.send', [data]),
  close: () => sph.call('network.close'),
  onMessage: (cb) => sph.on('network:message', cb),
  onConnected: (cb) => sph.on('network:connected', cb)
};
</script>

<!-- ==========================================
     D: DOCUMENTATION (sph/doc)
     ========================================== -->
<script type="sph/doc" data-doc-ext="network">
{
  "title": "NETWORK v1.3 - Signaling Ready",
  "icon": "🌐",
  "description": "P2P communication with WebSocket signaling for easy room-based connections.",
  "version": "1.3.0",
  "api": [
    { "method": "network.joinRoom", "args": "roomId, serverUrl?", "description": "Join a room and connect to peers automatically." },
    { "method": "network.send", "args": "data", "description": "Send string or Uint8Array." },
    { "method": "network.close", "args": "", "description": "Disconnect everything." }
  ]
}
</script>

</body>
</html>
