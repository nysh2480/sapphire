<script>
// ── SAB/crossOriginIsolated via inline ServiceWorker ─────────────
// COOP + COEP ヘッダをServiceWorkerで注入することでfile://でもSABが使用可能になる
// 参考: https://github.com/nicolo-ribaudo/tc39-proposal-coi-without-headers
(function(){
  const SW_SRC = `
self.addEventListener('install',e=>{e.waitUntil(self.skipWaiting());});
self.addEventListener('activate',e=>{e.waitUntil(self.clients.claim());});
self.addEventListener('fetch',e=>{
  if(e.request.cache==='only-if-cached'&&e.request.mode!=='same-origin')return;
  e.respondWith(fetch(e.request).then(r=>{
    if(!r||r.status!==200||r.type!=='basic')return r;
    const h=new Headers(r.headers);
    h.set('Cross-Origin-Opener-Policy','same-origin');
    h.set('Cross-Origin-Embedder-Policy','require-corp');
    return new Response(r.body,{status:r.status,statusText:r.statusText,headers:h});
  }).catch(()=>fetch(e.request)));
});`;
  if(!window.crossOriginIsolated && 'serviceWorker' in navigator){
    const blob=new Blob([SW_SRC],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    navigator.serviceWorker.register(url,{scope:'./'}).then(()=>{
      if(!window.crossOriginIsolated){
        // 初回登録時はリロードが必要
        console.log('[SAB] ServiceWorker registered, reloading for crossOriginIsolated...');
        location.reload();
      }
    }).catch(e=>console.warn('[SAB] SW registration failed:',e.message));
  } else if(window.crossOriginIsolated){
    console.log('[SAB] crossOriginIsolated: active');
  }
})();
</script>

/* ── ide.frame: S/V/H pane model ──────────────────────────────
   body[data-frame]  = "S"|"V"|"H"   structural split

/* ── frame-a / frame-b: ratio-based split ──────────────────────────────
   --sph-a-ratio  0.0?1.0  frame-a の割合 (default 0.65)
   frame-a = flex: var(--sph-a-ratio)  →  残りを frame-b が取る
   frame-b = flex: calc(1 - var(--sph-a-ratio))
   ------------------------------------------------------------------- */
:root{--sph-a-ratio:0.65}

         display:flex;flex-direction:column;overflow:hidden;position:relative}

         display:none;flex-direction:column;
         background:var(--sph-bg);overflow:hidden;
         border-top:1px solid var(--sph-border)}

body[data-frame="H"] #frame-resize{cursor:col-resize;width:5px;height:auto;border-top:none;border-left:1px solid var(--sph-border)}
body[data-frame="V"] #frame-resize{cursor:row-resize;height:5px;width:auto;border-left:none;border-top:1px solid var(--sph-border)}

body[data-frame-b^="ext"] #frame-b-ext{display:flex;overflow-y:auto}

<!-- ??? sph-core: Compiler + Runtime + Registry [v16] ??? -->
<!-- v16 追加: SAFE_MATH / SAFE_EXPR / _safeEval / _evalCache (セキュア数式評価)
               ALLOWED_EXT + sph.ext.allow/isAllowed (EXTホワイトリスト)
               ext.math.exec (_registerSys内で登録)
               sph._extCall (ホワイトリスト検証付きEXT呼び出し)
               _inferType / _checkType / W-TYPE (静的型チェック警告)
               W-EXT (ブロックされたEXT呼び出し警告)
               qlit (Literal Array — createMem/_build/sandbox/DSL_GLOBALS_ALLOW) -->
<script id="sph-core">

(function(){
'use strict';
const _reg=new Map();
function register(name,fn){_reg.set(name,fn);}  // fn | value both OK ? sph.call normalizes
async function call(name,args=[]){
  const v=_reg.get(name);
  if(v===undefined){
    const e={code:'E010',args:[name],severity:'warn',phase:'sph.call'};
    emit('warn',e);return null;
  }
  if(typeof v!=='function')return v;
  try{
    const r=v(...args);return r instanceof Promise?await r:r;
  }catch(e){
    if(e?.message==='STOP')throw e;
    const ev={code:'E011',args:[name,e?.message??String(e)],severity:'error',phase:'sph.call'};
    emit('error',ev);return null;
  }
}
function emit(name,detail={}){
  document.dispatchEvent(new CustomEvent('sph:'+name,{detail}));
}
// ── [v16] セキュア数式評価 ───────────────────────────────────────────────
// ext.math.exec / sys.f の安全な実行に使用
// グローバルアクセスを遮断し SAFE_MATH 関数のみ注入
const SAFE_EXPR=/^[0-9+\-*/%().,<>!=&|#%$ _a-zA-Z\[\]'"`]+$/;
const SAFE_MATH=Object.freeze({
  sin:Math.sin,cos:Math.cos,tan:Math.tan,atan2:Math.atan2,
  sqrt:Math.sqrt,pow:Math.pow,abs:Math.abs,sign:Math.sign,
  min:Math.min,max:Math.max,floor:Math.floor,ceil:Math.ceil,
  round:Math.round,trunc:Math.trunc,log:Math.log,log2:Math.log2,
  exp:Math.exp,hypot:Math.hypot,PI:Math.PI,E:Math.E,
});
const _evalCache=new Map();
function _safeEval(expr,vars){
  if(!SAFE_EXPR.test(expr)||/[=;{}]/.test(expr))return NaN;
  // 括弧カウント検証
  let depth=0;
  for(const c of expr){if(c==='(')depth++;else if(c===')'){depth--;if(depth<0)return NaN;}}
  if(depth!==0)return NaN;
  try{
    let fn=_evalCache.get(expr);
    if(!fn){
      const body=expr.replace(/([#%$][a-zA-Z_]\w*)/g,m=>`vars["${m}"]`);
      fn=new Function('Math','vars',`"use strict";return(${body});`);
      if(_evalCache.size>500)_evalCache.clear();
      _evalCache.set(expr,fn);
    }
    const result=fn(SAFE_MATH,vars??{});
    if(typeof result==='number'&&!Number.isFinite(result))return NaN;
    return result;
  }catch(_){return NaN;}
}
// ── [v16] EXT ホワイトリスト ────────────────────────────────────────────
// DSLからのEXT呼び出しを制限する。sph.ext.allow(name)で追加可能。
const ALLOWED_EXT=new Set([
  'ext.math.exec',
]);
function createMem(o={}){
  // str上限: o.str > sph.register("sph.mem.strCap") > 1000 の優先順
  const strMax=o.str??(_reg.get('sph.mem.strCap')??1000);
  const strArr=[];
  // str配列をProxyでラップして上限を強制 + 未初期化は '' を返す (3-3)
  const strProxy=new Proxy(strArr,{
    get(t,k){
      if(typeof k==='string'&&!isNaN(k))return t[k]??'';
      return typeof t[k]==='function'?t[k].bind(t):t[k];
    },
    set(t,k,v){
      if(typeof k==='string'&&!isNaN(k)&&Number(k)>=strMax){
        emit('warn',{code:'W008',args:[Number(k),strMax],severity:'warn',phase:'runtime'});
        return true; // 無言で捨てる（暴走しない）
      }
      t[k]=v;return true;
    }
  });
  // q_slot: フリーリスト方式でスロットを再利用 (2.6)
  const q_slot={
    '#':{cur:0,free:[]},
    '%':{cur:0,free:[]},
    '$':{cur:0,free:[]},
    '~':{cur:0,free:[]},
  };
  return{
    i32:new Int32Array(((o.i32||16)*1024/4)|0),
    f64:new Float64Array(((o.f64||16)*1024/8)|0),
    u64:new BigUint64Array(((o.u64||4)*1024/8)|0),
    str:strProxy,
    q:new Map(),       // ?型: id → {schema, idx}
    qschema:{},        // ?型: name → [{type,field,slot}]
    q_slot,            // フリーリスト方式スロットカウンタ
    qlit:new Map(),    // ?型 Literal Array: name → any[]
  };
}
// ── LL(1) Stream Compiler ? no intermediate AST ──────────────────────────────
// Processes source line-by-line in a single pass.
// Block type: & = pure(sync), ! = action(async), @ = loop(async+guard)
// Produces a registry of {body, type, isPub, hasAsync} directly.
// ─────────────────────────────────────────────────────────────────────────────
const ASYNC_SYS=new Set(['wait','section.show',...(_reg.get('sph.async.sys')||[])]);
class Compiler{
  constructor(){this._reset();}
  _reset(){
    this.sym={'#':{},'%':{},'~':{},'$':{},'?':{}};
    this.slot={'#':0,'%':0,'~':0,'$':0,'?':0};
    this.len={'#':{},'%':{},'~':{},'$':{}};
    this.memOpts={};this.docs=[];this.errors=[];this.warns=[];
    this._pubs=[];this._locals=new Map();this._btype={};
    this._blockNames=new Set(); // duplicate block detection (2-2)
  }
  _err(code,args=[]){this.errors.push({code,args,severity:'error',phase:'compile'});}
  _warn(code,args=[]){this.warns.push({code,args,severity:'warn',phase:'compile'});}
  // ── [v16] Static Type Inference & W-TYPE warning ──────────────────
  // 式の型をシジルから静的に推測し、明らかな型不一致を警告する
  _inferType(e){
    e=e.trim();
    if(e.startsWith('"')||e.startsWith(':'))return'$';
    if(/^-?\d+(\.\d+)?$/.test(e))return'#';
    if(/^[#%~]/.test(e))return'#';
    if(e.startsWith('$'))return'$';
    return'u'; // unknown
  }
  _checkType(lhs,rhs,ln){
    const lt=lhs[0],rt=this._inferType(rhs);
    if(rt==='u')return; // 不明な型はスキップ
    if((lt==='#'||lt==='%'||lt==='~')&&rt==='$')
      this._warn('W-TYPE',[ln,`Cannot assign String to Numeric ${lhs}`]);
    if(lt==='$'&&rt==='#')
      this._warn('W-TYPE',[ln,`Assigning Number to String ${lhs}`]);
  }
  _castI(expr,vn){
    if(/^-?\d+$/.test(expr.trim())||/^i32\[/.test(expr.trim()))return`(${expr})|0`;
    // _w に1回だけ評価し、警告チェックも _w を使う (1-1: double-eval fix)
    return`((_w=+(${expr})),(_w!==(_w|0)||Number.isNaN(_w))&&sph._runtimeWarn&&sph._runtimeWarn('W003',['${vn}',String(_w),String((_w|0))]),(_w|0))`;
  }
  _castF(expr,vn){

// ── JSDoc extractor: /** desc @param {type} name */ → {desc,args} ─────────
function _jsdoc(fn){
  if(typeof fn!=='function')return{desc:'',args:''};
  const s=fn.toString(),m=s.match(/\/\*\*\s*([\s\S]*?)\s*\*\//);
  if(!m)return{desc:'',args:''};
  const raw=m[1];
  const desc=raw.replace(/@\w[\s\S]*$/,'').replace(/\s*\*\s*/g,' ').trim();
  const params=[];let pr;const re=/@param\s+\{?(\w+)\}?\s+(\w+)/g;
  while((pr=re.exec(raw))!==null)params.push(pr[2]+':'+pr[1]);
  return{desc,args:params.join(', ')};
}

function mount(id,...args){
  // ═══════════════════════════════════════════════════════════════════
  // [v16.2] EXT シングルトン管理 - 改善版
  // ═══════════════════════════════════════════════════════════════════
  // 
  // v16.2での改善:
  //   1. return型を統一（常に文字列id）
  //   2. グローバルイベントリスナーの確実な削除
  //   3. descriptor のディープコピー
  //   4. コアEXT重複登録警告
  //
  // ═══════════════════════════════════════════════════════════════════
  
  // ✅ v16.2: コア EXT のリスト定義
  const CORE_EXTS=new Set([
    'err','edit','debug','tester','key','bridge',
    'worker','sound','extmgr','appearance','file','abcd'
  ]);
  
  // ═══════════════════════════════════════════════════════════════════
  // シングルトン管理: 既に登録されているEXTは上書き禁止
  // ═══════════════════════════════════════════════════════════════════
  if(_mounts.has(id)){
    if(CORE_EXTS.has(id)){
      console.warn('[sph.mount] Cannot override core EXT "'+id+'". '
        +'These EXTs are loaded at startup. Use sph.unmount() first if you need to modify them.');
    } else {
      console.warn('[sph.mount] EXT "'+id+'" is already registered (singleton). Mount skipped.');
    }
    // ✅ v16.2: return型を統一（常に文字列idを返す）
    return id;
  }
  
  // M1: positional ? mount(id, 'LABEL', desc) or mount(id, desc)
  // icon引数は廃止 — シンプル・コンパクト・速さ・安全性を軸に
  let descriptor={};
  if(args.length>=2&&typeof args[0]==='string'&&typeof args[args.length-1]==='object'){
    descriptor=Object.assign({},args[args.length-1]||{},{label:args[0]});
  } else if(args.length>=1){
    descriptor=args[args.length-1]||{};
  }
  const keys=new Set();
  const mreg=(k,v)=>{_reg.set(k,v);keys.add(k);};
  mreg(id+'.label', descriptor.label??id.toUpperCase());
  if(descriptor.panel)    mreg(id+'.panel',    descriptor.panel);
  if(descriptor.subPanel) mreg(id+'.subPanel', descriptor.subPanel);
  if(descriptor.layout)   mreg(id+'.layout',   descriptor.layout);
  const api=descriptor.api??{};
  for(const[k,v] of Object.entries(api))mreg(id+'.'+k,v);
  // M3: commands ? provided | JSDoc-inferred from api fns | auto-named
  if(descriptor.commands){
    mreg(id+'.commands', descriptor.commands);
  } else {
    mreg(id+'.commands', Object.entries(api).map(([k,v])=>{
      const d=_jsdoc(v);return{name:id+'.'+k,desc:d.desc,args:d.args||undefined};
    }));
  }
  // M4: on:{} ? two kinds:
  //   global events (ide-ready, ext-*): wired immediately at mount time
  //   frame events (frame-mounted, theme-change): wired at frameMount, removed at frameUnmount
  const FRAME_EVS=new Set(['frame-mounted','frame-unmounted','theme-change']);
  if(descriptor.on){
    const frameOn={}, globalOn={};
    for(const[ev,fn] of Object.entries(descriptor.on)){
      if(FRAME_EVS.has(ev)) frameOn[ev]=fn;
      else globalOn[ev]=fn;
    }
    if(Object.keys(frameOn).length) mreg(id+'._on', frameOn);
    // ✅ v16.2: グローバルリスナーをハンドラ参照付きで登録
    const listeners={};
    for(const[ev,fn] of Object.entries(globalOn)){
      listeners[ev]=fn;
      document.addEventListener('sph:'+ev, e=>fn(e.detail));
      keys.add(id+'._global_'+ev);
    }
    _globalListeners.set(id, listeners);  // リスナー参照を保持
  }
  _mounts.set(id,keys);
  
  // ═══════════════════════════════════════════════════════════════════
  // シングルトン識別子を記録
  // ═══════════════════════════════════════════════════════════════════
  // ✅ v16.2: descriptor の深いコピーを作成
  const deepCopyDescriptor={
    label:descriptor.label,
    panel:descriptor.panel,
    subPanel:descriptor.subPanel,
    layout:descriptor.layout?{...descriptor.layout}:undefined,
    api:descriptor.api?{...descriptor.api}:undefined,
    commands:descriptor.commands?[...descriptor.commands]:undefined,
    on:descriptor.on?{...descriptor.on}:undefined
  };
  
  mreg(id+'._singleton', {
    mounted:true,
    mountTime:Date.now(),
    descriptor:deepCopyDescriptor,  // ← ディープコピーを使用
    keys:new Set(keys)              // ← keys のコピーを作成
  });
  
  return id;
}
function unmount(id){
  const keys=_mounts.get(id);
  if(!keys)return false;
  
  // ✅ v16.2: グローバルイベントリスナーをクリーンアップ
  const listeners=_globalListeners.get(id);
  if(listeners){
    for(const[ev,fn] of Object.entries(listeners)){
      document.removeEventListener('sph:'+ev,fn);
    }
    _globalListeners.delete(id);
  }
  
  for(const k of keys)_reg.delete(k);
  _mounts.delete(id);
  emit('ext-unmounted',{id});
  return true;
}
// sph.get: synchronous registry lookup ? normalizes fn|value without await
// Use for: label, icon, commands, layout (sync values only)
// Use sph.call for: panel, subPanel (may return Promises)
function get(name,args=[]){
  const v=_reg.get(name);
  if(v===undefined)return null;
  if(typeof v!=='function')return v;
  const r=v(...args);
  // if fn returns a Promise, fall back to null (use sph.call for async)
  return r instanceof Promise?null:r;
}
// ── ループ・タイムアウトのデフォルト値登録 ─────────────────────────
// sph.register('sph.loop.maxIter', N) / sph.register('sph.loop.maxMs', N)
// sph.register('sph.ext.timeout', N) で任意に上書き可
register('sph.loop.maxIter',  1000000); // @loop 反復上限
register('sph.loop.maxMs',    10000);   // @loop タイムアウト(ms)
register('sph.ext.timeout',   5000);    // _safeCall タイムアウト(ms)
register('sph.mem.strCap',    1000);    // str[] 上限スロット数
register('sph.debug.enabled', false);   // DEBUG EXT が true にする (2.15)

// ── sph._safeCall: DSLからのEXT API呼び出し用 安全ラッパー ──────
// タイムアウト(デフォルト5秒)付き、callDepth監視付き (2.15)
let _callDepthCurrent=0;
async function _safeCall(name,args=[]){
  const v=_reg.get(name);
  if(v===undefined){
    emit('warn',{code:'E010',args:[name],severity:'warn',phase:'ext.call'});
    return null;
  }
  if(typeof v!=='function')return v;
  const _maxDepth=_reg.get('sph.ext.callDepth')??32;
  if(_callDepthCurrent>=_maxDepth){
    emit('error',{code:'E016',args:[name,_callDepthCurrent],severity:'error',phase:'ext.call'});
    return null;
  }
  const _extTimeout=_reg.get('sph.ext.timeout')??5000;
  let timer;
  const timeoutP=new Promise((_,rej)=>{timer=setTimeout(()=>rej(new Error('EXT_TIMEOUT')),_extTimeout);});
  _callDepthCurrent++;
  try{
    const r=v(...args);
    const result=await Promise.race([r instanceof Promise?r:Promise.resolve(r),timeoutP]);
    clearTimeout(timer);_callDepthCurrent--;return result;
  }catch(e){
    clearTimeout(timer);_callDepthCurrent=Math.max(0,_callDepthCurrent-1);
    const code=e?.message==='EXT_TIMEOUT'?'E012':'E011';
    const eArgs=code==='E012'?[name,_extTimeout]:[name,e?.message??String(e)];
    emit('error',{code,args:eArgs,severity:'error',phase:'ext.call'});
    return null;
  }
}
window.sph={compile:(src,libs,docs)=>compiler.compile(src,libs,docs),run,stop,register,call,get,emit,
  mount,unmount,ui:sph_ui,_safeCall,
  runtimeSrc:()=>document.getElementById('sph-core')?.textContent||'',_reg,_mounts,_runtimeWarn,_throwOOB,
  _loopBreak:null,_loopStop:null,_loopStopAll:null,
  // ═══════════════════════════════════════════════════════════════════
  // [v16.1] シングルトン管理API
  // ═══════════════════════════════════════════════════════════════════
  singleton:{
    // シングルトン情報を取得
    getInfo:(extId)=>{
      return _reg.get(extId+'._singleton')||null;
    },
    // EXTが既にマウント済みか確認
    isMounted:(extId)=>{
      return _mounts.has(extId);
    },
    // 登録済みの全EXT一覧を取得（シングルトン情報付き）
    list:()=>{
      const result=[];
      for(const [id, keys] of _mounts.entries()){
        result.push({
          id:id,
          label:_reg.get(id+'.label'),
          mounted:true,
          singleton:_reg.get(id+'._singleton')??null,
          keyCount:keys.size
        });
      }
      return result;
    },
    // シングルトンの詳細情報を取得
    getDetail:(extId)=>{
      if(!_mounts.has(extId))return null;
      const singletonData=_reg.get(extId+'._singleton');
      // ✅ v16.2: singletonData が null の場合を処理
      if(!singletonData){
        console.warn('[sph.singleton.getDetail] Singleton data not found for',extId);
        return null;
      }
      return {
        id:extId,
        label:_reg.get(extId+'.label'),
        mounted:true,
        singleton:singletonData,
        commands:_reg.get(extId+'.commands')||[],
        hasPanel:_reg.has(extId+'.panel'),
        hasSubPanel:_reg.has(extId+'.subPanel'),
        apiMethods:Object.keys((_reg.get(extId+'.commands')||[])
          .reduce((acc,cmd)=>{
            const method=cmd.name?.split('.')[1];
            if(method)acc[method]=true;
            return acc;
          },{}))
      };
    }
  },
  // [v16] EXT ホワイトリスト管理
  ext:{
    allow:(name)=>ALLOWED_EXT.add(name),
    isAllowed:(name)=>ALLOWED_EXT.has(name),
  },
  // [v16] ホワイトリスト検証付きEXT呼び出し（DSLブロック内から使用）
  _extCall:async(name,args)=>{
    if(!ALLOWED_EXT.has(name)){
      emit('warn',{code:'W-EXT',args:[name,'Blocked EXT call — use sph.ext.allow(name) to permit'],severity:'warn',phase:'runtime'});
      return null;
    }
    return _safeCall(name,args);
  },
};

// ── _sphForDSL: DSL実行用の制限版sphプロキシ ────────────────────
// DSLブロックには sph._reg / register / compile / run / mount を渡さない
// → カーネル破壊・APIハイジャック・再帰コンパイルを防止
// injection: sph.register('sph.dsl.allowEmit', ['error','warn','run-start']) で制御可
function _makeSphForDSL(){
  const _allowedEmit=new Set(_reg.get('sph.dsl.allowEmit')
    ??['error','warn','run-start','block-call','block-return','section']);
  return Object.freeze({
    // API呼び出しは必ず _safeCall 経由（5秒timeout付き）
    call:        (name,args)=>_safeCall(name,args),
    get:         (name,args)=>get(name,args),
    // emit はホワイトリストのみ通過
    emit:        (name,detail)=>{ if(_allowedEmit.has(name))emit(name,detail); },
    // ループ制御は必須
    _loop:       (...a)=>sph._loop(...a),
    _loopBreak:  (...a)=>sph._loopBreak?.(...a),
    _loopStop:   (...a)=>sph._loopStop?.(...a),
    _loopStopAll:(...a)=>sph._loopStopAll?.(...a),
    _runtimeWarn:(...a)=>_runtimeWarn?.(...a),
    _throwOOB:   (name,idx,size)=>_throwOOB(name,idx,size),
    // _reg / register / compile / run / mount は渡さない
  });
}
register('sph.dsl.allowEmit',
  ['error','warn','run-start','block-call','block-return','section']);

// ── DSL Sandbox Proxy: グローバルアクセス遮断 ───────────────────
// with(sandboxProxy){...body...} でDSLコードをラップすることで
// window/fetch/XHR/localStorage等へのアクセスをブロック
// injection: sph.register('sph.sandbox.mode','proxy'|'none') で切替
const _DSL_GLOBALS_ALLOW=new Set([
  // 基本型・標準オブジェクト
  'undefined','null','true','false','Infinity','NaN',
  'Math','parseInt','parseFloat','isNaN','isFinite','String','Number',
  'Boolean','Array','Object','JSON','Date','RegExp','Error','Symbol',
  'Map','Set','WeakMap','WeakSet','Promise','Proxy','Reflect',
  'Int8Array','Uint8Array','Uint8ClampedArray','Int16Array','Uint16Array',
  'Int32Array','Uint32Array','Float32Array','Float64Array','BigInt64Array','BigUint64Array',
  'ArrayBuffer','DataView','SharedArrayBuffer','Atomics',
  'TextEncoder','TextDecoder','URL','URLSearchParams',
  'setTimeout','clearTimeout','requestAnimationFrame','cancelAnimationFrame',
  'queueMicrotask','structuredClone',
  // SAPPHIREスコープ変数（引数として渡されるもの）
  'i32','f64','u64','str','q','qschema','q_slot','qlit','_q_alloc','sph','callBlock','signal',
  // ループ用ローカル
  'pc_ret','_w','_args',
]);
const _DSL_GLOBALS_BLOCK=new Set([
  'window','self','parent','top','globalThis',  // グローバル参照
  'document','location','history','navigator',  // DOM/ブラウザ
  'fetch','XMLHttpRequest','WebSocket',          // 通信
  'localStorage','sessionStorage','indexedDB',  // 永続化
  'alert','confirm','prompt','open',             // ダイアログ
  'eval','Function',                             // コード実行
  'importScripts','import',                      // モジュール
]);
function _makeDSLSandbox(scopeVars){
  // sandbox.mode が 'none' の場合はそのままscopeVarsを返す
  if((_reg.get('sph.sandbox.mode')??'proxy')==='none')return scopeVars;
  return new Proxy(scopeVars,{
    has(_,k){
      // 全プロパティ検索をこのProxyで横取り → with(proxy)が機能する
      return true;
    },
    get(_,k){
      if(_DSL_GLOBALS_BLOCK.has(k)){
        // ブロック対象: E013エラーを発火してundefinedを返す
        emit('warn',{code:'W011',args:[k],severity:'warn',phase:'sandbox'});
        return undefined;
      }
      if(k in scopeVars)return scopeVars[k];
      if(_DSL_GLOBALS_ALLOW.has(k))return globalThis[k];
      // それ以外は黙ってundefined
      return undefined;
    },
    set(_,k,v){
      // prototype汚染チェック
      if(k==='__proto__'||k==='prototype'||k==='constructor'){
        emit('error',{code:'E013',args:[k],severity:'error',phase:'sandbox'});
        return true; // 無言で捨てる
      }
      if(k in scopeVars){scopeVars[k]=v;return true;}
      return true;
    },
  });
}
register('sph.sandbox.mode',  'proxy'); // injection: 'proxy'|'none'
register('sph.proto.guard',   true);   // prototype汚染チェック ON/OFF
register('sph.ext.callDepth', 32);     // 再帰呼び出し深さ上限
})();

<script id="sph-boot">

// ?cfg=<deflate+base64url>  full state (incl. tab content), compressed. Highest priority.
// ?ext=id1,id2             external EXT IDs comma-separated. url:https://... also works.
//                          built-in EXTs are embedded in the HTML ? no need to list them.
// ?src=local:key           load state from localStorage.
// ?src=gist:id             load state from GitHub Gist.
// ?src=url:https://...     load state from any URL.
// ?tab=name                active tab on start. Overrides cfg.
// ?run=1                   run immediately on start.

//   app = full-screen EXT panel, IDE hidden, auto-mounts first EXT
// ─────────────────────────────────────────────────────
function parseParams(){
  const p=new URLSearchParams(location.search);
  return{
    ext :(p.get('ext')||'').split(',').map(s=>s.trim()).filter(Boolean),
    mode:p.get('mode')||'ide',
    tab :p.get('tab')||'',
    src :p.get('src')||'',
    cfg :p.get('cfg')||'',

}
async function decodeCfg(b64){try{const bin=atob(b64.replace(/-/g,'+').replace(/_/g,'/'));const bytes=new Uint8Array([...bin].map(c=>c.charCodeAt(0)));const ds=new DecompressionStream('deflate-raw');const w=ds.writable.getWriter();w.write(bytes);w.close();const chunks=[];for await(const c of ds.readable){chunks.push(c);}const all=new Uint8Array(chunks.reduce((a,b)=>a+b.length,0));let off=0;for(const c of chunks){all.set(c,off);off+=c.length;}return JSON.parse(new TextDecoder().decode(all));}catch(e){console.warn('[sph-boot] cfg decode failed',e);return null;}}

// Parse EXT HTML and inject parts into the IDE (shared logic)

function loadExtInline(id){

async function loadExtUrl(spec){try{const url=spec.startsWith('url:')?spec.slice(4):spec;const html=await(await fetch(url)).text();const doc=new DOMParser().parseFromString(html,'text/html');const id=doc.querySelector('meta[name="sph-ext"]')?.content||spec;injectExtDoc(doc,id,url);return true;}catch(e){console.warn('[sph-boot] fetch ext failed',e);return false;}}

      const firstExt=params.ext.find(id=>!id.startsWith('url:')&&!id.startsWith('http'))
        ||[...document.querySelectorAll('script[type="sph/ext"][data-ext-id]')]
           .map(e=>e.dataset.extId)
           .find(id=>id!=='err'&&id!=='edit'&&id!=='debug'&&id!=='tester'
                   &&id!=='key'&&id!=='bridge'&&id!=='worker');
      if(firstExt)sph.call('ide.frame.mount',[firstExt]);
    },{once:true});
  }

  if(params.cfg)stateData=await decodeCfg(params.cfg);

  const extList=params.ext.length>0?params.ext:[...document.querySelectorAll('script[type="sph/ext"][data-ext-id]')].map(e=>e.dataset.extId);
  for(const id of extList){if(id.startsWith('url:')||id.startsWith('http'))await loadExtUrl(id);else loadExtInline(id);}
  // consumes一括検証: 全EXTロード後に依存関係をチェック
  for(const el of document.querySelectorAll('script[type="sph/meta"][data-ext-id]')){
    try{
      const eid=el.dataset.extId;
      const consumes=(JSON.parse(el.textContent).consumes)||[];

    _fi.onchange=async()=>{

          const tabList=sph._reg.get('ide.tab.list')?.()??[];
          const tabNames=new Set([
            ...[...parsed.querySelectorAll('script[type="sph/tab"]')].map(s=>s.dataset.tabName),
            ...[...parsed.querySelectorAll('section[id]')].map(s=>s.id),
          ]);
          tabList.filter(t=>tabNames.has(t.name)&&!t.extGroup).forEach(t=>{
            const el=document.querySelector('script[type="sph/tab"][data-tab-name="'+t.name+'"]');
            if(el)el.dataset.tabExt=extId;
          });
          sph._reg.get('ide.tab.render')?.();
          await sph.call('ide.tab.activate',[extId]);
          sph.call('extmgr.refresh');
        }else{
          // Regular HTML file: add as DOC tab
          await sph.call('ide.tab.add',['doc',base,text]);
          await sph.call('ide.tab.activate',[base]);
        }
      }else{
        await sph.call('ide.tab.add',['dsl',base,text]);
        await sph.call('ide.tab.activate',[base]);
      }
      sph.emit('file-loaded',{name:file.name});
      sph.call('file.refresh');
    };
    _fi.click();
  });
  // Load EXT from URL (for hot-reload)
  sph.register('sph.ext.load.url',async(url)=>{
    const ok=await loadExtUrl(url);
    if(ok)sph.call('extmgr.refresh');
    return ok;
  });
});
})();

<script id="sph-ide">

// extGroup: EXT group the tab belongs to. Standalone if absent.

function getLibs(){const o={};getAllTabs().filter(e=>e.dataset.tabType==='lib').forEach(e=>o[e.dataset.tabName]=e.textContent);return o;}

const Tabs={active:null,panels:new Map()};

// EXT group expand state Map<extId, boolean>
const TabGroups=new Map();

function renderTabBar(){

function _renderExtGroup(bar,extName,allTabs){

// ── RUN / STOP ──────────────────────────────────────────────
// #run-mount: dedicated area to expand DOCs during RUN
// The running class hides editor-wrap and shows run-mount
// → resolves the white-screen bug in sys.dom.mount
let _vm=null;
function _enterRun(){
  const rm=$id('run-mount');if(rm)rm.innerHTML='';
  document.body.dataset.frameA='run';
}
function _exitRun(){
  const rm=$id('run-mount');if(rm)rm.innerHTML='';

}
async function runDSL(){
  const src=getTabContent(Tabs.active);if(!src)return;
  const stat=$id('stat'),btn=$id('btn-run');
  if(_vm){
    sph.stop();_vm=null;
    btn.textContent='? RUN';btn.classList.remove('running');stat.className='';
    _exitRun();sph.emit('stop',{result:'user'});return;
  }

  _enterRun();

  const savedMount=sph._reg.get('sys.dom.mount');
  // Pre-expand section tabs into run-mount (targets of sys.section.show)
  const rm=$id('run-mount');
  if(rm){
    getAllTabs().filter(e=>e.dataset.tabType==='section').forEach(e=>{
      const tmp=mk('div');tmp.innerHTML=e.textContent;
      const secs=tmp.querySelectorAll('section');

        secs.forEach(s=>rm.appendChild(s));
      } else {
        const wrapper=mk('section');

        while(tmp.firstChild)wrapper.appendChild(tmp.firstChild);

  sph.register('sys.dom.mount',(docName)=>{
    const html=docs[docName];if(!html)return;
    const rm=$id('run-mount');if(!rm)return;
    const tmp=mk('div');tmp.innerHTML=html;
    for(const s of tmp.querySelectorAll('style'))document.head.appendChild(s.cloneNode(true));
    while(tmp.firstChild)rm.appendChild(tmp.firstChild);

  const result=await _vm;
  if(savedMount)sph.register('sys.dom.mount',savedMount);
  _vm=null;btn.textContent='? RUN';btn.classList.remove('running');
  stat.className=(result==='stopped'||result===true)?'ok':'err';
  _exitRun();sph.emit('stop',{result});
}

function saveHTML(){

function exportEXT(tabNames,extId,extLabel){

  let extScriptContent=''; // content of the ext-type tab (user-edited script)

  for(const name of selected){

    : `${s1} type="sph/ext" data-ext-id="${id}">

// ── ${label} EXT ──────────────────────────────────────────
sph.mount('${id}','${label}',{
  panel: ()=>sph.ui.panel('${id}',
    '<p class=\"sph-meta\">Settings for ${id}</p>'
  ),
  api:{
    // /** Description @param {type} name */
    // hello: ()=>sph.call('ide.log',['Hello from ${id}!']),
  },
  // on:{ 'frame-mounted': ()=>{ /* runs when panel opens */ } },
  // layout: 'V',  // preferred frame layout: S | V | H
});
})();
${s2}`;

  // Assemble HTML
  let body=`<!DOCTYPE html>\n<html lang="en"><head>\n<meta charset="UTF-8">\n<meta name="sph-ext" content="${id}">\n<meta name="sph-ext-version" content="1">\n<title>${label} EXT</title>\n</head><body>\n\n`;

  // DSL/LIB tabs
  for(const name of [...dslTabs,...libTabs]){
    const el=getTabEl(name);if(!el)continue;
    const type=tt(el);
    body+=`${s1} type="sph/tab" data-tab-name="${name}" data-tab-type="${type}" data-tab-order="${el.dataset.tabOrder||0}">\n${el.textContent}\n${s2}\n\n`;
  }

    const el=getTabEl(name);if(!el)continue;

  <div id="app-log"></div>

${coreSrc}
${s2}
${s1}
const $id=id=>document.getElementById(id);
const $=s=>document.querySelector(s);

  for(const el of document.querySelectorAll('script[type="sph/ext"][data-ext-id]')){

// ── ide.frame: S/V/H pane model ─────────────────────────────────────────────
// body[data-frame]  = "S"|"V"|"H"
// body[data-frame-a] = "editor"|"run"|extId
// body[data-frame-b] = "log"|extId
// _frameOwner: id of EXT currently mounted into frame-a (null = editor/run)
let _frameOwner=null;


function _setCSS(prop,val){document.documentElement.style.setProperty(prop,val);}

function frameSet(svh){
  const f={'S':'S','V':'V','H':'H'}[svh]||'V';
  document.body.dataset.frame=f;
  // reset b-size property direction on switch
  if(f==='H')_setCSS('--sph-b-size','320px');
  else _setCSS('--sph-b-size','200px');
  sph.emit('frame-change',{frame:f});
}
function frameGet(){return document.body.dataset.frame||'V';}

function _writePane(slot,html){
  const el=$id(slot==='a'?'frame-a-ext':'frame-b-ext');
  if(!el)return;
  // mounting アニメーション: opacity+translate でfade-slide in
  el.className='sph-panel sph-mounting';
  el.innerHTML='';
  const tmp=mk('div');tmp.innerHTML=html;
  for(const s of tmp.querySelectorAll('style'))document.head.appendChild(s.cloneNode(true));
  while(tmp.firstChild)el.appendChild(tmp.firstChild);
  // 次フレームでクラスを外してトランジション発火
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    el.classList.remove('sph-mounting');
  }));
}

// Mount EXT into frame-a (and optionally frame-b)
// M4: _wireOn ? attach/detach on:{} handlers for a mounted EXT
// Handlers are called only when the EXT that declared them is mounted in frame-a
const _onHandlers=new Map(); // extId → [{event,fn}]
function _wireOn(extId,attach){
  if(attach){
    const onMap=sph.get(extId+'._on');
    if(!onMap||typeof onMap!=='object')return;
    const listeners=[];
    for(const[event,fn] of Object.entries(onMap)){
      const wrapped=(e)=>fn(e.detail);
      document.addEventListener('sph:'+event,wrapped);
      listeners.push({event:'sph:'+event,fn:wrapped});
    }
    _onHandlers.set(extId,listeners);
  } else {
    const listeners=_onHandlers.get(extId)||[];
    for(const{event,fn} of listeners)document.removeEventListener(event,fn);
    _onHandlers.delete(extId);
  }
}
function frameMount(extId){
  if(!extId)return;
  // 前のEXTのハンドラを外してからマウント
  if(_frameOwner&&_frameOwner!==extId)_wireOn(_frameOwner,false);
  _frameOwner=extId;

  // panel: fn|string どちらでも取得できる確実な方法
  const panelV=sph._reg.get(extId+'.panel');
  const mainHtml=(typeof panelV==='function'?panelV():panelV)||_defaultExtPanel(extId);
  _writePane('a',mainHtml);
  document.body.dataset.frameA='ext:'+extId;

  // frame-b: sub UI or log
  const subV=sph._reg.get(extId+'.subPanel');
  const subHtml=typeof subV==='function'?subV():subV;
  if(subHtml){
    _writePane('b',subHtml);
    document.body.dataset.frameB='ext:'+extId;
  } else {
    document.body.dataset.frameB='log';
  }

  // EXT-preferred layout: 'S'|'V'|'H' | {frame,split}
  const layoutV=sph._reg.get(extId+'.layout');
  const preferred=typeof layoutV==='function'?layoutV():layoutV;
  if(preferred){
    const f=typeof preferred==='string'?preferred:(preferred.frame||null);
    const r=typeof preferred==='object'&&preferred!==null?preferred.split:null;
    if(f&&['S','V','H'].includes(f))frameSet(f);
    if(r!=null)frameSplit(r);
  }

  // M4: on:{} ハンドラを配線
  _wireOn(extId,true);
  requestAnimationFrame(()=>sph.emit('frame-mounted',{id:extId}));
}

// Unmount EXT ? restore editor + log
function frameUnmount(){
  if(!_frameOwner)return;
  const prev=_frameOwner;
  _wireOn(prev,false);
  _frameOwner=null;
  // フェードアウト後にクリア
  const extA=$id('frame-a-ext'), extB=$id('frame-b-ext');
  if(extA){extA.style.transition='opacity .12s ease';extA.style.opacity='0';}
  if(extB){extB.style.transition='opacity .1s ease'; extB.style.opacity='0';}
  setTimeout(()=>{
    if(extA){extA.innerHTML='';extA.style.opacity='';extA.style.transition='';}
    if(extB){extB.innerHTML='';extB.style.opacity='';extB.style.transition='';}
    document.body.dataset.frameA='editor';
    document.body.dataset.frameB='log';
    sph.emit('frame-unmounted',{id:prev});
  },130);
}

// Refresh current mounted EXT panels
function frameRefresh(){
  if(_frameOwner)frameMount(_frameOwner);
}

// Split: set frame-a ratio (0.0?1.0). frame-b gets the remainder.
// frameSplit(0.65) → frame-a 65%, frame-b 35%
// frameSplit(1.0)  → frame-a full (same as S but frame-b still exists in DOM)
function frameSplit(ratio){
  const r=Math.max(0.15,Math.min(0.85,+ratio));
  _setCSS('--sph-a-ratio',r);
  sph.emit('frame-split',{ratio:r});
}
// Legacy alias ? old callers passed px, map to ratio heuristic
function frameResize(px){
  const totalPx=document.getElementById('main-wrap')?.offsetHeight||600;
  // treat px as frame-b size → ratio = (total-px)/total
  const r=Math.max(0.1,Math.min(0.95,(totalPx-Math.max(80,+px))/totalPx));
  frameSplit(r);
}

function frameOwner(){return _frameOwner;}

function _defaultExtPanel(id){
  const label=sph.get(id+'.label')||id.toUpperCase();
  const hasPanel=sph._reg.has(id+'.panel');
  const regKeys=[...sph._reg.keys()].filter(k=>k.startsWith(id+'.')).join(', ');
  console.warn('[frameMount] no panel for "'+id+'". registered keys:',regKeys||'(none)');
  return '<div class="sph-panel" style="padding:20px">'
    +'<div class="sph-head" style="margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--sph-border)">◆ '+label+'</div>'
    +'<p class="sph-meta">Panel not found for <code>'+id+'</code>.</p>'
    +'<p class="sph-meta" style="margin-top:6px">Registered: '+(regKeys||'(none)')+'</p>'
    +'</div>';
}

  // Also delete any remaining id.* keys (legacy sph.register style)
  for(const k of [...sph._reg.keys()]){
    if(k===id||k.startsWith(id+'.'))sph._reg.delete(k);
  }
  // Remove tab group
  getAllTabs().filter(e=>te(e)===id||tn(e)===id).forEach(e=>e.remove());
  Tabs.panels.forEach((_,name)=>{
    const el=getTabEl(name);
    if(!el){Tabs.panels.get(name)?.div?.remove();Tabs.panels.delete(name);}
  });
  renderTabBar();
  sph.emit('ext-removed',{id});
  sph.call('extmgr.refresh');
  return true;
});
// ── ide.frame API ──────────────────────────────────────────────────────────
sph.register('ide.frame.set',     (svh)=>frameSet(svh));
sph.register('ide.frame.get',     ()=>frameGet());
sph.register('ide.frame.mount',   (id)=>frameMount(id));
sph.register('ide.frame.unmount', ()=>frameUnmount());
sph.register('ide.frame.refresh', ()=>frameRefresh());
sph.register('ide.frame.split',   (ratio)=>frameSplit(ratio));   // 0.0?1.0
sph.register('ide.frame.resize',  (px)=>frameResize(px));        // legacy alias
sph.register('ide.frame.owner',   ()=>frameOwner());
// Legacy compat
sph.register('ide.layout.set',    (name)=>setLayout(name));
sph.register('ide.layout.get',    ()=>({'S':'1','V':'v2','H':'h2'}[frameGet()]||'v2'));
sph.register('ide.panel.log.height',(h)=>frameResize(h));
sph.register('ide.panel.log.show', ()=>{if(frameGet()==='S')frameSet('V');});
sph.register('ide.panel.log.hide', ()=>frameSet('S'));
// Theme / font
sph.register('ide.theme.set',    (vars)=>{for(const[k,v]of Object.entries(vars))document.documentElement.style.setProperty(k.startsWith('--')?k:'--sph-'+k,v);sph.emit('theme-change',{vars});});
sph.register('ide.theme.get',    ()=>{const st=getComputedStyle(document.documentElement);return Object.fromEntries(['bg','surface','surface2','text','dim','accent','ok','err','warn','border','font','font-size'].map(k=>[k,st.getPropertyValue('--sph-'+k).trim()]));});
sph.register('ide.font.set',     (font,size)=>{if(font)document.documentElement.style.setProperty('--sph-font',font);if(size)document.documentElement.style.setProperty('--sph-font-size',typeof size==='number'?size+'px':size);});

// ── IDE init ──
window.sphIdeInit=function(stateData,params){
  if(stateData?.tabs){
    for(const t of stateData.tabs){
      if(t.builtin)continue;
      // Add new tab if it does not exist
      if(!getTabEl(t.name)){
        addTabEl(t.name,t.type||'dsl',t.content||'',undefined,t.extGroup||undefined);
        if(t.desc)getTabEl(t.name).dataset.tabDesc=t.desc;
      } else {
        // Update content and metadata for existing tab
        if(t.content)setTabContent(t.name,t.content);
        if(t.extGroup)getTabEl(t.name).dataset.tabExt=t.extGroup;
        if(t.desc)getTabEl(t.name).dataset.tabDesc=t.desc;
      }
    }
  }
  if(stateData?.frame)frameSet(stateData.frame);
  else if(stateData?.layout)setLayout(stateData.layout); // legacy
  if(stateData?.split)frameSplit(stateData.split);
  for(const el of getAllTabs())buildPanel(tn(el));
  const startTab=params?.tab||(getAllTabs()[0]?.dataset.tabName||'');
  if(startTab)activateTab(startTab);
  on($id('btn-run'),'click',runDSL);
  on($id('btn-ext'),'click',()=>{
    if(_frameOwner)frameUnmount();
    else sph.call('extmgr.open');
  });
  on($id('logo'),'click',()=>{
    if(_frameOwner==='doc'){frameUnmount();}
    else{sph.call('ide.doc.export');}
  });
  on(document,'keydown',e=>{
    if(e.key==='Escape'){if(_vm){sph.stop();}else if(_frameOwner){frameUnmount();}}
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runDSL();}
  });
  if(params?.run)runDSL();
  // Pane-b resize drag handle
  (()=>{
    const handle=$id('frame-resize');if(!handle)return;
    let _dragging=false,_start=0,_startSize=0;
    handle.addEventListener('mousedown',e=>{
      _dragging=true;
      const svh=frameGet();
      _start=svh==='H'?e.clientX:e.clientY;
      const a=$id('frame-a');
      _startSize=svh==='H'?a.offsetWidth:a.offsetHeight;
      document.body.style.userSelect='none';e.preventDefault();
    });
    document.addEventListener('mousemove',e=>{
      if(!_dragging)return;
      const mw=$id('main-wrap');if(!mw)return;
      const svh=frameGet();
      const total=svh==='H'?mw.offsetWidth:mw.offsetHeight;
      if(!total)return;
      const delta=(svh==='H'?e.clientX:e.clientY)-_start;
      // ratio = frame-a size / total
      // dragging handle down/right → frame-a grows
      const newRatio=(_startSize+delta)/total;
      frameSplit(newRatio);
    });
    document.addEventListener('mouseup',()=>{_dragging=false;document.body.style.userSelect='';});
    // Touch support (H and V aware)
    handle.addEventListener('touchstart',e=>{
      _dragging=true;
      const svh=frameGet();
      _start=svh==='H'?e.touches[0].clientX:e.touches[0].clientY;
      const a=$id('frame-a');
      _startSize=svh==='H'?a.offsetWidth:a.offsetHeight;
      e.preventDefault();
    },{passive:false});
    document.addEventListener('touchmove',e=>{
      if(!_dragging)return;
      const mw=$id('main-wrap');if(!mw)return;
      const svh=frameGet();
      const total=svh==='H'?mw.offsetWidth:mw.offsetHeight||600;
      const delta=(svh==='H'?e.touches[0].clientX:e.touches[0].clientY)-_start;
      frameSplit((_startSize+delta)/total);
    },{passive:true});
    document.addEventListener('touchend',()=>{_dragging=false;});
  })();
  sph.emit('ide-ready',{});
};

// Tab metadata schema (finalized):
// { name, type, content, builtin, extGroup, desc }
window.sphGetState=function(){
  getAllTabs().forEach(el=>{const p=Tabs.panels.get(tn(el));if(p?.ta)el.textContent=p.ta.value;});
  return{v:3,
    tabs:getAllTabs().map(el=>({
      name    : tn(el),
      type    : tt(el)||'dsl',
      content : el.textContent,
      builtin : tn(el)==='std',
      extGroup: te(el)||null,
      desc    : td(el)||null,
    })),
    activeTab:Tabs.active,
    frame    :frameGet(),
    split    :+getComputedStyle(document.documentElement).getPropertyValue('--sph-a-ratio')||0.65,
    layout   :({'S':'1','V':'v2','H':'h2'}[frameGet()]||'v2')};
};
window.sphIdeAddTab=function(name,type,extGroup){buildPanel(name);renderTabBar();};
})();
</script>

<script type="sph/ext" data-ext-id="err">
(function(){
// Error code → human-readable message table
const _errMessages={
  // compile errors
  'E001': a=>a[2]==='sys.f'
    ?`[L${a[0]}] Purity Violation: sys.f expr not in pure allowlist in &${a[1]} — use !action for side-effects`
    :`[L${a[0]}] Purity Violation: sys.* used inside pure block &${a[1]}`,
  'E002': ()=>`No entry point ? write: -> BlockName`,
  'E003': a=>`Undefined block: "${a[0]}"`,
  'E004': a=>`[${a[0]}] Runtime error: ${a[1]}`,
  'E005': a=>`[${a[0]}] Compile error: ${a[1]}`,
  'E006': a=>`&pure block "${a[0]}" must not use await ? use !action or @loop for async`,
  'E010': a=>`sph.call: undefined API "${a[0]}"`,
  'E011': a=>`sph.call: error in "${a[0]}": ${a[1]}`,
  'E012': a=>`ext.call: "${a[0]}" timed out after ${a[1]}ms`,
  'E013': a=>`Sandbox: prototype mutation blocked: ${a[0]}`,
  'E014': a=>`Array out of bounds: ${a[0]}[${a[1]}] (size ${a[2]})`,
  'E015': a=>`Local array access "${a[0]}[...]" not supported — use global array`,
  'E016': a=>`Stack overflow: "${a[0]}" at depth ${a[1]} (max sph.ext.callDepth)`,
  // compile warnings
  'W001': a=>`lib "${a[0]}" not found`,
  'W002': a=>`doc "${a[0]}" not found`,
  'W003': a=>`Falsy cast: ${a[0]} value "${a[1]}" became ${a[2]}`,
  'W004': a=>`[L${a[0]}] Unknown syntax: ${a[1]}`,
  'W005': a=>`${a[0]} slot overflow ? increase mem.${a[0]}`,
  'W006': a=>`@loop "${a[0]}" stopped after ${a[1]} iterations (limit reached)`,
  'W007': a=>`@loop "${a[0]}" timed out`,
  'W008': a=>`str[] overflow: index ${a[0]} >= limit ${a[1]} — value dropped`,
  'W010': a=>`[L${a[0]}] &pure side-effect in "${a[1]}": ${a[2]}`,
  'W011': a=>`Sandbox: blocked global access "${a[0]}" — add permission to sph/meta`,
  'W012': a=>`EXT "${a[0]}": dependency "${a[1]}" not mounted`,
  'W013': a=>`Block "${a[0]}" redefined — previous definition overwritten`,
  'W014': a=>`[L${a[0]}] PUB "${a[1]}" inside indented block — ignored (must be top-level)`,
  'W-TYPE': a=>`[L${a[0]}] Type mismatch: ${a[1]}`,
  'W-EXT':  a=>`EXT call blocked: "${a[0]}" — ${a[1]}`,
};

// Convert error code object to string
sph.register('err.format',(obj)=>{
  if(!obj||!obj.code)return null;
  const fn=_errMessages[obj.code];
  const msg=fn?fn(obj.args||[]):`[${obj.code}] ${(obj.args||[]).join(' ')}`;
  const phase=obj.phase?`{${obj.phase}} `:'';
  return phase+msg;
});

// Listen for sph:error / sph:warn and write to IDE log (formatted by ERR EXT)
document.addEventListener('sph:error',({detail})=>{
  const msg=sph.call('err.format',[detail]);
  sph.call('ide.log.entry',['err', msg||`[${detail.code}]`]);
});
document.addEventListener('sph:warn',({detail})=>{
  const msg=sph.call('err.format',[detail]);
  sph.call('ide.log.entry',['warn', msg||`[${detail.code}]`]);
});
// Compile summary
document.addEventListener('sph:compile-done',({detail})=>{
  if(detail.errors.length===0&&detail.warnings.length===0)return;
  if(detail.errors.length>0)
    sph.call('ide.log.entry',['err',`Compile errors: ${detail.errors.length}`]);
  if(detail.warnings.length>0)
    sph.call('ide.log.entry',['warn',`Warnings: ${detail.warnings.length}`]);
});

const _errPanelHtml='<div style="font-size:var(--sph-sz-lg);color:var(--sph-text);padding:20px">'
  +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;padding-bottom:8px;border-bottom:1px solid var(--sph-border)">'
  +'<span style="font-size:var(--sph-sz-lg);letter-spacing:var(--sph-ls-head);color:var(--sph-accent)">◆ ERR</span>'
  +'<button onclick="sph.call(\'ide.frame.unmount\')" class="sph-btn">← EXT</button>'
  +'</div>'
  +'<div id="err-list" style="font-size:var(--sph-sz-md);line-height:1.8"></div>'
  +'<div style="margin-top:12px;font-size:var(--sph-sz-md);color:var(--sph-dim)">Converts error/warning codes to messages in the IDE log.</div>'
  +'</div>';

sph.mount('err','ERR',{
  panel:()=>sph.ui.panel('err',
    '<div id="err-list" style="font-size:var(--sph-sz-md);line-height:1.8"></div>'
    +'<p style="font-size:var(--sph-sz-md);color:var(--sph-dim);margin-top:8px">Converts error/warning codes to messages in the IDE log.</p>'
  ),
  api:{ format:(obj)=>{ // also keep direct registration below
    if(!obj||!obj.code)return null;
    const fn=_errMessages[obj.code];
    const msg=fn?fn(obj.args||[]):`[${obj.code}] ${(obj.args||[]).join(' ')}`;
    return(obj.phase?`{${obj.phase}} `:'')+msg;
  },
  describe:()=>({cat:'D',version:'1.0',consumes:[],produces:[],signals:[]}),
  },
});
// err.format is also needed as a direct key (called by ide before EXT is mounted)
sph.register('err.format',(obj)=>{
  if(!obj||!obj.code)return null;
  const fn=_errMessages[obj.code];
  const msg=fn?fn(obj.args||[]):`[${obj.code}] ${(obj.args||[]).join(' ')}`;
  return(obj.phase?`{${obj.phase}} `:'')+msg;
});
})();

<script type="sph/ext" data-ext-id="edit">
(function(){
// ── EDIT EXT ──────────────────────────────────────────────
// edit.open(tabName, containerDiv, isHtml, opts)
//   tabName      : string   ? linked tab name (for panel identity)
//   containerDiv : HTMLDiv  ? .panel div provided by buildPanel
//   isHtml       : boolean  ? true=HTML preview, false=plain text
//   opts.src     : string   ? initial content
//   opts.mode    : 'preview'|'edit'
//   opts.readonly: boolean
//   opts.onSave  : fn(src)
// ──────────────────────────────────────────────────────────

// Inject CSS once
if(!$id('_edit-ext-style')){
  const s=mk('style');s.id='_edit-ext-style';
  s.textContent=`
.edit-bar{height:24px;display:flex;align-items:center;padding:0 10px;gap:8px;
  flex-shrink:0;background:var(--sph-surface2);
  border-bottom:1px solid var(--sph-border);font-size:var(--sph-sz-sm)}
.edit-mode-label{color:var(--sph-dim);letter-spacing:var(--sph-ls-label);text-transform:uppercase;font-size:var(--sph-sz-sm)}
.edit-toggle{font-size:var(--sph-sz-sm);font-weight:700;letter-spacing:var(--sph-ls-label);
  padding:2px 8px;border-radius:3px;cursor:pointer;text-transform:uppercase;margin-left:auto;
  background:transparent;color:var(--sph-dim);border:1px solid var(--sph-border)}
.edit-toggle:hover{color:var(--sph-accent);border-color:var(--sph-accent)}
.edit-preview{flex:1;overflow-y:auto;background:var(--sph-bg)}
.edit-plain{flex:1;overflow-y:auto;background:var(--sph-surface);
  font-size:var(--sph-font-size);
  color:var(--sph-text);padding:12px 16px;white-space:pre;line-height:1.7}
  `;
  document.head.appendChild(s);
}

// ── Build panel ──
function _editBuild(tabName, container, isHtml, opts){
  const src   = opts.src    ?? '';
  const mode  = opts.mode   ?? (isHtml ? 'preview' : 'edit');
  const ro    = opts.readonly ?? false;
  const onSave= opts.onSave ?? null;

  // ── bar ──
  const bar=mk('div');bar.className='edit-bar';
  const lbl=mk('span');lbl.className='edit-mode-label';
  const toggleBtn=mk('button');toggleBtn.className='edit-toggle';
  bar.appendChild(lbl);
  if(!ro)bar.appendChild(toggleBtn);
  container.appendChild(bar);

  // ── preview area ──
  const preview=mk('div');preview.className='edit-preview';
  if(isHtml)preview.innerHTML=src;
  else{preview.className='edit-plain';preview.textContent=src;}
  container.appendChild(preview);

  // ── textarea ──
  const ta=mk('textarea');ta.className='ed';ta.spellcheck=false;ta.value=src;
  ta.addEventListener('keydown',e=>{
    if(e.key==='Tab'){e.preventDefault();
      const s=ta.selectionStart,en=ta.selectionEnd;
      ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en);
      ta.selectionStart=ta.selectionEnd=s+2;}
  });
  ta.addEventListener('input',()=>{if(onSave)onSave(ta.value);});
  container.appendChild(ta);

  // ── mode state ──
  let _mode=mode;
  function _apply(){
    if(_mode==='preview'){
      ta.style.display='none';preview.style.display='';
      lbl.textContent='PREVIEW';toggleBtn.textContent='? EDIT';
    } else if(_mode==='source'){
      ta.style.display='none';preview.style.display='';
      lbl.textContent='SOURCE';toggleBtn.textContent='? EDIT';
    } else {
      // edit mode ? use current ta.value (already synced via onSave)
      ta.style.display='';preview.style.display='none';
      lbl.textContent='EDIT';toggleBtn.textContent='? PREVIEW';
    }
  }
  // EXT tabs default to source mode
  const _tabGet=sph._reg.get('ide.tab.list');
  const _tabList=_tabGet?_tabGet():[];
  const _tabType=Array.isArray(_tabList)?_tabList.find(t=>t.name===tabName)?.type:'';
  if(isHtml&&_tabType==='ext') _mode='source';
  _apply();

  toggleBtn.onclick=()=>{
    _mode=(_mode==='edit')?'preview':'edit';
    if(_mode==='preview'&&isHtml)preview.innerHTML=ta.value;
    else if(_mode==='preview')preview.textContent=ta.value;
    _apply();
  };

  // ── public API ──
  return{
    setMode(m){_mode=m;_apply();},
    getMode(){return _mode;},
    getSrc(){return ta.value;},
    setSrc(s){ta.value=s;if(onSave)onSave(s);
      if(_mode==='preview'){if(isHtml)preview.innerHTML=s;else preview.textContent=s;}},
  };
}

// ── Register APIs ──
// edit.open and edit.isHtml registered via sph.mount('edit') above

const _editPanelHtml='<div style="font-size:var(--sph-sz-lg);color:var(--sph-text);padding:20px">'
  +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--sph-border)">'
  +'<span style="font-size:var(--sph-sz-lg);letter-spacing:var(--sph-ls-head);color:var(--sph-accent)">◆ EDIT</span>'
  +'<button onclick="sph.call(\'ide.frame.unmount\')" class="sph-btn">← EXT</button>'
  +'</div>'
  +'<p style="font-size:var(--sph-sz-md);color:var(--sph-dim);line-height:1.7">Provides preview / edit panel for DOC / EXT / SECTION tabs.<br>API: edit.open(tabName, div, isHtml, opts)</p>'
  +'</div>';
sph.mount('edit','EDIT',{
  panel:()=>_editPanelHtml,
  commands:[
    {name:'edit.open',   desc:'Build an editor panel for a tab. Delegated from buildPanel',args:'tabName, containerDiv, isHtml, opts'},
    {name:'edit.isHtml', desc:'Returns true if the tab type renders as HTML preview',      args:'type → boolean'},
  ],
  api:{
    open:   (tabName,container,isHtml,opts)=>_editBuild(tabName,container,isHtml,opts??{}),
    isHtml: (type)=>type==='doc'||type==='ext'||type==='section'||type==='html',
  },
});
})();
</script>

<script type="sph/ext" data-ext-id="debug">
(function(){
// ── DEBUG EXT ──────────────────────────────────────────────────
// Trace  : sph:block-call / sph:block-return events
// Console: traps console.log/warn/error
// Errors : window.onerror / unhandledrejection
// ──────────────────────────────────────────────────────────────
let _traceEnabled=false;
let _consoleEnabled=true;  // enabled by default
const MAX_TRACE=200;
const MAX_CONSOLE=500;
let _traceLog=[];
let _consoleLog=[];
let _activeTab='console'; // 'trace' | 'console'

// ── Console trap ──
// Capture native methods before any possible overwrite
// Use Object.getOwnPropertyDescriptor to get true native refs
const _nativeConsole=window.console;
function _safe(fn){
  if(typeof fn==='function'){
    try{return fn.bind(_nativeConsole);}catch(_){return fn;}
  }
  // fn is undefined/null ? return no-op
  return function(){};
}
// Guard: if already trapped (double-load), restore from saved originals first
if(_nativeConsole._sphTrapped){
  const o=_nativeConsole._sphOrig||{};
  ['log','warn','error','info'].forEach(k=>{
    if(typeof o[k]==='function')try{_nativeConsole[k]=o[k];}catch(_){}
  });
}
const _origConsole={
  log  :_safe(_nativeConsole.log),
  warn :_safe(_nativeConsole.warn),
  error:_safe(_nativeConsole.error),
  info :_safe(_nativeConsole.info),
};
try{_nativeConsole._sphOrig=_origConsole;_nativeConsole._sphTrapped=true;}catch(_){}
function _pushConsole(level,args){
  if(!_consoleEnabled)return;
  let msg='';
  try{msg=args.map(a=>typeof a==='string'?a:JSON.stringify(a)).join(' ');}
  catch(_){msg=String(args);}
  _consoleLog.push({t:Date.now(),level,msg});
  if(_consoleLog.length>MAX_CONSOLE)_consoleLog.shift();
  _refreshPanel();
  try{_origConsole[level]?.(...args);}catch(_){}
}
try{
  console.log   =(...a)=>_pushConsole('log',a);
  console.warn  =(...a)=>_pushConsole('warn',a);
  console.error =(...a)=>_pushConsole('error',a);
  console.info  =(...a)=>_pushConsole('info',a);
}catch(_){}

// ── Window error trap ──
window.addEventListener('error',e=>{
  _pushConsole('error',[`[JS Error] ${e.message}`,`  at ${e.filename}:${e.lineno}:${e.colno}`]);
});
window.addEventListener('unhandledrejection',e=>{
  const msg=e.reason?.message||String(e.reason)||'Unhandled Promise rejection';
  _pushConsole('error',['[Promise] '+msg]);
});

// ── SPH block trace ──







document.addEventListener('sph:block-call',({detail})=>{
  if(!_traceEnabled)return;
  _traceLog.push({t:Date.now(),ev:'call',name:detail.name,args:detail.args});
  if(_traceLog.length>MAX_TRACE)_traceLog.shift();
  if(_activeTab==='trace')_refreshPanel();
});
document.addEventListener('sph:block-return',({detail})=>{
  if(!_traceEnabled)return;
  _traceLog.push({t:Date.now(),ev:'return',name:detail.name,value:detail.value});
  if(_traceLog.length>MAX_TRACE)_traceLog.shift();
  if(_activeTab==='trace')_refreshPanel();
});
document.addEventListener('sph:run-start',()=>{
  if(_traceEnabled){_traceLog=[];}
  _refreshPanel();
});

// ── Panel render ──
function _ts(t){return new Date(t).toISOString().slice(11,23);}
function _levelColor(lv){
  return{log:'var(--sph-text)',warn:'var(--sph-warn)',error:'var(--sph-err)',info:'var(--sph-dim)'}[lv]||'var(--sph-text)';
}
function _refreshPanel(){
  const el=$id('dbg-content');if(!el)return;
  // Sync tab button highlight
  ['trace','console'].forEach(tab=>{
    const btn=$id('dbg-tab-'+tab);
    if(btn)btn.style.color=_activeTab===tab?'var(--sph-accent)':'var(--sph-dim)';
  });
  if(_activeTab==='console'){
    const rows=_consoleLog.slice(-100).reverse();
    el.innerHTML=rows.length?rows.map(r=>
      `<div style="font-size:var(--sph-sz-md);padding:2px 0;border-bottom:1px solid var(--sph-border)22;color:${_levelColor(r.level)}">`
      +`<span style="color:var(--sph-dim);margin-right:6px;font-size:var(--sph-sz-sm)">${_ts(r.t)}</span>`
      +`<span style="margin-right:4px;font-size:var(--sph-sz-sm);opacity:.7">${r.level.toUpperCase()}</span>`
      +`<span>${r.msg}</span></div>`
    ).join(''):'<div style="font-size:var(--sph-sz-md);color:var(--sph-dim);padding:8px 0">No console output.</div>';
  } else {
    const rows=_traceLog.slice(-100).reverse();
    el.innerHTML=rows.length?rows.map(r=>{
      const col=r.ev==='call'?'var(--sph-accent)':'var(--sph-ok)';
      const detail=r.ev==='call'
        ?`(${(r.args||[]).map(a=>{try{return JSON.stringify(a);}catch(_){return '?';}}).join(', ')})`
        :`→ ${(()=>{try{return JSON.stringify(r.value);}catch(_){return '?';}})()}`;
      return `<div style="font-size:var(--sph-sz-md);padding:2px 0;border-bottom:1px solid var(--sph-border)22">`
        +`<span style="color:var(--sph-dim);margin-right:6px;font-size:var(--sph-sz-sm)">${_ts(r.t)}</span>`
        +`<span style="color:${col}">${r.ev==='call'?'?':'?'} ${r.name}</span>`
        +`<span style="color:var(--sph-dim);margin-left:4px;font-size:var(--sph-sz-sm)">${detail}</span></div>`;
    }).join('')
    :(_traceEnabled
      ?'<div style="font-size:var(--sph-sz-md);color:var(--sph-dim);padding:8px 0">Waiting for RUN...</div>'
      :'<div style="font-size:var(--sph-sz-md);color:var(--sph-dim);padding:8px 0">Enable trace then RUN.</div>');
  }
}

const _tabBtn=(id,label,onclick)=>
  `<button id="dbg-tab-${id}" onclick="${onclick}" class="sph-btn">${label}</button>`;

const _dbgPanel=
  '<div style="font-size:var(--sph-sz-lg);color:var(--sph-text);padding:12px 16px;height:100%;display:flex;flex-direction:column;gap:0">'
  +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid var(--sph-border)">'
  +'<span style="font-size:var(--sph-sz-lg);letter-spacing:var(--sph-ls-head);color:var(--sph-accent)">◆ DEBUG</span>'
  +'<div style="display:flex;gap:4px">'
  +_tabBtn('console','Console',"sph.call('debug.tab',['console'])")
  +_tabBtn('trace','Trace',"sph.call('debug.tab',['trace'])")
  +'<button onclick="sph.call(\'debug.enable\')" class="sph-btn sph-btn-ok">◉ Trace</button>'
  +'<button onclick="sph.call(\'debug.clear\')" class="sph-btn">CLR</button>'
  +'<button onclick="sph.call(\'ide.frame.unmount\')" class="sph-btn">← EXT</button>'
  +'</div></div>'
  +'<div id="dbg-content" style="flex:1;overflow-y:auto;font-size:var(--sph-sz-md);line-height:1.6"></div>'
  +'</div>';

// _dbgTab → sph.register経由 (window.* 不要)

sph.mount('debug','DEBUG',{
  panel:()=>_dbgPanel,
  commands:[
    {name:'debug.enable',     desc:'Enable block call tracing'},
    {name:'debug.disable',    desc:'Disable block call tracing'},
    {name:'debug.is_enabled', desc:'Returns whether tracing is currently enabled',args:'→ boolean'},
    {name:'debug.trace_log',  desc:'Returns the block trace log array',args:'→ [{t,ev,name,args|value}]'},
    {name:'debug.console_log',desc:'Returns the captured console log array',args:'→ [{t,level,msg}]'},
    {name:'debug.clear',      desc:'Clear both trace log and console log'},
    {name:'debug.tab',        desc:'Switch debug panel tab',args:'tab: "console"|"trace"'},
  ],
  api:{
    enable:     ()=>{_traceEnabled=true;_traceLog=[];_pushConsole('info',['[DEBUG] trace enabled']);sph.emit('debug-enabled',{});},
    disable:    ()=>{_traceEnabled=false;_pushConsole('info',['[DEBUG] trace disabled']);sph.emit('debug-disabled',{});},
    is_enabled: ()=>_traceEnabled,
    trace_log:  ()=>[..._traceLog],
    console_log:()=>[..._consoleLog],
    clear:      ()=>{_traceLog=[];_consoleLog=[];_refreshPanel();},
    tab:        (t)=>{_activeTab=t;_refreshPanel();},
  },
  on:{
    'frame-mounted': ({id})=>{ if(id==='debug')setTimeout(_refreshPanel,50); },
  },
});

// debug cleanup handled by sph.mount/_mounts
})();
</script>

<script type="sph/ext" data-ext-id="tester">
(function(){
// test.add(name, fn) ? register a block unit test
// fn: async ({assert, run, compile, log}) => { assert(await run() === expected); }
const _tests=[];
let _results=[];



// test.run_all via sph.mount



function _refreshTestPanel(){
  const list=$id('tst-results');if(!list)return;
  if(!_results.length){list.innerHTML='<div style="color:var(--sph-dim);font-size:var(--sph-sz-md)">No results yet. Add tests and run.</div>';return;}
  const pass=_results.filter(r=>r.ok).length;
  list.innerHTML=`<div style="font-size:var(--sph-sz-md);margin-bottom:8px;color:${pass===_results.length?'var(--sph-ok)':'var(--sph-err)'}">`
    +`${pass} / ${_results.length} passed</div>`
    +_results.map(r=>`<div style="font-size:var(--sph-sz-md);padding:3px 0;border-bottom:1px solid var(--sph-border)44;display:flex;gap:8px">`
      +`<span style="color:${r.ok?'var(--sph-ok)':'var(--sph-err)'}">${r.ok?'?':'?'}</span>`
      +`<span>${r.name}</span>`
      +(r.msg?`<span style="color:var(--sph-err);font-size:var(--sph-sz-sm)">${r.msg}</span>`:'')
      +'</div>').join('');
}

const _tstPanel=
  '<div style="font-size:var(--sph-sz-lg);color:var(--sph-text);padding:16px;height:100%;display:flex;flex-direction:column">'
  +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--sph-border)">'
  +'<span style="font-size:var(--sph-sz-lg);letter-spacing:var(--sph-ls-head);color:var(--sph-accent)">◆ TESTER</span>'
  +'<div style="display:flex;gap:6px">'
  +'<button onclick="sph.call(\'test.run_all\')" class="sph-btn sph-btn-ok">▶ Run All</button>'
  +'<button onclick="sph.call(\'test.clear\')" class="sph-btn">CLR</button>'
  +'<button onclick="sph.call(\'ide.frame.unmount\')" class="sph-btn">← EXT</button>'
  +'</div></div>'
  +'<div style="font-size:var(--sph-sz-md);color:var(--sph-dim);margin-bottom:8px">Add tests via <code>sph.call(\'test.add\', name, fn)</code> or from a LIB tab.</div>'
  +'<div id="tst-results" style="flex:1;overflow-y:auto"></div>'
  +'</div>';

sph.mount('tester','TESTER',{
  panel:()=>_tstPanel,
  commands:[
    {name:'test.add',     desc:'Register a test case',args:'name, fn: async({assert,run,compile,log})=>void'},
    {name:'test.run_all', desc:'Run all tests against the active DSL tab',args:'→ [{name,ok,msg?,log}]'},
    {name:'test.results', desc:'Return results from the last test run',args:'→ [{name,ok,msg?,log}]'},
    {name:'test.clear',   desc:'Clear all registered tests and results'},
  ],
  api:{
    add:     (name,fn)=>{_tests.push({name,fn});},
    run_all: async()=>{
      _results=[];
      if(!_tests.length){_results.push({name:'(no tests)',ok:false,msg:'Add tests with test.add(name, fn)'});_refreshTestPanel();return _results;}
      const tabGet=sph._reg.get('ide.tab.get'),tabList=sph._reg.get('ide.tab.list');
      const active=sph._reg.get('ide.tab.active')?.(),src=tabGet?.(active)||'';
      const tabs=Array.isArray(tabList?.())?tabList():[];
      const libs=tabs.filter(t=>t.type==='lib').reduce((o,t)=>{o[t.name]=tabGet?.(t.name)||'';return o;},{});
      const docs=tabs.filter(t=>t.type==='doc'||t.type==='section').reduce((o,t)=>{o[t.name]=tabGet?.(t.name)||'';return o;},{});
      const compiled=sph.compile(src,libs,docs);
      if(compiled.errors.length){_results.push({name:'[compile]',ok:false,msg:compiled.errors[0].code});_refreshTestPanel();return _results;}
      for(const t of _tests){
        const output=[];const logFn=(_,m)=>output.push(String(m));
        try{
          let passed=true,failMsg='';
          const assert=(cond,msg)=>{if(!cond){passed=false;failMsg=msg||'assertion failed';throw new Error(failMsg);}};
          await t.fn({assert,run:async()=>sph.run(compiled.registry,{mem:compiled.memOpts,docs,log:logFn}),compile:(s)=>sph.compile(s,libs,docs),log:output});
          _results.push({name:t.name,ok:true,log:output});
        }catch(e){_results.push({name:t.name,ok:false,msg:e.message,log:output});}
      }
      _refreshTestPanel();return _results;
    },
    results:()=>[..._results],
    clear:()=>{_tests.length=0;_results=[];_refreshTestPanel();},
  },
});
})();
</script>

<script type="sph/meta" data-ext-id="key">

<script type="sph/ext" data-ext-id="key">
(function(){
'use strict';
const KC={enabled:true,injections:new Map(),defaultBlocked:true};
// blocked by default
const BLOCKED={
  'f12':1,'ctrl+shift+i':1,'ctrl+shift+j':1,'ctrl+shift+c':1,
  'ctrl+u':1,'ctrl+p':1,'ctrl+s':1,
};
function _norm(e){
  const p=[];
  if(e.ctrlKey||e.metaKey)p.push('ctrl');
  if(e.shiftKey)p.push('shift');
  if(e.altKey)p.push('alt');
  const k=e.key.toLowerCase();
  if(k!=='control'&&k!=='shift'&&k!=='alt'&&k!=='meta')p.push(k);
  return p.join('+');
}
function _kd(e){
  if(!KC.enabled)return;
  const combo=_norm(e);
  if(KC.injections.has(combo)){
    const r=KC.injections.get(combo)(e);
    if(r===false){e.preventDefault();e.stopPropagation();}
    return;
  }
  if(KC.defaultBlocked&&BLOCKED[combo]){e.preventDefault();e.stopPropagation();}
}
function _cm(e){
  if(!KC.enabled)return;
  if(KC.injections.has('contextmenu')){const r=KC.injections.get('contextmenu')(e);if(r===false)e.preventDefault();return;}
  if(KC.defaultBlocked&&BLOCKED['contextmenu'])e.preventDefault();
}
function _ss(e){
  if(!KC.enabled)return;
  const t=e.target;
  if(t.tagName==='TEXTAREA'||t.tagName==='INPUT'||t.contentEditable==='true'||t.classList.contains('ed'))return;
  if(KC.injections.has('selectstart')){const r=KC.injections.get('selectstart')(e);if(r===false)e.preventDefault();return;}
  if(KC.defaultBlocked)e.preventDefault();
}
function _ds(e){
  if(!KC.enabled)return;
  if(KC.injections.has('dragstart')){const r=KC.injections.get('dragstart')(e);if(r===false)e.preventDefault();return;}
  if(KC.defaultBlocked)e.preventDefault();
}
document.addEventListener('keydown',_kd,true);
document.addEventListener('contextmenu',_cm,true);
document.addEventListener('selectstart',_ss,true);
document.addEventListener('dragstart',_ds,true);

const _panel=()=>sph.ui.panel('key',
  sph.ui.section('Status',
    `<div style="display:flex;gap:8px;align-items:center">
      <span class="sph-meta">Input control:</span>
      <button onclick="sph.call('key.enable')" class="sph-btn sph-btn-ok">Enable</button>
      <button onclick="sph.call('key.disable')" class="sph-btn">Disable</button>
    </div>`
  )+
  sph.ui.section('Block / Unblock',
    sph.ui.row('Operation',`<input id="key-op-in" class="sph-input" style="flex:1" placeholder="e.g. ctrl+s">`)+
    `<div style="display:flex;gap:6px;margin-top:6px">
      <button onclick="sph.call('key.block',[document.getElementById('key-op-in').value])" class="sph-btn">Block</button>
      <button onclick="sph.call('key.unblock',[document.getElementById('key-op-in').value])" class="sph-btn sph-btn-ok">Unblock</button>
    </div>`
  )
);

sph.mount('key','KEY_EXT',{
  panel:_panel,
  builtin:true,
  commands:[
    {name:'key.enable',   desc:'Enable input control'},
    {name:'key.disable',  desc:'Disable all input control'},
    {name:'key.block',    desc:'Block an operation',args:'combo: string'},
    {name:'key.unblock',  desc:'Unblock an operation',args:'combo: string'},
    {name:'key.inject',   desc:'Register custom handler',args:'combo, fn: (e)=>bool'},
    {name:'key.eject',    desc:'Remove custom handler',args:'combo: string'},
  ],
  api:{
    enable:    ()=>{KC.enabled=true;},
    disable:   ()=>{KC.enabled=false;},
    block:     (op)=>{BLOCKED[String(op).toLowerCase()]=1;},
    unblock:   (op)=>{delete BLOCKED[String(op).toLowerCase()];},
    inject:    (op,fn)=>{KC.injections.set(String(op).toLowerCase(),fn);},
    eject:     (op)=>{KC.injections.delete(String(op).toLowerCase());},
    is_enabled:()=>KC.enabled,
    blocked:   ()=>Object.keys(BLOCKED),
    consume:(data,from)=>{if(data?.block)sph.call('key.block',[data.block]);if(data?.unblock)sph.call('key.unblock',[data.unblock]);},
    produce:()=>({enabled:KC.enabled,injections:[...KC.injections.keys()]}),
    describe:()=>({cat:'B',version:'1.0',consumes:[],produces:[],signals:[]}),
  },
});
})();
</script>

<script type="sph/meta" data-ext-id="bridge">

{
  "cat": "B",
  "version": "1.0",
  "label": "BRIDGE",
  "consumes": [],
  "produces": [],
  "signals": [
    "abcd:pipe"
  ],
  "permissions": []
}

</script>
<script type="sph/ext" data-ext-id="bridge">
(function(){
'use strict';
const _channels=new Map();
const _syncPts=new Map();
const _buffers=new Map();

// ── Channel ──────────────────────────────────────────────────────
class Channel{
  constructor(id,mode='async'){this.id=id;this.mode=mode;this.subs=new Set();this.history=[];}
  publish(data,sender='?'){
    const env={id:`msg_${Date.now()}_${Math.random().toString(36).slice(2)}`,ch:this.id,sender,data,t:Date.now()};
    this.history.push(env);if(this.history.length>200)this.history.shift();
    const deliver=()=>{for(const fn of this.subs){try{fn(env);}catch(e){console.warn('[bridge.ch]',e);}}};
    if(this.mode==='async')setTimeout(deliver,0);else deliver();
    return env.id;
  }
  subscribe(fn){this.subs.add(fn);return()=>this.subs.delete(fn);}
  clear(){this.subs.clear();this.history=[];}
}

// ── SyncPoint ────────────────────────────────────────────────────
class SyncPoint{
  constructor(id,n){this.id=id;this.n=n;this.arrived=new Set();this.waiters=[];this.done=false;}
  arrive(pid){
    if(this.done)return;
    this.arrived.add(pid);
    if(this.arrived.size>=this.n){this.done=true;for(const r of this.waiters)r();this.waiters=[];}
  }
  async wait(){if(this.done)return;return new Promise(r=>this.waiters.push(r));}
  reset(){this.arrived.clear();this.done=false;this.waiters=[];}
}

// ── SharedBuffer ─────────────────────────────────────────────────
class SharedBuf{
  constructor(id,size=1024){
    this.id=id;
    // crossOriginIsolated=trueかつSAB利用可能時のみSABを使用
    // そうでなければArrayBufferにfallback（Worker間共有不可だが安全）
    const canSAB=window.crossOriginIsolated&&typeof SharedArrayBuffer!=='undefined';
    this.buf=canSAB?new SharedArrayBuffer(size):new ArrayBuffer(size);
    this.isShared=canSAB;
    this.dv=new DataView(this.buf);this.size=size;
  }
  // raw ArrayBuffer/SABへのアクセス（monitor等がUint8ClampedArrayを作る際に使用）
  get raw(){return this.buf;}
  get byteLength(){return this.buf.byteLength;}
  read(off,t='i32'){
    switch(t){case'i32':return this.dv.getInt32(off,true);case'f32':return this.dv.getFloat32(off,true);case'f64':return this.dv.getFloat64(off,true);case'i8':return this.dv.getInt8(off);}
  }
  write(off,v,t='i32'){
    switch(t){case'i32':this.dv.setInt32(off,v,true);break;case'f32':this.dv.setFloat32(off,v,true);break;case'f64':this.dv.setFloat64(off,v,true);break;case'i8':this.dv.setInt8(off,v);break;}
  }
  atomicLoad(off){return this.isShared&&Atomics?Atomics.load(new Int32Array(this.buf),off>>2):this.read(off);}
  atomicStore(off,v){return this.isShared&&Atomics?Atomics.store(new Int32Array(this.buf),off>>2,v):this.write(off,v);}
  atomicAdd(off,v){return this.isShared&&Atomics?Atomics.add(new Int32Array(this.buf),off>>2,v):(this.write(off,this.read(off)+v),this.read(off)-v);}
}

// ── Panel ─────────────────────────────────────────────────────────
function _refreshBridgePanel(){
  const el=document.getElementById('bridge-status');if(!el)return;
  el.innerHTML=
    `<div class="sph-meta">Channels: ${_channels.size}</div>`+
    `<div class="sph-meta">SyncPoints: ${_syncPts.size}</div>`+
    `<div class="sph-meta">SharedBuffers: ${_buffers.size}</div>`+
    [..._channels.entries()].map(([id,ch])=>
      `<div style="font-size:9px;color:var(--sph-dim);margin-top:4px">`+
      `?? ${id} (${ch.mode}) ? ${ch.subs.size} subs, ${ch.history.length} msgs</div>`
    ).join('');
}

sph.mount('bridge','BRIDGE_EXT',{
  builtin:true,
  panel:()=>sph.ui.panel('bridge',
    sph.ui.section('Status','<div id="bridge-status" class="sph-meta">No channels</div>')+
    `<div style="margin-top:8px;display:flex;gap:6px">
      <button onclick="sph.call('bridge.refresh')" class="sph-btn">↺ Refresh</button>
    </div>`
  ),
  commands:[
    {name:'bridge.channel.create', desc:'Create a message channel',args:'id, mode?:"async"|"sync"'},
    {name:'bridge.channel.publish',desc:'Publish data to a channel',args:'id, data, sender?'},
    {name:'bridge.channel.sub',    desc:'Subscribe to a channel',args:'id, fn:(env)=>void → unsub fn'},
    {name:'bridge.channel.delete', desc:'Delete a channel',args:'id'},
    {name:'bridge.sync.create',    desc:'Create a sync point',args:'id, expectedCount'},
    {name:'bridge.sync.arrive',    desc:'Arrive at sync point',args:'syncId, participantId'},
    {name:'bridge.sync.wait',      desc:'Wait at sync point (async)',args:'syncId → Promise'},
    {name:'bridge.buf.create',     desc:'Create shared buffer',args:'id, size?'},
    {name:'bridge.buf.read',       desc:'Read from buffer',args:'id, offset, type?'},
    {name:'bridge.buf.write',      desc:'Write to buffer',args:'id, offset, value, type?'},
  ],
  api:{
    'channel.create': (id,mode='async')=>{if(!_channels.has(id))_channels.set(id,new Channel(id,mode));return _channels.get(id);},
    'channel.get':    (id)=>_channels.get(id),
    'channel.publish':(id,data,sender)=>{const ch=_channels.get(id);return ch?ch.publish(data,sender):null;},
    'channel.sub':    (id,fn)=>{const ch=_channels.get(id);return ch?ch.subscribe(fn):null;},
    'channel.delete': (id)=>{const ch=_channels.get(id);if(ch)ch.clear();_channels.delete(id);},
    'sync.create':    (id,n)=>{const sp=new SyncPoint(id,n);_syncPts.set(id,sp);return sp;},
    'sync.arrive':    (id,pid)=>_syncPts.get(id)?.arrive(pid),
    'sync.wait':      (id)=>_syncPts.get(id)?.wait()||Promise.resolve(),
    'sync.reset':     (id)=>_syncPts.get(id)?.reset(),
    'sync.delete':    (id)=>_syncPts.delete(id),
    'buf.create':     (id,size=1024)=>{if(!_buffers.has(id))_buffers.set(id,new SharedBuf(id,size));return _buffers.get(id);},
    'buf.get':        (id)=>_buffers.get(id),
    'buf.raw':        (id)=>_buffers.get(id)?.raw??null,     // raw ArrayBuffer/SAB
    'buf.isShared':   (id)=>_buffers.get(id)?.isShared??false, // SAB利用中か

    'buf.read':       (id,off,t='i32')=>_buffers.get(id)?.read(off,t)??null,
    'buf.write':      (id,off,v,t='i32')=>_buffers.get(id)?.write(off,v,t),
    'buf.atomicLoad': (id,off)=>_buffers.get(id)?.atomicLoad(off)??null,
    'buf.atomicStore':(id,off,v)=>_buffers.get(id)?.atomicStore(off,v),
    'buf.atomicAdd':  (id,off,v)=>_buffers.get(id)?.atomicAdd(off,v),
    'buf.delete':     (id)=>_buffers.delete(id),
    'refresh':        ()=>_refreshBridgePanel(),
    // ABCD standard interface
    consume:(data,from)=>{
      if(data?.channel&&data?.payload)
        sph.call('bridge.channel.publish',[data.channel,data.payload,from]);
    },
    produce:()=>({
      channels:[..._channels.keys()],
      buffers:[..._buffers.keys()],
    }),
    describe:()=>({cat:'B',version:'1.0',consumes:[],produces:[],signals:['abcd:pipe']}),
  },
  on:{'frame-mounted':({id})=>{if(id==='bridge')setTimeout(_refreshBridgePanel,50);}},
});
})();
</script>
