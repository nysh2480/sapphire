<script type="sph/ext" data-ext-id="worker">
(function(){
'use strict';
const _workers=new Map();
let _awMgr=null;

// ── ManagedWorker ─────────────────────────────────────────────────
class ManagedWorker{
  constructor(id,code){
    this.id=id;this._handlers=new Map();this._mid=0;
    const blob=new Blob([code],{type:'application/javascript'});
    this._url=URL.createObjectURL(blob);
    this._w=new Worker(this._url);
    this._w.onmessage=({data})=>{
      const{id,type,data:d,error}=data;
      if(id&&this._handlers.has(id)){
        const{resolve,reject}=this._handlers.get(id);
        this._handlers.delete(id);
        error?reject(new Error(error)):resolve(d);
      }
      if(!id&&type)this.onBroadcast?.(type,d);
    };
    this._w.onerror=(e)=>{console.error('[worker:'+this.id+']',e);this.onError?.(e);};
  }
  async post(type,data){
    const mid=`m${this._mid++}`;
    return new Promise((resolve,reject)=>{
      this._handlers.set(mid,{resolve,reject});
      this._w.postMessage({id:mid,type,data});
      setTimeout(()=>{if(this._handlers.has(mid)){this._handlers.delete(mid);reject(new Error('timeout:'+type));}},10000);
    });
  }
  send(type,data){this._w.postMessage({type,data});}
  terminate(){this._w.terminate();URL.revokeObjectURL(this._url);this._handlers.clear();}
}

function _buildWorkerCode(cfg){
  const{name='worker',handlers={}}=cfg;
  const cases=Object.entries(handlers).map(([t,fn])=>
    `case '${t}': try{const r=await (${fn.toString()})(data);self.postMessage({id,type:'${t}',data:r});}catch(e){self.postMessage({id,error:e.message});}break;`
  ).join('\n    ');
  return `/* Worker: ${name} */\nself.onmessage=async({data:{id,type,data}})=>{\n  switch(type){\n    ${cases}\n    default:if(id)self.postMessage({id,error:'unknown:'+type});\n  }\n};\nfunction broadcast(type,data){self.postMessage({type,data});}`;
}

// ── AudioWorkletManager ──────────────────────────────────────────
class AWManager{
  constructor(){this._ctx=null;this._nodes=new Map();}
  async init(){
    if(!this._ctx){this._ctx=new(window.AudioContext||window.webkitAudioContext)();}
    if(this._ctx.state==='suspended')await this._ctx.resume();
    return this._ctx;
  }
  async register(name,code){
    await this.init();
    const blob=new Blob([code],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    try{await this._ctx.audioWorklet.addModule(url);}finally{URL.revokeObjectURL(url);}
  }
  create(name,opts={}){
    if(!this._ctx)throw new Error('AudioContext not initialized');
    const node=new AudioWorkletNode(this._ctx,name,opts);
    this._nodes.set(name,node);return node;
  }
  get(name){return this._nodes.get(name);}
  remove(name){const n=this._nodes.get(name);if(n){n.disconnect();this._nodes.delete(name);}}
  get ctx(){return this._ctx;}
}

// ── Panel ─────────────────────────────────────────────────────────
function _refreshWorkerPanel(){
  const el=document.getElementById('worker-status');if(!el)return;
  el.innerHTML=
    `<div class="sph-meta">Workers: ${_workers.size}</div>`+
    `<div class="sph-meta">AudioWorklets: ${_awMgr?_awMgr._nodes.size:0}</div>`+
    [..._workers.keys()].map(id=>`<div style="font-size:9px;color:var(--sph-dim);margin-top:2px">\u2699\uFE0F ${id}</div>`).join('');
}

sph.mount('worker','WORKER_EXT',{
  builtin:true,
  panel:()=>sph.ui.panel('worker',
    sph.ui.section('Status','<div id="worker-status" class="sph-meta">No workers</div>')+
    `<div style="margin-top:8px;display:flex;gap:6px">
      <button onclick="sph.call('worker.terminate_all')" class="sph-btn">■ Terminate All</button>
      <button onclick="sph.call('worker.refresh')" class="sph-btn">↺ Refresh</button>
    </div>`
  ),
  commands:[
    {name:'worker.create',       desc:'Create a Web Worker',args:'id, config:{name,handlers}'},
    {name:'worker.post',         desc:'Post typed message to worker (async)',args:'id, type, data → Promise'},
    {name:'worker.send',         desc:'Fire-and-forget message to worker',args:'id, type, data'},
    {name:'worker.terminate',    desc:'Terminate a worker',args:'id'},
    {name:'worker.terminate_all',desc:'Terminate all workers'},
    {name:'worker.audio.init',   desc:'Initialize AudioContext'},
    {name:'worker.audio.register',desc:'Register AudioWorklet processor',args:'name, processorCode'},
    {name:'worker.audio.create', desc:'Create AudioWorkletNode',args:'name, options?'},
    {name:'worker.audio.node',   desc:'Get AudioWorkletNode',args:'name → AudioWorkletNode'},
    {name:'worker.audio.remove', desc:'Disconnect and remove worklet node',args:'name'},
  ],
  api:{
    create:(id,cfg)=>{
      if(_workers.has(id))return _workers.get(id);
      const code=typeof cfg==='string'?cfg:_buildWorkerCode(cfg||{});
      const w=new ManagedWorker(id,code);
      _workers.set(id,w);return w;
    },
    get:          (id)=>_workers.get(id),
    post:         async(id,type,data)=>_workers.get(id)?.post(type,data)??null,
    send:         (id,type,data)=>_workers.get(id)?.send(type,data),
    terminate:    (id)=>{_workers.get(id)?.terminate();_workers.delete(id);},
    terminate_all:()=>{for(const[,w]of _workers)w.terminate();_workers.clear();},
    refresh:      ()=>_refreshWorkerPanel(),
    // AudioWorklet
    'audio.init':    async()=>{if(!_awMgr)_awMgr=new AWManager();return _awMgr.init();},
    'audio.register':async(name,code)=>{if(!_awMgr)_awMgr=new AWManager();return _awMgr.register(name,code);},
    'audio.create':  (name,opts)=>{if(!_awMgr)throw new Error('init first');return _awMgr.create(name,opts);},
    'audio.node':    (name)=>_awMgr?.get(name),
    'audio.remove':  (name)=>_awMgr?.remove(name),
    'audio.ctx':     ()=>_awMgr?.ctx,
    // ABCD standard interface
    consume:(data,from)=>{
      if(data?.type&&data?.id)sph.call('worker.send',[data.id,data.type,data.payload]);
    },
    produce:()=>({workers:[..._workers.keys()],audioReady:!!_awMgr}),
    describe:()=>({cat:'B',version:'1.0',consumes:[],produces:[],signals:[]}),
  },
  on:{'frame-mounted':({id})=>{if(id==='worker')setTimeout(_refreshWorkerPanel,50);}},
});
})();
</script>

<script type="sph/ext" data-ext-id="sound">
(function(){
'use strict';
let _ctx=null,_master=null,_workletReady=false;

function _ac(){
  if(!_ctx||_ctx.state==='closed'){_ctx=new(window.AudioContext||window.webkitAudioContext)();}
  if(_ctx.state==='suspended')_ctx.resume();
  return _ctx;
}
function _gm(){
  if(!_master||_master.context!==_ctx){
    _master=_ac().createGain();_master.gain.value=.5;_master.connect(_ac().destination);
  }
  return _master;
}

// ── AudioWorklet SynthProcessor (Blob URL でロード) ────────────────
const SYNTH_CODE=[
  'class SynthProcessor extends AudioWorkletProcessor {',
  '  static get parameterDescriptors(){return[',
  '    {name:"frequency",defaultValue:440,minValue:20,maxValue:20000,automationRate:"a-rate"},',
  '    {name:"gain",defaultValue:0.3,minValue:0,maxValue:1,automationRate:"k-rate"},',
  '    {name:"waveform",defaultValue:0,minValue:0,maxValue:3,automationRate:"k-rate"},',
  '  ];}',
  '  constructor(){super();this._phase=0;this._env=0;this._active=false;',
  '    this.port.onmessage=({data})=>{',
  '      if(data.type==="noteOn"){this._active=true;this._env=1;}',
  '      if(data.type==="noteOff"){this._active=false;}',
  '    };',
  '  }',
  '  process(inputs,outputs,params){',
  '    const out=outputs[0][0];if(!out)return true;',
  '    const freq=params.frequency;const gain=params.gain[0];const wf=params.waveform[0]|0;',
  '    for(let i=0;i<out.length;i++){',
  '      const f=freq.length>1?freq[i]:freq[0];',
  '      let s=0;',
  '      switch(wf){',
  '        case 0:s=Math.sin(this._phase*Math.PI*2);break;',
  '        case 1:s=this._phase<0.5?1:-1;break;',
  '        case 2:s=(this._phase*2)-1;break;',
  '        case 3:s=this._phase<0.5?(this._phase*4-1):(3-this._phase*4);break;',
  '      }',
  '      out[i]=s*gain*(this._active?this._env:Math.max(0,this._env-=0.0003));',
  '      this._phase=(this._phase+f/sampleRate)%1;',
  '    }',
  '    return true;',
  '  }',
  '}',
  'registerProcessor("sph-synth",SynthProcessor);',
].join('\n');

async function _ensureWorklet(){
  if(_workletReady)return;
  const ctx=_ac();
  if(!ctx.audioWorklet){console.warn('[sound] AudioWorklet not supported');return;}
  try{
    const blob=new Blob([SYNTH_CODE],{type:'application/javascript'});
    const url=URL.createObjectURL(blob);
    await ctx.audioWorklet.addModule(url);
    URL.revokeObjectURL(url);
    _workletReady=true;
    console.log('[sound] AudioWorklet sph-synth loaded');
  }catch(e){console.warn('[sound] AudioWorklet failed:',e);}
}

let _synthNode=null;
async function _getSynth(){
  await _ensureWorklet();
  const ctx=_ac();
  if(!_workletReady){
    if(!_synthNode||_synthNode.context!==ctx){
      const osc=ctx.createOscillator();const g=ctx.createGain();
      osc.type='sine';osc.frequency.value=440;g.gain.value=0;
      osc.connect(g);g.connect(_gm());osc.start();
      _synthNode={_osc:osc,_gain:g,_isOsc:true};
    }
    return _synthNode;
  }
  if(!_synthNode||_synthNode.context!==ctx){
    _synthNode=new AudioWorkletNode(ctx,'sph-synth',{numberOfInputs:0,numberOfOutputs:1,outputChannelCount:[1]});
    _synthNode.connect(_gm());
    _synthNode._isOsc=false;
  }
  return _synthNode;
}

function _panel(){
  const sel=
    '<select id="snd-wave" class="sph-input" style="flex:1"'
    +' onchange="sph.call(\'sound.synth.wave\',[+this.value])">'
    +'<option value="0">Sine</option><option value="1">Square</option>'
    +'<option value="2">Sawtooth</option><option value="3">Triangle</option>'
    +'</select>';
  const noteBtn=
    '<button onmousedown="sph.call(\'sound.synth.on\')"'
    +' onmouseup="sph.call(\'sound.synth.off\')"'
    +' class="sph-btn sph-btn-ok">&#9654; NoteOn</button>';
  return sph.ui.panel('sound',
    sph.ui.section('Master',
      sph.ui.row('Volume', sph.ui.slider('snd-vol',0,1,.5,'sound.volume'))
    )+
    sph.ui.section('Synth (AudioWorklet)',
      sph.ui.row('Frequency', sph.ui.slider('snd-freq',20,2000,440,'sound.synth.freq'))+
      sph.ui.row('Waveform', sel)+
      '<div style="display:flex;gap:6px;margin-top:8px">'+
      noteBtn+
      '<button onclick="sph.call(\'sound.beep\',[440,0.2])" class="sph-btn">Beep</button>'+
      '<span id="snd-wl-status" style="font-size:9px;color:var(--sph-dim);margin-left:4px;align-self:center"></span>'+
      '</div>'
    )+
    sph.ui.section('Quick',
      '<div style="font-size:9px;color:var(--sph-dim);line-height:1.8">'
      +'sound.beep(freq, dur) &nbsp;&bull;&nbsp; sound.volume(v)<br>'
      +'sound.synth.on(freq?) &nbsp;&bull;&nbsp; sound.synth.off()<br>'
      +'sound.synth.freq(hz) &nbsp;&bull;&nbsp; sound.synth.wave(0-3)'
      +'</div>'
    )
  );
}

sph.mount('sound','SOUND',{
  panel:_panel,
  commands:[
    {name:'sound.beep',          desc:'Play a beep tone',args:'freq:number, dur:number'},
    {name:'sound.volume',        desc:'Set master volume 0-1',args:'v:number'},
    {name:'sound.synth.on',      desc:'Note on (AudioWorklet synth)',args:'freq?:number'},
    {name:'sound.synth.off',     desc:'Note off'},
    {name:'sound.synth.freq',    desc:'Set synth frequency',args:'hz:number'},
    {name:'sound.synth.wave',    desc:'Set waveform 0=sine 1=square 2=saw 3=tri',args:'type:0-3'},
    {name:'sound.worklet.ready', desc:'Returns true if AudioWorklet loaded'},
    {name:'sound.worklet.load',  desc:'Manually trigger AudioWorklet load'},
  ],
  api:{
    beep:(freq=440,dur=0.1)=>{
      const c=_ac(),o=c.createOscillator(),g=c.createGain();
      o.frequency.value=+freq;g.gain.setValueAtTime(.3,c.currentTime);
      g.gain.exponentialRampToValueAtTime(.001,c.currentTime+(+dur));
      o.connect(g);g.connect(_gm());o.start();o.stop(c.currentTime+(+dur));
    },
    volume:(v)=>{_gm().gain.value=Math.max(0,Math.min(1,+v));},
    'synth.on':async(freq)=>{
      const s=await _getSynth();
      if(s._isOsc){s._gain.gain.setTargetAtTime(.3,_ac().currentTime,.01);if(freq)s._osc.frequency.value=+freq;return;}
      if(freq)s.parameters.get('frequency').setValueAtTime(+freq,_ac().currentTime);
      s.port.postMessage({type:'noteOn'});
    },
    'synth.off':async()=>{
      const s=await _getSynth();
      if(s._isOsc){s._gain.gain.setTargetAtTime(0,_ac().currentTime,.05);return;}
      s.port.postMessage({type:'noteOff'});
    },
    'synth.freq':async(hz)=>{
      const s=await _getSynth();
      if(s._isOsc){s._osc.frequency.value=+hz;return;}
      s.parameters.get('frequency').setValueAtTime(+hz,_ac().currentTime);
    },
    'synth.wave':async(type)=>{
      const s=await _getSynth();
      if(s._isOsc){const t=['sine','square','sawtooth','triangle'];s._osc.type=t[+type]||'sine';return;}
      s.parameters.get('waveform').setValueAtTime(+type,_ac().currentTime);
    },
    'worklet.ready':()=>_workletReady,
    'worklet.load': ()=>_ensureWorklet(),
    // ABCD standard interface
    consume:(data,from)=>{
      if(data?.volume!==undefined)sph.call('sound.volume',[data.volume]);
      if(data?.freq!==undefined)sph.call('sound.synth.freq',[data.freq]);
    },
    produce:()=>({volume:_gm()?.gain.value??1,workletReady:_workletReady}),
    describe:()=>({cat:'A',version:'1.0',consumes:['appearance'],produces:['storage'],signals:['sound:played','sound:stopped']}),
  },
  on:{
    'frame-mounted':async({id})=>{
      if(id!=='sound')return;
      await _ensureWorklet();
      const el=document.getElementById('snd-wl-status');
      if(el)el.textContent=_workletReady?'WorkletOK':'FallbackMode';
    },
  },
});
})();
</script>

<script type="sph/ext" data-ext-id="appearance">
(function(){
// ── Theme definitions ──
const _themes={
  dark: {bg:'#06090f',surface:'#0d1520',surface2:'#111d2a',text:'#c8d8e8',dim:'#5a7a9a',accent:'#4c8ef5',ok:'#2de881',err:'#f05575',warn:'#f5c842',border:'#1a2a3a'},
  light:{bg:'#f4f4f0',surface:'#ffffff', surface2:'#f0f0ec',text:'#1a1a2e',dim:'#7a7a8a',accent:'#2563eb',ok:'#16a34a',err:'#dc2626',warn:'#d97706',border:'#d4d4d0'},
  nord: {bg:'#2e3440',surface:'#3b4252', surface2:'#434c5e',text:'#eceff4',dim:'#7b88a1',accent:'#88c0d0',ok:'#a3be8c',err:'#bf616a',warn:'#ebcb8b',border:'#4c566a'},
  mocha:{bg:'#1e1e2e',surface:'#313244', surface2:'#45475a',text:'#cdd6f4',dim:'#6c7086',accent:'#cba6f7',ok:'#a6e3a1',err:'#f38ba8',warn:'#fab387',border:'#45475a'},
};
const _colorKeys=['bg','surface','surface2','text','dim','accent','ok','err','warn','border'];
const _colorLabels={bg:'Background',surface:'Surface',surface2:'Surface 2',text:'Text',dim:'Dim',accent:'Accent',ok:'OK',err:'Error',warn:'Warning',border:'Border'};

// ── Config panel HTML ──
const _cfgHtml=`

.cfg-layout-btns{display:flex;gap:6px;margin-bottom:8px}

.cfg-slider-wrap{display:flex;align-items:center;gap:8px}
.cfg-slider-wrap input[type=range]{flex:1;accent-color:var(--sph-accent)}
.cfg-slider-val{font-size:var(--sph-sz-md);color:var(--sph-text);width:36px;text-align:right;flex-shrink:0}
</style>
<div id="cfg-screen">
  <div class="sph-ph">
    <h2>◆ APPEARANCE</h2>
    <button class="sph-btn" id="cfg-back" id="cfg-back" onclick="sph.call('ide.frame.unmount')">← EXT</button>
  </div>
  <div class="cfg-cols">
    <!-- Theme -->
    <div class="sph-section">
      <h3>THEME</h3>
      <div class="cfg-theme-btns" id="cfg-theme-btns"></div>
      <div id="cfg-colors"></div>
    </div>
    <!-- Editor & Layout -->
    <div class="sph-section">
      <h3>EDITOR</h3>
      <div class="sph-row"><label>Font</label><input type="text" id="cfg-font" value="'Space Mono',monospace"></div>
      <div class="sph-row"><label>Size</label><input type="text" id="cfg-fontsize" value="12px" style="max-width:70px"></div>
      <div class="sph-row"><label>Tab width</label>

          <option value="2">2 spaces</option>
          <option value="4">4 spaces</option>
        </select>
      </div>

      <h3 style="margin-top:14px">LAYOUT</h3>

Split H

// ── Build color inputs ──
function _buildColorInputs(vars){
  const el=$id('cfg-colors');if(!el)return;
  el.innerHTML='';
  for(const k of _colorKeys){
    const v=vars[k]||'';
    const row=mk('div');row.className='cfg-r';
    row.innerHTML=`<label>${_colorLabels[k]||k}</label>`+
      `<input type="color" id="cc-${k}" value="${v.trim()}">`+
      `<input type="text"  id="ct-${k}" value="${v.trim()}">`;
    el.appendChild(row);
    // Keep color picker and text input in sync
    row.querySelector(`#cc-${k}`).addEventListener('input',e=>{
      const t=row.querySelector(`#ct-${k}`);if(t)t.value=e.target.value;
    });
    row.querySelector(`#ct-${k}`).addEventListener('input',e=>{
      const c=row.querySelector(`#cc-${k}`);if(c&&/^#[0-9a-f]{6}$/i.test(e.target.value))c.value=e.target.value;
    });
  }
}
function _getColorValues(){
  const o={};
  for(const k of _colorKeys){
    const t=$id(`ct-${k}`);
    if(t&&t.value)o[k]=t.value.trim();
  }
  return o;
}
// ── Build theme buttons ──
function _buildThemeBtns(current){
  const el=$id('cfg-theme-btns');if(!el)return;
  el.innerHTML='';
  for(const name of Object.keys(_themes)){
    const btn=mk('button');
    btn.className='cfg-theme-btn'+(name===current?' active':'');
    btn.textContent=name;
    btn.onclick=()=>{
      _currentTheme=name;
      sph.call('ide.theme.set',[_themes[name]]);
      _buildColorInputs(_themes[name]);
      el.querySelectorAll('.cfg-theme-btn').forEach(b=>b.classList.toggle('active',b.textContent===name));
    };
    el.appendChild(btn);
  }
}
// ── Reverse-lookup theme name from current CSS vars ──
function _detectThemeName(vars){
  for(const[name,t]of Object.entries(_themes)){
    if(Object.keys(t).every(k=>vars[k]&&vars[k].replace(/\s/g,'')===t[k].replace(/\s/g,'')))
      return name;
  }
  return null;
}
// ── Sync layout UI state ──
function _syncLayoutUI(){
  const _fr=sph._reg.get('ide.frame.get')?.()??'V';const layout={'S':'1','V':'v2','H':'h2'}[_fr]||'v2';
  $$('.cfg-layout-btn').forEach(b=>{
    b.classList.toggle('active',b.dataset.layout===layout);
  });
  // Sync split slider to current ratio
  const ratio=+getComputedStyle(document.documentElement).getPropertyValue('--sph-a-ratio')||0.65;
  const sl=$id('cfg-split');const sv=$id('cfg-split-val');
  if(sl)sl.value=ratio;
  if(sv)sv.textContent=Math.round(ratio*100)+'%';

  const splitRow=$id('cfg-split-row');
  if(splitRow)splitRow.style.display=layout==='1'?'none':'';
}
// ── Apply current state to config UI ──
function _syncConfigUI(){
  const vars=sph._reg.get('ide.theme.get')?.()??{};
  const name=_detectThemeName(vars)||_currentTheme||'dark';
  _currentTheme=name;
  _buildThemeBtns(name);
  _buildColorInputs(vars);
  _syncLayoutUI();
}
// ── Apply config ──
function _applyConfig(){
  _currentTheme=null;
  sph.call('ide.theme.set',[_getColorValues()]);
  const font=$id('cfg-font')?.value;
  const size=$id('cfg-fontsize')?.value;
  sph.call('ide.font.set',[font,size]);
  // Layout already applied in real-time; this is just a safety sync
  const activeLayout=$('.cfg-layout-btn.active')?.dataset.layout;
  if(activeLayout)sph.call('ide.layout.set',[activeLayout]);
}
// ── Init layout buttons and sliders ──
function _initLayoutUI(){
  // Layout buttons (apply in real-time)
  $$('.cfg-layout-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const name=btn.dataset.layout; // S/V/H
      sph.call('ide.frame.set',[name]);
      _syncLayoutUI();
    });
  });
  // split slider already initialised above
}

let _currentTheme='dark';

sph.mount('appearance','APPEARANCE',{
  panel:()=>_cfgHtml,
  commands:[
    {name:'appearance.theme', desc:'Apply a preset theme (dark/light/nord/mocha)',args:'name: string'},
    {name:'appearance.font',  desc:'Set the editor font family and size',args:'font: string, size: string'},
    {name:'appearance.frame',    desc:'Switch IDE frame layout (S/V/H)',args:'svh: string'},
    {name:'appearance.theme_get', desc:'Get current theme name → string'},
    {name:'appearance.themes',    desc:'Get all theme names → string[]'},
    {name:'appearance.get',       desc:'Get CSS var value by key',args:'key: string → string'},
    {name:'appearance.consume',   desc:'Receive theme from another EXT',args:'data, fromId'},
    {name:'appearance.produce',   desc:'Export current theme state → {theme, vars}'},
    {name:'appearance.describe',  desc:'Get ABCD metadata → MetaInfo'},
  ],
  api:{
    /** Apply a preset theme @param {string} name dark|light|nord|mocha */
    theme:      (name)=>{if(!_themes[name])return;_currentTheme=name;sph.call('ide.theme.set',[_themes[name]]);},
    /** Get current theme name */
    theme_get:  ()=>_currentTheme,
    /** Get all available theme names */
    themes:     ()=>Object.keys(_themes),
    /** Set editor font @param {string} font @param {string} size */
    font:       (font,size)=>sph.call('ide.font.set',[font,size]),
    /** Set frame layout @param {string} svh S|V|H */
    frame:      (svh)=>sph.call('ide.frame.set',[svh]),
    layout:     (name)=>sph.call('ide.layout.set',[name]),
    /** Get a single theme CSS var value by key (bg/text/accent etc.) */
    get:        (key)=>{const st=getComputedStyle(document.documentElement);return st.getPropertyValue('--sph-'+(key||'bg')).trim();},
    /** consume: receive theme override from another EXT */
    consume:    (data,from)=>{if(data?.theme&&_themes[data.theme]){sph.call('appearance.theme',[data.theme]);}},
    /** produce: export current theme state */
    produce:    ()=>({theme:_currentTheme,vars:sph.get('ide.theme.get')}),
    /** describe: ABCD metadata */
    describe:   ()=>({cat:'D',version:'1.0',consumes:[],produces:[],signals:['theme:changed']}),
  },
  on:{
    'frame-mounted': ({id})=>{ if(id==='appearance'){_syncConfigUI();_initLayoutUI();} },
    'theme-change':  ({vars})=>{
      if(!vars)return;
      for(const[k,v] of Object.entries(vars)){
        const key=k.startsWith('--sph-')?k.slice(6):k;
        const ct=$id('ct-'+key),cc=$id('cc-'+key);
        if(ct)ct.value=v;if(cc&&/^#[0-9a-f]{6}$/i.test(v.trim()))cc.value=v.trim();
      }
      const allVars=sph.get('ide.theme.get')?sph._reg.get('ide.theme.get')():{};
      const name=_detectThemeName(allVars);_currentTheme=name||_currentTheme;
      $$('.cfg-theme-btn').forEach(b=>b.classList.toggle('active',b.textContent===_currentTheme));
    },
  },
});

// ── Render file table (EXT group aware) ──
function _renderFileTable(){
  const tbody=$id('fv-tbody');if(!tbody)return;
  tbody.innerHTML='';
  // Fetch via ide.tab.list public API (no direct dependency on window.getAllTabs)
  const tabs=(sph._reg.get('ide.tab.list')?.()??[]);
  if(!_fvGroups)_fvGroups=new Map();

  const standalones=tabs.filter(t=>!t.extGroup&&t.type!=='ext');
  const extTabs=tabs.filter(t=>t.type==='ext');

  for(const t of standalones){
    const builtin=t.name==='std';
    tbody.appendChild(_fvRow(t.name,t.type,t.desc,builtin,false,null));
  }
  for(const ext of extTabs){
    const extName=ext.name;
    const isOpen=_fvGroups.get(extName)??false;
    const children=tabs.filter(t=>t.extGroup===extName);
    const tr=mk('tr');
    tr.style.cssText='background:var(--sph-surface)';
    tr.innerHTML=
      `<td><input type="checkbox" class="ft-chk fv-chk" data-name="${extName}"></td>`+
      `<td style="padding-left:6px">`+
        `<button onclick="sph.call('file._fvToggleGroup',['${extName}'])" style="font-size:var(--sph-sz-md);background:none;border:none;cursor:pointer;color:var(--sph-accent);margin-right:4px">${isOpen?'▾':'▸'}</button>`+
        `<span style="font-weight:700;color:var(--sph-accent)">${extName}</span></td>`+
      `<td><span class="ft-type ext">EXT</span></td>`+
      `<td class="ft-desc"><input type="text" value="${ext.desc||''}" placeholder="Description..." data-name="${extName}" onchange="sph.call(\'file._fvSetDesc\',[this.dataset.name,this.value])"></td>`+
      `<td class="ft-ops">`+
        `<button class="ft-op ok" onclick="sph.call('file._fvDeploy',['${extName}'])">▶ Run</button>`+
        `<button class="ft-op" onclick="sph.call('file._fvExportExt',['${extName}'])">↓ Export</button>`+
        `<button class="ft-op del" onclick="sph.call('file._fvDelGroup',['${extName}'])">✕</button>`+
      `</td>`;
    tbody.appendChild(tr);
    if(isOpen){
      for(const c of children){
        tbody.appendChild(_fvRow(c.name,c.type,c.desc,false,true,extName));
      }
    }
  }
}
// Build one table row
function _fvRow(name,type,desc,builtin,isChild,extName){
  const tr=mk('tr');
  if(isChild)tr.style.cssText='background:var(--sph-bg)';
  const indent=isChild?'padding-left:20px':'';
  const ops=
    `<button class="ft-op" onclick="sph.call('file._fvEdit',['${name}'])">Edit</button>`+
    (type==='ext'
      ?`<button class="ft-op ok" onclick="sph.call('file._fvDeploy',['${name}'])">▶ Deploy</button>`
      :`<button class="ft-op" onclick="sph.call('file._fvExportOne',['${name}'])">↓ Export</button>`)+
    (builtin?'':`<button class="ft-op del" onclick="sph.call('file._fvDel',['${name}'])">✕</button>`);
  tr.innerHTML=
    `<td><input type="checkbox" class="ft-chk fv-chk" data-name="${name}"></td>`+
    `<td style="${indent}"><span class="ft-name">${name}</span></td>`+
    `<td><span class="ft-type ${type}">${type.toUpperCase()}</span></td>`+
    `<td class="ft-desc"><input type="text" value="${desc}" placeholder="Description..." `+
      `data-name="${name}" onchange="sph.call(\'file._fvSetDesc\',[this.dataset.name,this.value])"></td>`+
    `<td class="ft-ops">${ops}</td>`;
  return tr;
}
let _fvGroups=new Map();

sph.register('file._fvToggleGroup',function(extName){

sph.register('file._fvDelGroup',function(extName){

<script type="sph/meta" data-ext-id="abcd">

{
  "cat": "C",
  "version": "1.0",
  "label": "ABCD",
  "consumes": [],
  "produces": [],
  "signals": [
    "abcd:registered",
    "abcd:signal",
    "abcd:pipe"
  ],
  "permissions": [
    "dom"
  ]
}

</script>
<script type="sph/ext" data-ext-id="abcd">
(function(){
'use strict';

// ══════════════════════════════════════════════════════════════════
// ABCD RUNTIME
// Sapphire NG EXT カテゴリ管理・EXT間連携基盤
//
// Categories:
//   A - Action     : UI・末端実行系
//   B - Base       : リソース・通信・計算基盤
//   C - Control    : 管理・監視・フロー制御
//   D - Definition : 設定・スキーマ・ドキュメント定義
// ══════════════════════════════════════════════════════════════════

// ── 内部レジストリ ──────────────────────────────────────────────
// Map<extId, ABCDEntry>
// ABCDEntry: { id, cat, version, label, icon, consumes, produces, signals, registeredAt }
const _registry = new Map();

// ✅ v16.2: グローバルイベントリスナーの参照を保持（cleanup用）
// Map<extId, {eventName → handler}>
const _globalListeners = new Map();

// シグナル購読者
// Map<signalName, Set<{extId, fn}>>
const _subscribers = new Map();

// ── カテゴリ定義 ────────────────────────────────────────────────
const CATS = {
  A: { name: 'Action',     desc: 'UI・末端実行系',      color: 'var(--sph-accent)' },
  B: { name: 'Base',       desc: 'リソース・通信基盤',   color: 'var(--sph-ok)'     },
  C: { name: 'Control',    desc: '管理・監視・フロー',   color: 'var(--sph-warn)'   },
  D: { name: 'Definition', desc: '設定・スキーマ・定義', color: 'var(--sph-dim)'    },
};

// ── sph/meta タグの自動収集 ─────────────────────────────────────
function _collectMeta() {
  document.querySelectorAll('script[type="sph/meta"][data-ext-id]').forEach(el => {
    const id = el.dataset.extId;
    if (_registry.has(id)) return; // already registered
    try {
      const meta = JSON.parse(el.textContent.trim());
      _register(id, meta.cat || 'A', meta);
    } catch (e) {
      console.warn('[abcd] Failed to parse sph/meta for', id, e.message);
    }
  });
}

// ── 登録 ────────────────────────────────────────────────────────
function _register(id, cat, meta = {}) {
  if (!CATS[cat]) {
    console.warn('[abcd] Unknown category:', cat, 'for EXT:', id);
    cat = 'A';
  }
  const entry = {
    id,
    cat,
    version:      meta.version  || '1.0',
    label:        meta.label    || id.toUpperCase(),
    consumes:     Array.isArray(meta.consumes) ? meta.consumes : [],
    produces:     Array.isArray(meta.produces) ? meta.produces : [],
    signals:      Array.isArray(meta.signals)  ? meta.signals  : [],
    registeredAt: Date.now(),
  };
  _registry.set(id, entry);
  sph.emit('abcd:registered', { id, cat, entry });
  return entry;
}

// ── クエリ ──────────────────────────────────────────────────────
function _query(cat = null, filter = null) {
  let entries = [..._registry.values()];
  if (cat) entries = entries.filter(e => e.cat === cat);
  if (filter) {
    entries = entries.filter(e =>
      Object.entries(filter).every(([k, v]) => e[k] === v)
    );
  }
  return entries.sort((a, b) => a.id.localeCompare(b.id));
}

// ── pipe: EXT間データ転送 ────────────────────────────────────────
// fromId.produce() → data → toId.consume(data, fromId)
async function _pipe(fromId, toId, data) {
  // data が指定されていない場合は fromId.produce() を呼ぶ
  let payload = data;
  if (payload === undefined) {
    payload = sph.get(`${fromId}.produce`);
  }

  const consumeFn = sph._reg.get(`${toId}.consume`);
  if (!consumeFn) {
    console.warn(`[abcd] pipe: ${toId}.consume not found`);
    return null;
  }

  try {
    const r = consumeFn(payload, fromId);
    sph.emit('abcd:pipe', { from: fromId, to: toId, payload });
    return r instanceof Promise ? await r : r;
  } catch (e) {
    console.error(`[abcd] pipe ${fromId}→${toId} error:`, e.message);
    return null;
  }
}

// ── signal: ブロードキャスト ─────────────────────────────────────
function _signal(signalName, payload, fromId = null) {
  sph.emit('abcd:signal', { signal: signalName, payload, from: fromId });
  // 購読者に配送
  const subs = _subscribers.get(signalName);
  if (subs) {
    subs.forEach(({ extId, fn }) => {
      if (extId === fromId) return; // 自己配送しない
      try { fn(payload, fromId); } catch (e) {
        console.warn(`[abcd] signal "${signalName}" handler in "${extId}" failed:`, e.message);
      }
    });
  }
}

// ── on_signal: 購読登録 ─────────────────────────────────────────
function _onSignal(signalName, extId, fn) {
  if (!_subscribers.has(signalName)) _subscribers.set(signalName, new Set());
  const entry = { extId, fn };
  _subscribers.get(signalName).add(entry);
  // アンサブスクライブ関数を返す
  return () => _subscribers.get(signalName)?.delete(entry);
}

// ── flow: パイプラインステップ実行 ──────────────────────────────
// steps: Array<{call?, pipe?, signal?, args?, key?}>
async function _flow(steps) {
  let _lastResult = null;
  for (const step of steps) {
    try {
      if (step.call) {
        // { call: 'find.search', args: ['keyword'] }
        const args = step.args || [];
        _lastResult = await sph.call(step.call, args);
      } else if (step.pipe) {
        // { pipe: ['find', 'storage'], key: 'last_search' }
        const [from, to] = step.pipe;
        const data = step.key
          ? { key: step.key, val: _lastResult }
          : _lastResult;
        _lastResult = await _pipe(from, to, data);
      } else if (step.signal) {
        // { signal: 'search:done', from: 'find' }
        _signal(step.signal, _lastResult, step.from || null);
      } else if (step.consume) {
        // { consume: 'storage', from: 'find' }
        _lastResult = await _pipe(step.from || '?', step.consume, _lastResult);
      }
    } catch (e) {
      console.error('[abcd] flow step error:', JSON.stringify(step), e.message);
      break;
    }
  }
  return _lastResult;
}

// ── UI レンダリング ─────────────────────────────────────────────
function _renderPanel() {
  const el = document.getElementById('abcd-content');
  if (!el) return;

  const counts = { A: 0, B: 0, C: 0, D: 0 };
  _registry.forEach(e => { if (counts[e.cat] !== undefined) counts[e.cat]++; });

  let html =
    // サマリーバー
    '<div style="display:flex;gap:8px;margin-bottom:12px">' +
    Object.entries(CATS).map(([cat, info]) =>
      `<div style="flex:1;background:var(--sph-surface);border:1px solid var(--sph-border);` +
      `border-top:3px solid ${info.color};border-radius:4px;padding:8px;text-align:center">` +
      `<div style="font-weight:700;color:${info.color};font-size:var(--sph-sz-lg)">[${cat}]</div>` +
      `<div style="font-size:var(--sph-sz-sm);color:var(--sph-dim)">${info.name}</div>` +
      `<div style="font-size:20px;font-weight:700;margin-top:4px;color:var(--sph-text)">${counts[cat]}</div>` +
      `</div>`
    ).join('') +
    '</div>';

  // カテゴリ別リスト
  html += Object.entries(CATS).map(([cat, catInfo]) => {
    const members = _query(cat);
    if (!members.length) return '';
    return (
      `<div style="margin-bottom:12px">` +
      `<div style="font-size:var(--sph-sz-sm);font-weight:700;letter-spacing:2px;` +
      `color:${catInfo.color};margin-bottom:6px;padding-bottom:4px;` +
      `border-bottom:1px solid ${catInfo.color}44">` +
      `[${cat}] ${catInfo.name} — ${catInfo.desc}</div>` +
      members.map(e => {
        const consumes = e.consumes.length ? e.consumes.join(', ') : '—';
        const produces = e.produces.length ? e.produces.join(', ') : '—';
        const signals  = e.signals.length  ? e.signals.join(', ')  : '—';
        return (
          `<div style="display:flex;align-items:flex-start;gap:10px;padding:7px 0;` +
          `border-bottom:1px solid var(--sph-border)22">` +
          `<div style="flex:1;min-width:0">` +
          `<div style="font-weight:700;font-size:var(--sph-sz-md)">${e.label}` +
          `<span style="color:var(--sph-dim);font-weight:400;font-size:var(--sph-sz-sm)"> ${e.id}</span>` +
          `<span style="color:var(--sph-dim);font-size:var(--sph-sz-sm);margin-left:8px">v${e.version}</span></div>` +
          `<div style="font-size:var(--sph-sz-sm);color:var(--sph-dim);margin-top:2px">` +
          `◀ ${consumes} &nbsp;▶ ${produces}` +
          `${e.signals.length ? ` &nbsp;📡 ${signals}` : ''}` +
          `</div></div></div>`
        );
      }).join('') +
      `</div>`
    );
  }).join('');

  // シグナル一覧
  if (_subscribers.size) {
    html +=
      `<div style="margin-top:8px">` +
      `<div style="font-size:var(--sph-sz-sm);font-weight:700;letter-spacing:2px;color:var(--sph-accent);` +
      `margin-bottom:6px;padding-bottom:4px;border-bottom:1px solid var(--sph-border)">` +
      `ACTIVE SIGNALS</div>` +
      [..._subscribers.entries()].map(([sig, subs]) =>
        `<div style="font-size:var(--sph-sz-sm);padding:3px 0;border-bottom:1px solid var(--sph-border)22">` +
        `<span style="color:var(--sph-accent)">📡 ${sig}</span>` +
        `<span style="color:var(--sph-dim)"> — ${subs.size} subscriber(s)</span></div>`
      ).join('') +
      `</div>`;
  }

  el.innerHTML = html;
}

// ── パネル HTML ─────────────────────────────────────────────────
const _panel = () => sph.ui.panel('abcd',
  '<div id="abcd-content" style="flex:1;overflow-y:auto"></div>'
);

// ── sph.mount ───────────────────────────────────────────────────
sph.mount('abcd', 'ABCD', {
  panel: _panel,
  commands: [
    { name: 'abcd.register',    desc: 'Register EXT to ABCD category',           args: 'extId, cat(A/B/C/D), meta?' },
    { name: 'abcd.query',       desc: 'Query EXTs by category',                   args: 'cat?, filter? → ABCDEntry[]' },
    { name: 'abcd.get_meta',    desc: 'Get meta for an EXT',                      args: 'extId → ABCDEntry | null' },
    { name: 'abcd.pipe',        desc: 'Transfer data between EXTs via consume()', args: 'fromId, toId, data?' },
    { name: 'abcd.signal',      desc: 'Broadcast a named signal to subscribers',  args: 'signalName, payload, fromId?' },
    { name: 'abcd.on_signal',   desc: 'Subscribe to a signal',                    args: 'signalName, extId, fn → unsub' },
    { name: 'abcd.flow',        desc: 'Execute a pipeline of EXT steps',          args: 'steps[] → lastResult' },
    { name: 'abcd.refresh',     desc: 'Refresh panel and re-collect sph/meta' },
    { name: 'abcd.describe',    desc: 'Get ABCD runtime metadata' },
  ],
  api: {
    register:  (id, cat, meta)      => _register(id, cat, meta),
    query:     (cat, filter)        => _query(cat, filter),
    get_meta:  (id)                 => _registry.get(id) || null,
    pipe:      (from, to, data)     => _pipe(from, to, data),
    signal:    (name, payload, from)=> _signal(name, payload, from),
    on_signal: (name, extId, fn)    => _onSignal(name, extId, fn),
    flow:      (steps)              => _flow(steps),
    refresh:   () => { _collectMeta(); _renderPanel(); },
    describe:  () => ({
      cat: 'C', version: '1.0',
      registered: _registry.size,
      subscribers: _subscribers.size,
    }),
  },
  on: {
    'frame-mounted': ({ id }) => {
      if (id === 'abcd') {
        _collectMeta();
        setTimeout(_renderPanel, 50);
      }
    },
    'ide-ready': () => {
      // 起動時に sph/meta を自動収集
      _collectMeta();
      // abcd 自身を登録
      _register('abcd', 'C', {
        version: '1.0', label: 'ABCD Runtime',
        signals: ['abcd:registered', 'abcd:signal', 'abcd:pipe'],
      });
    },
    // 外部から EXT が追加された時も収集
    'ext-loaded': () => {
      _collectMeta();
      _renderPanel();
    },
  },
});

})();
</script>

<script type="sph/sec" data-sec-ext="abcd" data-sec-title="ABCD Structure Runtime">
<h2>⬡ ABCD — EXT Structure Runtime</h2>

<p>The ABCD Runtime manages the category-based EXT architecture for Sapphire NG.
It collects <code>sph/meta</code> declarations, enforces category conventions,
and provides the <strong>pipe / signal / flow</strong> primitives for loosely-coupled inter-EXT communication.</p>

<h3>Categories</h3>
<table>
  <thead><tr><th>Cat</th><th>Name</th><th>Role</th><th>Has UI?</th></tr></thead>
  <tbody>
    <tr><td>[A]</td><td>Action</td><td>User-facing operations (search, play, render)</td><td>Yes</td></tr>
    <tr><td>[B]</td><td>Base</td><td>Resources: storage, comms, compute</td><td>Minimal</td></tr>
    <tr><td>[C]</td><td>Control</td><td>Management, monitoring, flow orchestration</td><td>Yes</td></tr>
    <tr><td>[D]</td><td>Definition</td><td>Config, schema, theme, documentation</td><td>Minimal</td></tr>
  </tbody>
</table>

<h3>sph/meta Declaration</h3>
<p>Each EXT declares its category and dependencies via a <code>sph/meta</code> script tag.
The ABCD runtime auto-collects these on <code>ide-ready</code>.</p>
<pre>
&lt;script type="sph/meta" data-ext-id="sound"&gt;
{
  "cat":      "A",
  "version":  "1.0",
  "label":    "SOUND",
  "consumes": ["appearance"],
  "produces": ["storage"],
  "signals":  ["sound:played"]
}
&lt;/script&gt;
</pre>

<h3>Standard API (recommended for all EXTs)</h3>
<table>
  <thead><tr><th>Method</th><th>Description</th></tr></thead>
  <tbody>
    <tr><td>{extId}.describe()</td><td>Return MetaInfo object</td></tr>
    <tr><td>{extId}.consume(data, fromId)</td><td>Receive data from another EXT</td></tr>
    <tr><td>{extId}.produce()</td><td>Export current state to caller</td></tr>
  </tbody>
</table>

<h3>Communication Primitives</h3>

<h4>pipe — directed data transfer</h4>
<pre>
// find passes its last search result to storage for caching
await sph.call('abcd.pipe', ['find', 'storage', {
  key: 'last_search', val: results
}]);
</pre>

<h4>signal — broadcast notification</h4>
<pre>
// sound notifies all listeners that playback finished
sph.call('abcd.signal', ['sound:played', { freq: 440, dur: 0.1 }, 'sound']);

// dev subscribes to monitor audio events
sph.call('abcd.on_signal', ['sound:played', 'dev', (payload, from) => {
  console.log('Audio played by', from, payload);
}]);
</pre>

<h4>flow — sequential pipeline</h4>
<pre>
await sph.call('abcd.flow', [[
  { call: 'find.search',   args: ['keyword'] },
  { pipe: ['find', 'storage'], key: 'search_cache' },
  { signal: 'search:done', from: 'find' }
]]);
</pre>

<h3>Information Flow Rules</h3>
<table>
  <thead><tr><th>Direction</th><th>Allowed?</th><th>Mechanism</th></tr></thead>
  <tbody>
    <tr><td>D → A (config)</td><td>✓</td><td>abcd.pipe or A calls D.produce()</td></tr>
    <tr><td>A → B (processing)</td><td>✓</td><td>sph.call or abcd.pipe</td></tr>
    <tr><td>A → C (notification)</td><td>✓</td><td>abcd.signal</td></tr>
    <tr><td>C → A (control)</td><td>✓</td><td>sph.call</td></tr>
    <tr><td>B → A (direct call)</td><td>✗</td><td>B must not know A exists</td></tr>
    <tr><td>D → A (direct call)</td><td>✗</td><td>D must not know A exists</td></tr>
  </tbody>
</table>
</script>

<script type="sph/ext" data-ext-id="monitor">
(function(){
'use strict';

var _canvas = null;
var _ctx = null;
var _rafId = null;
var _config = {
  w: sph._reg.get('sph.monitor.width')  ?? 854,   // injection || default (480p)
  h: sph._reg.get('sph.monitor.height') ?? 480,
};
var _pixelBuf = null;    // Uint8ClampedArray view over bridge.buf.raw
var _offscreen = null;   // OffscreenCanvas fallback

// ── 描画ループ (VSYNC同期) ──────────────────────────────────────
function _draw() {
  if (!_ctx) return;

  if (_pixelBuf) {
    // SAB/ArrayBuffer → ImageData → putImageData
    try {
      var imgData = new ImageData(_pixelBuf, _config.w, _config.h);
      _ctx.putImageData(imgData, 0, 0);
    } catch(e) {
      // サイズ不一致などは無視して継続
    }
  } else {
    // バッファ未接続時: プレースホルダー描画
    _ctx.fillStyle = 'var(--sph-surface, #0d1520)';
    _ctx.fillRect(0, 0, _config.w, _config.h);
    _ctx.fillStyle = 'var(--sph-dim, #5a7a9a)';
    _ctx.font = '14px monospace';
    _ctx.fillText('Waiting for bridge.buf "video_main"...', 20, _config.h / 2);
  }

  _rafId = requestAnimationFrame(_draw);
}

// ── bridge.buf から Uint8ClampedArray ビューを取得 ────────────────
function _attachBuffer() {
  var needed = _config.w * _config.h * 4;

  // バッファが存在しなければ作成
  var existing = sph.call('bridge.buf.get', ['video_main']);
  if (!existing) {
    sph.call('bridge.buf.create', ['video_main', needed]);
    existing = sph.call('bridge.buf.get', ['video_main']);
  }
  if (!existing) {
    sph.call('ide.log', ['[MONITOR] ERR: Failed to create bridge.buf "video_main"']);
    return false;
  }

  // SAB優先、フォールバックはArrayBuffer
  var rawBuf = sph.call('bridge.buf.raw', ['video_main']);
  var isShared = sph.call('bridge.buf.isShared', ['video_main']);

  if (rawBuf && rawBuf.byteLength >= needed) {
    _pixelBuf = new Uint8ClampedArray(rawBuf, 0, needed);
    var mode = isShared ? 'SAB (cross-origin isolated)' : 'ArrayBuffer (main thread only)';
    sph.call('ide.log', ['[MONITOR] buffer attached: ' + _config.w + 'x' + _config.h + ' via ' + mode]);
    return true;
  } else {
    sph.call('ide.log', ['[MONITOR] ERR: buffer too small (' + (rawBuf?.byteLength ?? 0) + ' < ' + needed + ')']);
    return false;
  }
}

// ── パネル HTML ──────────────────────────────────────────────────
var _panel = function() {
  return sph.ui.panel('monitor',
    '<div style="width:100%;height:calc(100% - 32px);background:#000;display:flex;align-items:center;justify-content:center;overflow:hidden">' +
      '<canvas id="v-mon" width="' + _config.w + '" height="' + _config.h +
      '" style="max-width:100%;max-height:100%;object-fit:contain;display:block"></canvas>' +
    '</div>' +
    '<div style="padding:4px 8px;font-size:var(--sph-sz-sm);color:var(--sph-dim);border-top:1px solid var(--sph-border)">' +
      '<span id="mon-status">idle</span>' +
      ' &nbsp;|&nbsp; ' +
      '<span id="mon-res">' + _config.w + 'x' + _config.h + '</span>' +
      ' &nbsp;|&nbsp; ' +
      '<span id="mon-sab">SAB: checking...</span>' +
    '</div>'
  );
};

// ── sph.mount ────────────────────────────────────────────────────
sph.mount('monitor', 'MONITOR', {
  panel: _panel,
  commands: [
    { name: 'monitor.attach',  desc: 'Attach to bridge.buf video_main' },
    { name: 'monitor.detach',  desc: 'Stop drawing and release buffer' },
    { name: 'monitor.resize',  desc: 'Change resolution', args: 'w, h' },
    { name: 'monitor.consume', desc: 'Receive config from another EXT', args: 'data, fromId' },
    { name: 'monitor.produce', desc: 'Export current state' },
    { name: 'monitor.describe',desc: 'ABCD metadata' },
  ],
  api: {
    attach: function() {
      if (_rafId) return; // already running
      if (_attachBuffer()) {
        _draw();
        var st = document.getElementById('mon-status');
        if (st) st.textContent = 'drawing';
      }
    },
    detach: function() {
      if (_rafId) { cancelAnimationFrame(_rafId); _rafId = null; }
      _pixelBuf = null;
      var st = document.getElementById('mon-status');
      if (st) st.textContent = 'idle';
    },
    resize: function(w, h) {
      sph.call('monitor.detach');
      _config.w = w || _config.w;
      _config.h = h || _config.h;
      var c = document.getElementById('v-mon');
      if (c) { c.width = _config.w; c.height = _config.h; }
      var res = document.getElementById('mon-res');
      if (res) res.textContent = _config.w + 'x' + _config.h;
    },
    // ABCD standard
    consume: function(data, from) {
      if (data && data.width && data.height) sph.call('monitor.resize', [data.width, data.height]);
    },
    produce: function() {
      return { width: _config.w, height: _config.h, running: !!_rafId, isShared: !!(_pixelBuf && window.crossOriginIsolated) };
    },
    describe: function() {
      return { cat: 'A', version: '1.1', consumes: ['bridge', 'timeline'], produces: ['ui_event'], signals: [] };
    },
  },
  on: {
    'ide-ready': function() {
      sph.call('abcd.register', ['monitor', 'A']);
    },
    'frame-mounted': function(e) {
      if (e.id !== 'monitor') return;
      _canvas = document.getElementById('v-mon');
      if (!_canvas) return;
      _ctx = _canvas.getContext('2d', { alpha: false, willReadFrequently: false });

      // SAB状態をUIに反映
      var sabEl = document.getElementById('mon-sab');
      if (sabEl) {
        var isolated = window.crossOriginIsolated;
        sabEl.textContent = 'SAB: ' + (isolated ? 'active ✓' : 'unavailable (ArrayBuffer mode)');
        sabEl.style.color = isolated ? 'var(--sph-ok)' : 'var(--sph-warn)';
      }

      // 自動アタッチ
      sph.call('monitor.attach');
    },
    'frame-unmounted': function(e) {
      if (e.id !== 'monitor') return;
      sph.call('monitor.detach');
      _canvas = null; _ctx = null;
    },
    // timeline:tick でステータス更新
    'abcd:signal': function(detail) {
      if (detail.signal !== 'timeline:tick') return;
      var st = document.getElementById('mon-status');
      if (st && _rafId) st.textContent = 'drawing t=' + detail.payload.toFixed(3);
    },
  },
});
})();
</script>
<script type="sph/doc" data-doc-ext="monitor">
{
  "title": "MONITOR Extension",
  "description": "High-performance canvas display. Reads pixel data from bridge.buf 'video_main' and renders via requestAnimationFrame. Supports SAB (SharedArrayBuffer) for zero-copy Worker→Canvas pipeline when crossOriginIsolated is true.",
  "version": "1.1",
  "api": [

    { "method": "monitor.consume", "args": "data, fromId", "returns": "void", "description": "Receive {width, height} config from another EXT" },

  ]
}
</script>

<script type="sph/ext" data-ext-id="timeline">
(function(){
'use strict';

var _state = {
  isPlaying: false,
  currentTime: 0,
  bpm: sph._reg.get('sph.timeline.bpm') ?? 120,  // injection || default
  _timer: null,
  _tickInterval: sph._reg.get('sph.timeline.tickMs') ?? 16, // ~60fps
};

// ── bridge.channel でB層に同期命令を送る ──────────────────────────
function _syncB(action, extra) {
  // bridge.channel 'timeline:sync' が存在すれば publish
  var ch = sph.call('bridge.channel.get', ['timeline:sync']);
  if (ch) {
    sph.call('bridge.channel.publish', ['timeline:sync', Object.assign({action: action}, extra||{}), 'timeline']);
  }
}

// ── パネル HTML ──────────────────────────────────────────────────
var _panel = function() {
  return sph.ui.panel('timeline',
    sph.ui.section('Transport',
      '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap">' +
        '<button class="sph-btn sph-btn-ok" onclick="sph.call(\'timeline.play\')">▶ PLAY</button>' +
        '<button class="sph-btn" onclick="sph.call(\'timeline.stop\')">■ STOP</button>' +
        '<button class="sph-btn" onclick="sph.call(\'timeline.seek\',[0])">⏮ RESET</button>' +
      '</div>' +
      '<div style="margin-top:8px;display:flex;align-items:center;gap:8px">' +
        '<span style="color:var(--sph-dim);font-size:var(--sph-sz-md)">Time:</span>' +
        '<span id="tl-time" style="font-family:var(--sph-font);font-size:var(--sph-sz-lg);color:var(--sph-accent)">0.000</span>' +
        '<span style="color:var(--sph-dim);font-size:var(--sph-sz-sm)" id="tl-state">stopped</span>' +
      '</div>'
    ) +
    sph.ui.section('Settings',
      '<div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">' +
        '<span style="color:var(--sph-dim);font-size:var(--sph-sz-md);width:40px">BPM</span>' +
        '<input id="tl-bpm" type="number" class="sph-input" value="' + _state.bpm + '" min="20" max="400" style="width:70px"' +
        ' onchange="sph.call(\'timeline.setBpm\',[+this.value])">' +
      '</div>' +
      '<div style="display:flex;align-items:center;gap:8px">' +
        '<span style="color:var(--sph-dim);font-size:var(--sph-sz-md);width:40px">SAB</span>' +
        '<span id="tl-sab" style="font-size:var(--sph-sz-sm);color:var(--sph-dim)">checking...</span>' +
      '</div>'
    )
  );
};

// ── UI更新 ───────────────────────────────────────────────────────
function _updateTimeDisplay() {
  var el = document.getElementById('tl-time');
  if (el) el.textContent = _state.currentTime.toFixed(3);
}
function _updateStateDisplay(s) {
  var el = document.getElementById('tl-state');
  if (el) {
    el.textContent = s;
    el.style.color = s === 'playing' ? 'var(--sph-ok)' : 'var(--sph-dim)';
  }
}

// ── sph.mount ────────────────────────────────────────────────────
sph.mount('timeline', 'TIMELINE', {
  panel: _panel,
  commands: [
    { name: 'timeline.play',     desc: 'Start playback' },
    { name: 'timeline.stop',     desc: 'Stop playback' },
    { name: 'timeline.seek',     desc: 'Seek to time', args: 'time: number' },
    { name: 'timeline.setBpm',   desc: 'Set BPM', args: 'bpm: number' },
    { name: 'timeline.consume',  desc: 'Receive config', args: 'data, fromId' },
    { name: 'timeline.produce',  desc: 'Export state' },
    { name: 'timeline.describe', desc: 'ABCD metadata' },
  ],
  api: {
    play: function() {
      if (_state.isPlaying) return;
      _state.isPlaying = true;
      // B層に同期命令（bridge.channelがあれば）
      _syncB('start', { time: _state.currentTime });
      _state._timer = setInterval(function() {
        _state.currentTime += _state._tickInterval / 1000;
        _updateTimeDisplay();
        // sph.signal は存在しないため abcd.signal を使用
        sph.call('abcd.signal', ['timeline:tick', _state.currentTime, 'timeline']);
      }, _state._tickInterval);
      sph.call('abcd.signal', ['timeline:state', 'playing', 'timeline']);
      _updateStateDisplay('playing');
    },
    stop: function() {
      if (!_state.isPlaying) return;
      _state.isPlaying = false;
      if (_state._timer) { clearInterval(_state._timer); _state._timer = null; }
      _syncB('stop');
      sph.call('abcd.signal', ['timeline:state', 'stopped', 'timeline']);
      _updateStateDisplay('stopped');
    },
    seek: function(time) {
      _state.currentTime = parseFloat(time) || 0;
      _syncB('seek', { time: _state.currentTime });
      _updateTimeDisplay();
      sph.call('abcd.signal', ['timeline:tick', _state.currentTime, 'timeline']);
    },
    setBpm: function(bpm) {
      _state.bpm = Math.max(20, Math.min(400, bpm || 120));
      // BPMに連動してtickIntervalを変更する場合はここで
    },
    // ABCD standard
    consume: function(data, from) {
      if (data && data.bpm) sph.call('timeline.setBpm', [data.bpm]);
      if (data && data.seek !== undefined) sph.call('timeline.seek', [data.seek]);
    },
    produce: function() {
      return { isPlaying: _state.isPlaying, currentTime: _state.currentTime, bpm: _state.bpm };
    },
    describe: function() {
      return { cat: 'C', version: '1.1', consumes: ['bridge'], produces: [], signals: ['timeline:tick', 'timeline:state'] };
    },
  },
  on: {
    'ide-ready': function() {
      sph.call('abcd.register', ['timeline', 'C']);
      // bridge.channel を作成（B層への同期用）
      sph.call('bridge.channel.create', ['timeline:sync', 'async']);
    },
    'frame-mounted': function(e) {
      if (e.id !== 'timeline') return;
      // SAB状態をUIに反映
      var sabEl = document.getElementById('tl-sab');
      if (sabEl) {
        var isolated = window.crossOriginIsolated;
        sabEl.textContent = isolated ? 'active ✓' : 'unavailable (ArrayBuffer mode)';
        sabEl.style.color = isolated ? 'var(--sph-ok)' : 'var(--sph-warn)';
      }
    },
    'frame-unmounted': function(e) {
      if (e.id !== 'timeline') return;
      sph.call('timeline.stop');
    },
  },
});
})();
</script>
<script type="sph/doc" data-doc-ext="timeline">
{
  "title": "TIMELINE Extension",
  "description": "Transport control [C]. Manages playback time, BPM, and broadcasts timeline:tick signals via abcd.signal. Sends sync commands to B-layer via bridge.channel 'timeline:sync'.",
  "version": "1.1",

    { "method": "timeline.produce", "args": "", "returns": "object", "description": "Export {isPlaying, currentTime, bpm}" },
    { "method": "timeline.describe","args": "", "returns": "MetaInfo", "description": "ABCD metadata" }
  ]
}
</script>

<script type="sph/ext" data-ext-id="compute">
(function(){
'use strict';

const _workers = new Map();
const _taskResolvers = new Map();
// timeout: sph.register('sph.ext.timeout', N) で injection 可能

// Worker Source: Built-in error handling and WASM isolation
const WORKER_SRC = `
  let wasmInstance = null;
  self.onmessage = async (e) => {
    const { type, id, data } = e.data;
    try {
      if (type === 'INIT') {
        const module = await WebAssembly.compile(data.binary);
        wasmInstance = await WebAssembly.instantiate(module, data.imports || {});
        self.postMessage({ type: 'READY', id });
      } 
      else if (type === 'EXEC') {
        if (!wasmInstance) throw new Error('WASM_NOT_INITIALIZED');
        const fn = wasmInstance.exports[data.method];
        if (!fn) throw new Error('METHOD_NOT_FOUND:' + data.method);
        
        // Execute WASM function
        const result = fn(...(data.args || []));
        self.postMessage({ type: 'RESULT', id, result });
      }
    } catch (err) {
      self.postMessage({ type: 'FATAL', id, message: err.message });
    }
  };
`;

/**
 * Forcefully terminates a worker to prevent main thread blockage.
 */
function terminateWorker(id) {
  const w = _workers.get(id);
  if (w) {
    w.terminate();
    _workers.delete(id);
    sph.call('ide.log', ['[COMPUTE] Safety Guard: Worker terminated -> ' + id]);
  }
}

sph.mount('compute', 'COMPUTE ENGINE', {
  api: {
    /**
     * setup: Initializes a worker using the Injection || Default pattern.
     * @param {Object} config - { id: string }
     */
    setup: (config) => {
      const id = config?.id || 'default_worker'; // Default if injection fails
      if (_workers.has(id)) return id;

      const blob = new Blob([WORKER_SRC], { type: 'application/javascript' });
      const worker = new Worker(URL.createObjectURL(blob));
      
      worker.onmessage = (e) => {
        const { type, id: taskId, result, message } = e.data;
        if (type === 'RESULT') {
          const res = _taskResolvers.get(taskId);
          if (res) { res.resolve(result); _taskResolvers.delete(taskId); }
        }
        if (type === 'FATAL') {
          const res = _taskResolvers.get(taskId);
          if (res) res.reject(message);
          sph.emit('compute:error', { id, message });
          // Strict stop on fatal WASM errors
          sph.emit('error', {code:'E011', args:['compute.exec', 'FATAL WASM: '+message], severity:'error', phase:'ext.call'});
          sph.call('ide.log', ['[COMPUTE] FATAL: ' + message]);
        }
      };
      _workers.set(id, worker);
      return id;
    },

    /**
     * exec: Executes WASM with a mandatory timeout guard.
     */
    exec: async (id, method, args = [], timeoutMs) => {
      const workerId = id || 'default_worker';
      const worker = _workers.get(workerId);
      
      if (!worker) {
        sph.emit('error', {code:'E010', args:['compute.worker.'+workerId], severity:'error', phase:'ext.call'});
        return null;
      }

      const taskId = `t_${Math.random().toString(36).slice(2)}`;
      const limit = timeoutMs || sph._reg.get('sph.ext.timeout') || 5000;

      return new Promise((resolve, reject) => {
        const timer = setTimeout(() => {
          _taskResolvers.delete(taskId);
          terminateWorker(workerId); // Kill the runaway worker
          reject(new Error('COMPUTE_TIMEOUT_EXCEEDED'));
          sph.emit('error', {code:'E012', args:['compute.exec.'+method, limit], severity:'error', phase:'ext.call'});
          sph.call('ide.log', ['[COMPUTE] TIMEOUT: ' + method + ' exceeded ' + limit + 'ms']);
        }, limit);

        _taskResolvers.set(taskId, { 
          resolve: (r) => { clearTimeout(timer); resolve(r); },
          reject: (m) => { clearTimeout(timer); reject(m); }
        });

        worker.postMessage({ type: 'EXEC', id: taskId, data: { method, args } });
      });
    },

    kill: (id) => terminateWorker(id),
    // ABCD standard interface
    consume: (data, from) => {
      if (data?.kill) terminateWorker(data.kill);
    },
    produce: () => ({ workers: [..._workers.keys()], pending: _taskResolvers.size }),
    describe: () => ({ cat: 'B', version: '1.2', consumes: ['bridge'], produces: ['compute_result'], signals: ['compute:error'] }),

  },
  on: {
    'ide-ready': () => sph.call('abcd.register', ['compute', 'B']),
  },
});
})();
</script>
<script type="sph/tab" data-tab-name="compute_lib" data-tab-type="lib">
; lib compute_lib
; High-level patterns for safe WASM orchestration.

; --- Pattern: Robust Initialization ---
!safe_init_compute [#_worker_id] [$name]
  ; Fallback to default if name is empty
  if $name == "" { $name = "anon_worker" }
  #_worker_id = compute.setup { id: $name }
  RET #_worker_id

; --- Pattern: Guarded Execution ---
; Stops the entire system if the task fails or times out.
!safe_exec [#_res] [$worker, $method, #_ptr, #_size]
  sys.print "[COMPUTE] Dispatching" $method "to" $worker
  #_res = compute.exec $worker $method [#_ptr, #_size] 2000 ; 2s limit
  if #_res == null {
    sys.print "[FATAL] Compute pipeline broken. Halting."
    sys.stop "COMPUTE_PIPELINE_FAILURE"
  }
  RET #_res
</script>

<script type="sph/sec" data-sec-ext="compute" data-sec-title="Safety & Guardrails">
<h2>COMPUTE Safety Architecture</h2>
<p>This EXT implements the <strong>Base [B]</strong> layer with a focus on system stability. It protects the main IDE thread from heavy computational loads.</p>

<h3>1. Zombie Worker Prevention</h3>
<p>Infinite loops in WASM cannot be stopped by standard JS async patterns. <code>compute.exec</code> uses an external watchdog timer. If a task exceeds the <code>timeout</code>, it triggers <code>worker.terminate()</code>, physically removing the thread from memory.</p>

<h3>2. Strict Error Propagation</h3>
<p>Memory out-of-bounds or arithmetic errors within WASM trigger an immediate <code>sys.stop</code>. This prevents corrupted data from flowing into other sensitive EXTs like Audio or Video engines.</p>

<h3>3. Robust Initialization</h3>
<p>Following the <strong>Injection || Default</strong> pattern, <code>compute.setup</code> ensures that even incomplete configurations result in a valid, working state.</p>

<h3>Example Usage</h3>
<pre>
!main
  lib compute_lib
  ; Initialize safely
  $worker = call safe_init_compute ["dsp_processor"]
  
  ; Execute with a 2-second safety limit
  #status = call safe_exec [$worker, "process_audio", #ptr, 4096]
  sys.print "Processing successful"
</pre>
</script>

    sph.ui.section('MML Input', 
      '<textarea id="ms-input" class="sph-input" style="width:100%;height:150px"></textarea>' +
      sph.ui.btn('Apply & Play', "sph.call('media_studio.apply')", 'ok')
    ) +
    sph.ui.section('Monitor', '<div id="ms-monitor" class="sph-meta">Ready</div>')
  );

  sph.mount('media_studio', 'MEDIA STUDIO', {
    panel: _panel,
    commands: [
      { name: 'media_studio.apply',   desc: 'Parse and play MML input' },
      { name: 'media_studio.consume', desc: 'Receive MML from another EXT', args: 'data, fromId' },
      { name: 'media_studio.produce', desc: 'Export current MML' },
      { name: 'media_studio.describe',desc: 'ABCD metadata' },
    ],
    api: {
      apply: () => {
        const input = document.getElementById('ms-input');
        const mml = input ? input.value : '';
        const mon = document.getElementById('ms-monitor');
        if (mon) mon.textContent = 'Parsing...';
        // media_core が利用可能ならパースして再生
        const parsed = sph.call('media_core.parse', [mml]);
        if (parsed !== null) {
          sph.call('media_core.play');
          if (mon) mon.textContent = 'Playing';
          sph.call('abcd.signal', ['media_studio:applied', mml, 'media_studio']);
        } else {
          if (mon) mon.textContent = 'media_core not loaded — load it via EXT manager';
        }
      },
      // ABCD standard
      consume: (data, from) => {
        if (data && typeof data.mml === 'string') {
          const input = document.getElementById('ms-input');
          if (input) { input.value = data.mml; sph.call('media_studio.apply'); }
        }
      },
      produce: () => {
        const input = document.getElementById('ms-input');
        return { mml: input ? input.value : '' };
      },
      describe: () => ({ cat: 'A', version: '1.0', consumes: ['media_core', 'find'], produces: [], signals: ['media_studio:applied'] }),
    },
    on: {
      'ide-ready': () => sph.call('abcd.register', ['media_studio', 'A']),
    },
  });
})();
</script>

<tr><td>2.15</td><td>IDE</td><td>Debug mode wired: sph.debug.enabled=true enables block trace. callDepth enforced (E016)</td></tr>
</table>

<h2>v16 Changes</h2>
<table>
<tr><th>Feature</th><th>Category</th><th>Description</th></tr>
<tr><td>SAFE_MATH / _safeEval</td><td>Security</td><td>ext.math.exec provides sandboxed numeric expression evaluation — replaces raw sys.f for math</td></tr>
<tr><td>ALLOWED_EXT whitelist</td><td>Security</td><td>DSL EXT calls restricted to whitelist. Use sph.ext.allow(name) to permit additional EXTs</td></tr>
<tr><td>sph._extCall</td><td>Security</td><td>Whitelist-checked EXT call entry for DSL sandbox</td></tr>
<tr><td>W-TYPE warning</td><td>Compiler</td><td>Static type inference: warns on obvious sigil mismatches at compile time</td></tr>
<tr><td>W-EXT warning</td><td>Runtime</td><td>Blocked EXT call emits W-EXT with the blocked name and reason</td></tr>
<tr><td>E016</td><td>Runtime</td><td>Stack overflow guard: _safeCall depth tracked, E016 on exceeding sph.ext.callDepth</td></tr>
<tr><td>sph.ext.allow/isAllowed</td><td>API</td><td>Public API to manage EXT whitelist from JS side</td></tr>
<tr><td>q_slot freelist</td><td>Memory</td><td>Freelist-based slot reuse ({cur, free[]} per type) replaces simple counter</td></tr>
</table>

<h3>ext.math.exec — 安全な数式評価</h3>
<pre><span class="cm">; DSLから安全に数式を評価</span>
%result = ext.math.exec "sin(#angle) * 100"
sys.print %result

<span class="cm">; sph.ext.allow で追加EXTを許可（JS側から）</span>
sph.ext.allow('myext.compute')</pre>

<div class="v06-section">
<h2>v0.6 — SAPPHIRE Platform <span class="v06-tag">NEW</span></h2>

<h3>EXT直接呼び出し構文</h3>
<p>DSLから <code>ext.method</code> を直接呼べるようになりました。全呼び出しは5秒タイムアウト付きの安全ラッパー経由です。</p>
<pre>
; 戻り値なし
appearance.theme "nord"
sound.beep 440 0.1
abcd.register "myblock" "A"

; 戻り値あり（型プレフィックスで受け取る）
$theme   = appearance.theme_get      ; str
#bufval  = bridge.buf.read "b" 0     ; i32
%vol     = sound.volume              ; f64 (futture)

; &pureブロックでは ext.* 禁止 → W010警告
</pre>

<h3>ABCDカテゴリ</h3>
<table>
<tr><th>Cat</th><th>役割</th><th>代表EXT</th></tr>
<tr><td>[A] Action</td><td>ユーザー操作・UI</td><td>sound, edit, game25</td></tr>
<tr><td>[B] Base</td><td>データ・通信・Worker</td><td>bridge, worker, storage, key</td></tr>
<tr><td>[C] Control</td><td>ライフサイクル管理</td><td>extmgr, file, dev, abcd</td></tr>
<tr><td>[D] Definition</td><td>設定・テーマ・ドキュメント</td><td>appearance, doc, err</td></tr>
</table>

<h3>ABCD標準インターフェース</h3>
<pre>
; 全EXTが持つ標準API
$meta   = myext.describe          ; カテゴリ情報取得
myext.consume &lt;data&gt; "from"       ; データ受け取り
$state  = myext.produce           ; 状態エクスポート
</pre>

<h3>ABCD通信プリミティブ</h3>
<pre>
; pipe: A → B へデータ転送
abcd.pipe "find" "storage" "data"

; signal: ブロードキャスト通知
abcd.signal "search:done" "results"

; flow: パイプライン実行 (JS側のみ)
; await sph.call('abcd.flow', [[...steps]])
</pre>

<h3>bridge 共有バッファ（EXT間高速データ共有）</h3>
<pre>
bridge.buf.create "shared" 64      ; 64スロットバッファ作成
bridge.buf.write  "shared" 0 42   ; [0] = 42
#v = bridge.buf.read "shared" 0   ; #v → 42
</pre>

<h3>?mode=app — アプリモード</h3>
<p>URLに <code>?mode=app</code> を追加するとIDEが非表示になり、EXTパネルがフルスクリーン表示されます。</p>
<pre>
?mode=app&ext=myext&run=1
; → IDEなし、myext パネルが全面表示、DSL自動実行
</pre>

<h3>安全保証の層</h3>
<table>
<tr><th>層</th><th>保護内容</th></tr>
<tr><td>コンパイル時</td><td>&amp;pure違反, 型キャスト警告, @loop変換</td></tr>
<tr><td>runtime callBlock</td><td>try/catch, signal.stopped, STOP再スロー</td></tr>
<tr><td>_safeCall</td><td>5秒タイムアウト, E012エラー発火</td></tr>
<tr><td>@loop guard</td><td>100万回上限(W006), 10秒(W007), yield</td></tr>
<tr><td>str[] Proxy</td><td>1000件上限(W008), 無言で捨てる</td></tr>
<tr><td>sph.call</td><td>try/catch, E010/E011イベント発火</td></tr>
</table>
</div>

<div class="v06-section">
<h2>DIVD — パラメータ統治フレームワーク <span class="v06-tag">NEW</span></h2>
<p>Definition / Injection / Validation / Default の4層でパラメータを安全に解決します。</p>

<h3>sys.divd.define — スキーマ登録（D層）</h3>
<pre>
; JS側（EXT mount時など）でスキーマを定義する
sph.call('sys.divd.define', ['volume', { min:0, max:1, default:0.5 }])
sph.call('sys.divd.define', ['bpm',    { min:20, max:300, default:120 }])
sph.call('sys.divd.define', ['width',  { min:1, max:7680, default:1920 }])
</pre>

<h3>sys.divd — 値の解決（Validation + Default）</h3>
<pre>
; DSL から: sys.divd &lt;value&gt; "schemaKey"
%vol = sys.divd %raw_vol "volume"   ; 0.0〜1.0にクランプ、nullならdefault=0.5
#bpm = sys.divd #raw_bpm "bpm"     ; 20〜300にクランプ
#w   = sys.divd #raw_w   "width"   ; 1〜7680にクランプ
</pre>

<h3>動作規則</h3>
<table>
<tr><th>入力値</th><th>結果</th></tr>
<tr><td>null / undefined</td><td>schema.default（未定義なら0）</td></tr>
<tr><td>範囲内の値</td><td>そのまま返す</td></tr>
<tr><td>min未満</td><td>min にクランプ</td></tr>
<tr><td>max超過</td><td>max にクランプ</td></tr>
<tr><td>schemaKey未登録</td><td>入力値をそのまま返す（スルー）</td></tr>
</table>

<h3>EXT実装パターン</h3>
<pre>
// JS側: EXT mount時にスキーマを登録（D層）
sph.mount('sound', {
  api: {
    volume: async (v) => {
      // sys.divd を通して安全な値を取得
      const safe = await sph.call('sys.divd', [v, 'volume']);
      _vol = safe;
    }
  }
});
// mount前にスキーマ定義
sph.call('sys.divd.define', ['volume', { min:0, max:1, default:0.5 }]);
</pre>
</div>
</script>

&clamp [%_v, %_lo, %_hi]

{
  "cat": "C",
  "version": "1.1",
  "label": "AI CONNECT",
  "consumes": ["bridge", "abcd"],

  "signals": ["ai:command_received", "ai:state_reported"],
  "permissions": ["dom"]

<script type="sph/ext" data-ext-id="ai_connect">
(function(){
'use strict';
var _reportCount=0,_lastReport=null,_cmdLog=[];
function _relay(type,payload){
  window.postMessage({type:'IDE_TO_BRIDGE',cls:'info',log:{ai_bridge:type,data:payload,ts:Date.now()}},'*');
}
window.addEventListener('message',function(e){
  if(e.source!==window)return;
  var d=e.data;
  if(!d||d.type!=='BRIDGE_TO_IDE')return;
  var cmd=d.cmd;if(!cmd||!cmd.name)return;
  _cmdLog.unshift({name:cmd.name,args:cmd.args,ts:Date.now()});
  if(_cmdLog.length>20)_cmdLog.pop();
  sph.emit('ai:command_received',cmd);
  sph.call('ide.log',['[AI] cmd: '+cmd.name+(cmd.args?' '+JSON.stringify(cmd.args):'')]);
  if(cmd.name==='run'&&cmd.args)sph.call('ide.run',[cmd.args]).catch(function(){});
});
function _refreshUI(){
  var c=document.getElementById('aic-count');
  var l=document.getElementById('aic-last');
  var d=document.getElementById('aic-cmds');
  if(c)c.textContent=_reportCount;
  if(l)l.textContent=_lastReport?JSON.stringify(_lastReport).slice(0,80)+'...':'--';
  if(d)d.innerHTML=_cmdLog.length
    ?_cmdLog.slice(0,5).map(function(x){return'<div>cmd: '+x.name+'</div>';}).join('')
    :'--';
}
var _panel=function(){return sph.ui.panel('ai_connect',
  sph.ui.section('Bridge Status',
    '<div class="sph-row"><label>Reports</label><span id="aic-count" class="sph-body">0</span></div>'+
    '<div class="sph-row"><label>Last sent</label><span id="aic-last" class="sph-meta" style="font-size:9px;word-break:break-all">--</span></div>'
  )+
  sph.ui.section('Recent Commands',
    '<div id="aic-cmds" class="sph-meta" style="font-size:9px;line-height:1.8">--</div>'
  )+
  sph.ui.section('Test',
    '<button class="sph-btn sph-btn-ok" onclick="sph.call(\'ai_connect.ping\')">Ping AI</button>'
  )
);}
sph.mount('ai_connect','AI CONNECT',{
  panel:_panel,
  commands:[
    {name:'ai_connect.report', desc:'Send state to AI', args:'data:object'},
    {name:'ai_connect.ping',   desc:'Ping AI bridge'},
    {name:'ai_connect.status', desc:'Get bridge status'},
    {name:'ai_connect.consume',desc:'ABCD receive',     args:'data,from'},
    {name:'ai_connect.produce',desc:'ABCD export state'},
  ],
  api:{
    report:function(data){
      _reportCount++;_lastReport=data;
      _relay('SENSE',data);
      sph.emit('ai:state_reported',data);
      requestAnimationFrame(_refreshUI);
      return true;
    },
    ping:function(){
      _relay('PING',{ts:Date.now(),from:'sapphire'});
      sph.call('ide.log',['[AI] PING sent']);
      return true;
    },
    status:function(){
      return{connected:true,report_count:_reportCount,last_report:_lastReport,cmd_queue:_cmdLog.length};
    },
    consume:function(data,from){
      if(data&&data.command)sph.call('ide.log',['[AI] consume from '+from+': '+data.command]);
    },
    produce:function(){return{report_count:_reportCount,last_report:_lastReport};},
    describe:function(){return{cat:'C',version:'1.1',
      consumes:['bridge','abcd'],produces:['ai_state'],
      signals:['ai:command_received','ai:state_reported']};},
  },
  on:{
    'ide-ready':function(){
      // シングルトン状態を確認してログ出力
      var singletonInfo=sph.singleton.getInfo('ai_connect');
      if(singletonInfo){
        sph.call('ide.log',['[AI_CONNECT] Singleton instance active (mounted at '+new Date(singletonInfo.mountTime).toISOString()+')']);
      }
      sph.call('abcd.register',['ai_connect','C']);
      sph.call('ide.log',['[AI_CONNECT] Neural Bridge active']);
    },
    'frame-mounted':function(e){if(e.id==='ai_connect'){_refreshUI();sph.call('ide.log',['[AI_CONNECT] Frame mounted']);}}
  },
});
})();

</script>
