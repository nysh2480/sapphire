<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="sapphire-build" content="2025-03-05T00:00:00">
<meta name="sapphire-version" content="v11">
<title>Sapphire IDE v11</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#080b10;--surface:#0d1219;--surface2:#111a24;--surface3:#16202e;
  --border:#1e2d3d;--border2:#253545;
  --sapphire:#4c8ef5;--sapphire2:#2563c7;--cyan:#36d9c8;
  --emerald:#2de881;--amber:#f5c842;--rose:#f05575;--violet:#a78bfa;
  --text:#c8d8e8;--text2:#7a9ab8;--text3:#3a5a78;
  --col-i32:#4c8ef5;--col-f64:#2de881;--col-u64:#a78bfa;
  --col-str:#f5c842;--col-unk:#36d9c8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;}
body{display:flex;flex-direction:column;font-family:'Space Mono',monospace;background:var(--bg);color:var(--text)}
/* HEADER */
#hdr{height:44px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;}
#logo{font-family:'Syne',sans-serif;font-weight:800;font-size:15px;letter-spacing:2px;
  color:var(--sapphire);padding:0 18px;border-right:1px solid var(--border);
  display:flex;align-items:center;gap:6px;height:100%;}
#logo span{color:var(--cyan);font-size:10px;font-weight:400;}
.htabs{display:flex;height:100%;flex:1;}
.htab{padding:0 16px;font-size:10px;letter-spacing:1.5px;cursor:pointer;
  border-right:1px solid var(--border);border-bottom:2px solid transparent;
  display:flex;align-items:center;gap:5px;color:var(--text3);transition:all .15s;text-transform:uppercase;}
.htab:hover{color:var(--text2);}
.htab.on{color:var(--sapphire);border-bottom-color:var(--sapphire);background:var(--surface2);}
.htab .dot{width:5px;height:5px;border-radius:50%;background:currentColor;opacity:.6;}
.hrgt{display:flex;align-items:center;gap:8px;padding:0 12px;margin-left:auto;border-left:1px solid var(--border);}
#stat-pill{font-size:10px;padding:2px 8px;border-radius:10px;
  background:var(--surface3);border:1px solid var(--border);color:var(--text2);}
#stat-pill.ok{border-color:var(--emerald);color:var(--emerald);}
#stat-pill.err{border-color:var(--rose);color:var(--rose);}
#run-btn{font-family:inherit;font-size:10px;font-weight:700;letter-spacing:1px;
  padding:5px 14px;border-radius:3px;cursor:pointer;border:none;color:#fff;
  background:linear-gradient(135deg,var(--sapphire2),var(--sapphire));transition:all .15s;}
#run-btn:hover{filter:brightness(1.15);}
#clr-btn{font-family:inherit;font-size:10px;padding:5px 10px;border-radius:3px;
  cursor:pointer;background:transparent;border:1px solid var(--border2);color:var(--text2);transition:all .15s;}
#clr-btn:hover{border-color:var(--rose);color:var(--rose);}
/* MAIN */
#main{display:flex;flex:1;overflow:hidden;min-height:0;}
.view{display:none;flex:1;min-height:0;}
.view.on{display:flex;}
/* IDE view */
#view-ide{flex-direction:row;}
#ed-panel{width:400px;flex-shrink:0;display:flex;flex-direction:column;border-right:1px solid var(--border);}
.phdr{padding:5px 12px;font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--text3);background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;display:flex;align-items:center;justify-content:space-between;}
.badge{font-size:8px;padding:1px 5px;border-radius:8px;}
.bp{background:#a78bfa22;color:var(--violet);border:1px solid #a78bfa44;}
.bs{background:#f0557522;color:var(--rose);border:1px solid #f0557544;}
.bl{background:#2de88122;color:var(--emerald);border:1px solid #2de88144;}
#editor{flex:1;font-family:'Space Mono',monospace;font-size:12px;line-height:1.65;
  padding:10px 12px;color:var(--text);background:var(--surface2);
  border:none;outline:none;resize:none;caret-color:var(--cyan);
  overflow:auto;white-space:pre;tab-size:2;}
#out-panel{flex:1;display:flex;flex-direction:column;min-width:0;}
.rtabs{display:flex;height:26px;flex-shrink:0;background:var(--surface);border-bottom:1px solid var(--border);}
.rtab{padding:0 12px;font-size:9px;letter-spacing:1px;cursor:pointer;
  display:flex;align-items:center;color:var(--text3);border-right:1px solid var(--border);
  text-transform:uppercase;transition:color .15s;}
.rtab.on{color:var(--sapphire);}
#rpanel-log{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#rpanel-js{flex:1;display:none;overflow:hidden;}
#console{flex:1;overflow-y:auto;padding:10px 12px;
  font-family:'Space Mono',monospace;font-size:11px;line-height:1.7;background:#050810;}
#js-view{flex:1;overflow-y:auto;padding:10px 12px;
  font-family:'Space Mono',monospace;font-size:11px;line-height:1.6;
  color:#9b7fd4;white-space:pre-wrap;background:var(--surface);}
.log-sys{color:var(--sapphire);font-weight:700;}
.log-ok{color:var(--emerald);}
.log-err{color:var(--rose);background:#f0557510;padding:3px 7px;border-radius:3px;
  border-left:2px solid var(--rose);margin:2px 0;white-space:pre-wrap;}
.log-warn{color:var(--amber);}
.log-print{color:var(--text);}
.log-mem{color:var(--violet);font-size:10px;}
.log-block{color:var(--cyan);font-weight:700;}
/* resize handle */
#rsz{width:4px;flex-shrink:0;cursor:col-resize;background:var(--border);transition:background .15s;}
#rsz:hover{background:var(--sapphire);}
/* MEM view */
#view-mem{flex-direction:column;overflow-y:auto;padding:14px;background:var(--surface);}
.mem-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:8px;}
.mem-card{background:var(--surface2);border:1px solid var(--border);border-radius:4px;padding:8px 10px;}
.mem-chdr{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:6px;}
.mem-entry{display:flex;justify-content:space-between;font-size:10px;padding:2px 0;
  border-bottom:1px solid var(--border);color:var(--text2);}
.mem-entry:last-child{border-bottom:none;}
.mem-val{font-weight:700;}
/* EXT root */
#ext-root{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;}
#ext-root>*{pointer-events:auto;}
/* scrollbars */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
body.resizing{user-select:none;cursor:col-resize;}
</style>
</head>
<body>

<div id="hdr">
  <div id="logo">◆ SAPPHIRE<span>IDE v11</span></div>
  <div class="htabs">
    <div class="htab on" id="tab-ide" onclick="switchTab('ide')"><span class="dot"></span>IDE</div>
    <div class="htab" id="tab-mem" onclick="switchTab('mem')"><span class="dot"></span>MEM</div>
  </div>
  <div style="font-size:9px;color:var(--text3);padding:0 12px;" id="ed-stats">0L 0B 0V</div>
  <div class="hrgt">
    <span id="stat-pill">READY</span>
    <span id="exec-time" style="font-size:9px;color:var(--text3);display:none"></span>
    <button id="clr-btn" onclick="clearConsole()">CLR</button>
    <button id="run-btn" onclick="runDSL()">▶ RUN</button>
  </div>
</div>

<div id="main">
  <!-- IDE VIEW -->
  <div class="view on" id="view-ide">
    <div id="ed-panel">
      <div class="phdr">
        DSL SOURCE
        <div style="display:flex;gap:4px;">
          <span class="badge bp">&amp; PURE</span>
          <span class="badge bs">! SIDE</span>
          <span class="badge bl">@ LOOP</span>
        </div>
      </div>
      <textarea id="editor" spellcheck="false" autocomplete="off"
        oninput="onEdit()" onkeydown="onKey(event)"></textarea>
    </div>
    <div id="rsz" onmousedown="startResize(event)"></div>
    <div id="out-panel">
      <div class="rtabs">
        <div class="rtab on" id="rtab-log" onclick="switchRTab('log')">LOG</div>
        <div class="rtab" id="rtab-js"  onclick="switchRTab('js')">JS</div>
        <span style="flex:1"></span>
        <span id="bc-label" style="font-size:9px;color:var(--text3);padding:0 8px;display:flex;align-items:center;"></span>
      </div>
      <div id="rpanel-log">
        <div id="console"></div>
      </div>
      <div id="rpanel-js">
        <div id="js-view">; compile and run to see output</div>
      </div>
    </div>
  </div>
  <!-- MEM VIEW -->
  <div class="view" id="view-mem">
    <div class="mem-grid" id="mem-content">
      <div style="color:var(--text3);font-size:11px;">Run a program to see memory.</div>
    </div>
  </div>
</div>

<!-- EXT root: DSLが動的にUIを追加する場所 -->
<div id="ext-root"></div>

<!-- ═══════════════════════════════════════════════════════
     SAPPHIRE CORE — コンパイラ本体（変えない）
     ═══════════════════════════════════════════════════════ -->
<script id="sapphire-core">
// ─── 非同期sys関数セット ──────────────────────────────
const ASYNC_SYS = new Set([
  'wait',
  'net.connect','net.recv','net.send','net.migrate','net.broadcast',
  'storage.load_src',
]);

class SapphireTranspiler {
  constructor() { this.reset(); }
  reset() {
    this.sym     = {'#':{},'%':{},'~':{},'$':{},'?':{}};
    this.arrLen  = {'#':{},'%':{},'~':{},'$':{},'?':{}};
    this.nextSlot= {'#':0,'%':0,'~':0,'$':0,'?':0};
    this.strPool = [];
    this.errors  = [];
    this.warnings= [];
    this.blockTypes={};
    this._localVars=new Set();
  }
  _isLocal(token){ return token.length>2 && token[1]==='_'; }
  _register(sig,name,len){
    if(name.startsWith('_')) return null;
    if(this.sym[sig][name]===undefined){
      this.sym[sig][name]=this.nextSlot[sig];
      this.arrLen[sig][name]=len;
      this.nextSlot[sig]+=len;
    }
    return this.sym[sig][name];
  }
  addr(token){
    const sig=token[0];
    if(token[1]==='_'&&token.indexOf('[')===-1) return token.slice(1);
    const bp=token.indexOf('[');
    if(bp!==-1){
      const name=token.slice(1,bp);
      const ie=token.slice(bp+1,token.lastIndexOf(']'));
      const base=this._register(sig,name,1);
      const ij=this.translateExpr(ie);
      switch(sig){
        case '#':case '$': return `i32[${base}+(${ij})|0]`;
        case '%': return `f64[${base}+(${ij})|0]`;
        case '~': return `u64[BigInt(${base})+(BigInt(${ij}))]`;
        case '?': return `{tag:q_tags[${base}+(${ij})|0],val:q_vals[${base}+(${ij})|0]}`;
      }
    }
    const name=token.slice(1);
    const idx=this._register(sig,name,1);
    switch(sig){
      case '#':case '$': return `i32[${idx}]`;
      case '%': return `f64[${idx}]`;
      case '~': return `u64[${idx}]`;
      case '?': return `{tag:q_tags[${idx}],val:q_vals[${idx}]}`;
    }
    return token;
  }
  addrLval(token){
    const sig=token[0];
    const bp=token.indexOf('[');
    if(bp!==-1){
      const name=token.slice(1,bp);
      const ie=token.slice(bp+1,token.lastIndexOf(']'));
      const base=this._register(sig,name,1);
      const ij=this.translateExpr(ie);
      switch(sig){
        case '#':case '$': return `i32[${base}+(${ij})|0]`;
        case '%': return `f64[${base}+(${ij})|0]`;
        case '~': return `u64[BigInt(${base})+(BigInt(${ij}))]`;
        case '?': return `q_vals[${base}+(${ij})|0]`;
      }
    }
    if(token[1]==='_') return token.slice(1);
    const name=token.slice(1);
    const idx=this._register(sig,name,1);
    switch(sig){
      case '#':case '$': return `i32[${idx}]`;
      case '%': return `f64[${idx}]`;
      case '~': return `u64[${idx}]`;
      case '?': return `q_vals[${idx}]`;
    }
    return token.slice(1);
  }
  translateExpr(expr){
    if(!expr) return '0';
    expr=expr.trim();
    // 文字列リテラル → str_intern
    if(expr.startsWith('"')&&expr.endsWith('"')){
      const s=expr.slice(1,-1);
      return JSON.stringify(s); // 文字列リテラルは直接文字列として渡す
    }
    // 数値リテラル
    if(/^-?\d+(\.\d+)?$/.test(expr)) return expr;
    // BigInt
    if(/^0x[\da-fA-F]+n$/.test(expr)) return `BigInt("${expr.slice(0,-1)}")`;
    // 変数（演算子を含まない単純な変数参照のみここで処理）
    if(/^[#%~$?]/.test(expr)){
      // 配列インデックスアクセス: %arr[i]
      if(expr.indexOf('[')!==-1) return this.addr(expr);
      // 純粋な変数名（英数字_のみ）→ 即解決
      if(/^[#%~$?][a-zA-Z_]\w*$/.test(expr)) return this.addr(expr);
      // それ以外（%hp-1.0 のような演算子含み）は下の二項演算処理へ
    }
    // sys.* 呼び出し（式中）
    if(expr.startsWith('sys.')){
      return this.translateSys(expr).replace(/;$/,'');
    }
    // call &func [args] → 式中
    if(expr.startsWith('call ')){
      const rest=expr.slice(5).trim();
      const bi=rest.indexOf('[');
      const traw=bi>=0?rest.slice(0,bi).trim():rest;
      const target=traw.match(/^[&!@]/)?traw.slice(1):traw;
      if(bi>=0){
        const ar=rest.slice(bi+1,rest.lastIndexOf(']'));
        const args=ar.split(',').map(a=>this.translateExpr(a.trim())).filter(a=>a!=='');
        return `callBlock("${target}",[${args.join(',')}])`;
      }
      return `callBlock("${target}",[])`;
    }
    // 二項演算（簡易）
    const ops=[['&&','&&'],['||','||'],['<=','<='],['>=','>='],['!=','!=='],['==','==='],['<','<'],['>','>'],
               ['+','+'],['-','-'],['*','*'],['/','/'],['^','^'],['|','|'],['&','&'],['%','%']];
    for(const [op,jsop] of ops){
      const i=this._findOp(expr,op);
      if(i!==-1){
        const lhs=this.translateExpr(expr.slice(0,i).trim());
        const rhs=this.translateExpr(expr.slice(i+op.length).trim());
        if(op==='^') return `(${lhs}^${rhs})`;
        if(op==='%') return `((${lhs})%(${rhs}))`;
        return `(${lhs}${jsop}${rhs})`;
      }
    }
    // 単項否定
    if(expr.startsWith('!')){
      return `!(${this.translateExpr(expr.slice(1).trim())})`;
    }
    if(expr.startsWith('-')&&expr.length>1&&/[#%~\d]/.test(expr[1])){
      return `-(${this.translateExpr(expr.slice(1).trim())})`;
    }
    return expr;
  }
  _findOp(expr,op){
    let depth=0,inStr=false;
    for(let i=expr.length-op.length;i>=0;i--){
      const c=expr[i];
      if(c==='"') inStr=!inStr;
      if(inStr) continue;
      if(c===')'||c===']') depth++;
      if(c==='('||c==='[') depth--;
      if(depth===0&&expr.slice(i,i+op.length)===op){
        // 前後が識別子でないことを確認（== vs ===等）
        if(op==='='&&(expr[i+1]==='='||expr[i-1]==='!'||expr[i-1]==='<'||expr[i-1]==='>'||expr[i-1]==='=')) continue;
        return i;
      }
    }
    return -1;
  }
  stripComment(line){
    let inStr=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"') inStr=!inStr;
      if(!inStr&&line[i]===';') return line.slice(0,i);
    }
    return line;
  }
  // sys.* → JS
  translateSys(line){
    const m=line.match(/^sys\.([\w.]+)\s*(.*)?$/);
    if(!m) return `/* bad sys: ${line} */`;
    const fn=m[1];
    const rawArgs=(m[2]||'').trim();
    // 配列引数 ["...", "..."] の処理
    let args=[];
    if(rawArgs.startsWith('[')){
      // 文字列配列 or 数値配列
      try{
        // テキスト配列をパース
        const arrContent=rawArgs.slice(1,rawArgs.lastIndexOf(']'));
        args=[`[${arrContent.split(',').map(a=>{
          const t=a.trim();
          return t.startsWith('"')?t:this.translateExpr(t);
        }).join(',')}]`];
      } catch(e){ args=[rawArgs]; }
    } else if(rawArgs){
      let clean=rawArgs.replace(/\s*([|&^+\-*/<>!]+)\s*/g,'$1').replace(/\s*,\s*/g,',');
      args=clean?clean.split(',').map(a=>this.translateExpr(a.trim())):[];
    }
    const pre=ASYNC_SYS.has(fn)?'await ':'';
    // ドット区切りをJS階層アクセスに
    const parts=fn.split('.');
    if(parts.length===1){
      return `${pre}sys.${fn}(${args.join(',')})`;
    } else {
      return `${pre}sys.${parts.join('.')}(${args.join(',')})`;
    }
  }
  translateJump(line,blockName,blockType){
    const target=line.slice(2).trim();
    // -> @ : 自己ループ継続（continueで先頭へ）
    if(target==='@') return `continue;`;
    // -> :label : labelブロックへ遷移
    if(target.startsWith(':')){
      const lbl=target.slice(1);
      return `return "${lbl}";`;
    }
    // -> 0 / null : 終了
    if(target==='0'||target==='null') return `return null;`;
    // -> #var / %var : 変数値を返す
    if(target.startsWith('%')||target.startsWith('#')){
      return `return ${this.addr(target)};`;
    }
    // -> @blockname / !blockname / &blockname : シジルを除いたブロック名へ
    if(target.match(/^[@!&]/)) return `return "${target.slice(1)}";`;
    // -> 数値 : 終了
    if(!isNaN(target)) return `return null;`;
    // -> blockname : そのままブロック名へ
    return `return "${target}";`;
  }
  translateLine(raw,blockType,blockName,lineNum){
    let line=this.stripComment(raw).trim();
    if(!line||line==='}') return null;
    // &ブロックのsys.*禁止（ただしsys.print等の読み取り専用は将来許可予定）
    if(blockType==='&'&&line.startsWith('sys.')){
      this.errors.push(`[L${lineNum}] Purity Violation: sys.* in &${blockName}`);
      return `/* PURITY VIOLATION */`;
    }
    // &ブロックのグローバル変数使用禁止（大文字定数は例外）
    if(blockType==='&'){
      const gv=line.match(/^([#%~$?])([a-z][a-zA-Z0-9]*)\b/);
      if(gv){
        this.errors.push(`[L${lineNum}] Global var ${gv[1]}${gv[2]} in &${blockName} — use ${gv[1]}_${gv[2]}`);
        return `/* GLOBAL IN PURE */`;
      }
    }
    // sys.*
    if(line.startsWith('sys.')) return this.translateSys(line)+';';
    // lib.* (ライブラリ呼び出し: ns.cmd args)
    // screen.pset #x, #y, #c → sys.screen.pset(x,y,c)
    if(/^[a-z]\w+\.[a-z]\w*/.test(line)){
      const dotIdx=line.indexOf('.');
      const ns=line.slice(0,dotIdx);
      const rest=line.slice(dotIdx+1);
      const spIdx=rest.search(/\s/);
      const cmd=spIdx>=0?rest.slice(0,spIdx):rest;
      const argsRaw=spIdx>=0?rest.slice(spIdx+1).trim():'';
      // 文字列内カンマを考慮した分割
      const args=argsRaw?this._splitArgs(argsRaw).map(a=>this.translateExpr(a)):[];
      const pre=ASYNC_SYS.has(`${ns}.${cmd}`)?'await ':'';
      return `${pre}sys.${ns}.${cmd}(${args.join(',')});`;
    }
    // call
    if(line.startsWith('call ')){
      const rest=line.slice(5).trim();
      const bi=rest.indexOf('[');
      const traw=bi>=0?rest.slice(0,bi).trim():rest;
      const target=traw.match(/^[&!@]/)?traw.slice(1):traw;
      if(bi>=0){
        const ar=rest.slice(bi+1,rest.lastIndexOf(']'));
        const args=ar.split(',').map(a=>this.translateExpr(a.trim())).filter(a=>a!=='');
        return `pc_ret=callBlock("${target}",[${args.join(',')}]);`;
      }
      return `pc_ret=callBlock("${target}",[]);`;
    }
    // jump
    if(line.startsWith('->')) return this.translateJump(line,blockName,blockType);
    // 配列代入 #arr = [...]
    {
      const am=line.match(/^([#%~$?][a-zA-Z_]\w*)\s*=\s*\[([^\]]*)\]/);
      if(am){
        const lhs=am[1],sig=lhs[0],name=lhs.slice(1);
        const els=am[2].split(',').map(e=>e.trim()).filter(e=>e!=='');
        const base=this._register(sig,name,els.length);
        this.arrLen[sig][name]=els.length;
        return els.map((el,i)=>{
          const slot=base+i;
          const ej=this.translateExpr(el);
          switch(sig){
            case '#':case '$': return `i32[${slot}]=(${ej})|0;`;
            case '%': return `f64[${slot}]=+(${ej});`;
            case '~': return `u64[${slot}]=BigInt(${ej});`;
            case '?': return `q_vals[${slot}]=+(${ej});`;
          }
        }).join('\n          ');
      }
    }
    // 動的配列インデックス代入 #arr[#i] = val
    {
      const dm=line.match(/^([#%~$?])([a-zA-Z_]\w*)\[([^\]]+)\]\s*=(?!=)\s*(.*)/s);
      if(dm){
        const [,sig,name,idxRaw,rhsRaw]=dm;
        const base=this._register(sig,name,1);
        const ij=this.translateExpr(idxRaw);
        const rj=this.translateExpr(rhsRaw.trim());
        switch(sig){
          case '#':case '$': return `i32[${base}+(${ij})|0]=(${rj})|0;`;
          case '%': return `f64[${base}+(${ij})|0]=+(${rj});`;
          case '~': return `u64[BigInt(${base})+BigInt(${ij})]=BigInt(${rj});`;
          case '?': return `q_vals[${base}+(${ij})|0]=+(${rj});`;
        }
      }
    }
    // let宣言 (ローカル変数初回)
    {
      const lv=line.match(/^([#%~$?])(_[a-zA-Z]\w*)\s*=(?!=)\s*(.*)/s);
      if(lv){
        const [,sig,name,rhsRaw]=lv;
        const rj=this.translateExpr(rhsRaw.trim());
        const jsname=name; // _foo
        if(!this._localVars.has(jsname)){
          this._localVars.add(jsname);
          switch(sig){
            case '#':case '$': return `let ${jsname}=(${rj})|0;`;
            case '%': return `let ${jsname}=+(${rj});`;
            case '~': return `let ${jsname}=BigInt(${rj});`;
            case '?': return `let ${jsname}=+(${rj});`;
          }
        } else {
          switch(sig){
            case '#':case '$': return `${jsname}=(${rj})|0;`;
            case '%': return `${jsname}=+(${rj});`;
            case '~': return `${jsname}=BigInt(${rj});`;
            case '?': return `${jsname}=+(${rj});`;
          }
        }
      }
    }
    // スカラー代入 #x = expr
    {
      const sa=line.match(/^([#%~$?][a-zA-Z][a-zA-Z0-9]*)\s*=(?!=)\s*(.*)/s);
      if(sa){
        const lhs=sa[1],rhs=sa[2].trim();
        const lj=this.addrLval(lhs),rj=this.translateExpr(rhs);
        const sig=lhs[0];
        switch(sig){
          case '#':case '$': return `${lj}=(${rj})|0;`;
          case '%': return `${lj}=+(${rj});`;
          case '~': return `${lj}=BigInt(${rj});`;
          case '?': return `${lj}=+(${rj});`;
        }
      }
    }
    // フォールバック: 未知の行は警告付きでコメント化
    this.warnings.push(`[L${lineNum}] Unknown syntax: ${line.slice(0,40)}`);
    return `/* unknown: ${line.replace(/\*\//g,'* /')} */`;
  }
  parseIfBlock(lines,startIdx){
    let text='';let depth=0;let i=startIdx;let inStr=false;
    while(i<lines.length){
      const l=this.stripComment(lines[i]).trim();
      text+=l+' ';
      for(const c of l){
        if(c==='"') inStr=!inStr;
        if(!inStr&&c==='{') depth++;
        if(!inStr&&c==='}') depth--;
      }
      if(depth<=0&&text.trim().length>3) break;
      i++;
    }
    return{text:text.trim(),endIdx:i};
  }
  splitByComma(s){
    const parts=[];let cur='';let depth=0;let inStr=false;
    for(const ch of s){
      if(ch==='"') inStr=!inStr;
      if(!inStr&&ch==='{') depth++;
      if(!inStr&&ch==='}') depth--;
      if(!inStr&&depth===0&&ch===','){parts.push(cur.trim());cur='';}
      else cur+=ch;
    }
    if(cur.trim()) parts.push(cur.trim());
    return parts;
  }
  translateIfBlock(text,blockType,blockName,lineNum){
    const ifM=text.match(/^\s*if\s+/);
    if(!ifM) return `/* bad if */`;
    const afterIf=text.slice(ifM[0].length);
    let bOpen=-1;let inStr=false;
    for(let i=0;i<afterIf.length;i++){
      if(afterIf[i]==='"') inStr=!inStr;
      if(!inStr&&afterIf[i]==='{'){bOpen=i;break;}
    }
    if(bOpen<0) return `/* bad if: no { */`;
    const condPart=afterIf.slice(0,bOpen).trim();
    let bClose=-1;inStr=false;
    for(let i=afterIf.length-1;i>=bOpen;i--){
      if(afterIf[i]==='"') inStr=!inStr;
      if(!inStr&&afterIf[i]==='}'){bClose=i;break;}
    }
    if(bClose<0) return `/* bad if: no } */`;
    const inner=afterIf.slice(bOpen+1,bClose).trim();
    const branches=this.splitByComma(inner).filter(b=>b.trim());
    const isJump=branches.length>0&&branches.every(b=>/^\s*(\d+|\*)\s*:/.test(b));
    if(isJump){
      const cond=this.translateExpr(condPart);
      let out=`switch(${cond}){\n`;
      for(const br of branches){
        let ci=-1;let inS=false;
        for(let i=0;i<br.length;i++){
          if(br[i]==='"') inS=!inS;
          if(!inS&&br[i]===':'){ci=i;break;}
        }
        if(ci<0) continue;
        const k=br.slice(0,ci).trim();
        const act=br.slice(ci+1).trim();
        const cl=k==='*'?'default':`case ${k}`;
        const tr=act.startsWith('->')?this.translateJump(act,blockName,blockType):
                 act.startsWith('sys.')?this.translateSys(act)+';':
                 this.translateLine(act,blockType,blockName,lineNum)||(act+';');
        out+=`          ${cl}: ${tr} break;\n`;
      }
      return out+'          }';
    }
    const cond=this.translateExpr(condPart);
    const stmts=this.splitStmts(inner);
    let body='';
    for(const s of stmts){
      const t=this.translateLine(s,blockType,blockName,lineNum);
      if(t) body+=`\n            ${t}`;
    }
    return `if(${cond}){${body}\n          }`;
  }
  splitStmts(text){
    const stmts=[];let rest=text.trim();
    while(rest.length>0){
      let end=-1;let inStr=false;
      if(rest.startsWith('sys.')||rest.startsWith('->')||
         /^[#%~$?]/.test(rest)||/^call\s/.test(rest)||/^[a-z]\w+\.\w/.test(rest)){
        let pos=1;
        while(pos<rest.length){
          if(rest[pos]==='"') inStr=!inStr;
          if(!inStr&&(rest[pos]===' '||rest[pos]==='\t')){
            const tail=rest.slice(pos+1);
            if(/^(sys\.|->|call\s)/.test(tail)||
               /^[#%~$?][a-zA-Z_]\w*\s*=(?!=)/.test(tail)||
               /^[a-z]\w+\.[a-z]\w*/.test(tail)){
              end=pos;break;
            }
          }
          pos++;
        }
      }
      if(end>0){stmts.push(rest.slice(0,end).trim());rest=rest.slice(end).trim();}
      else{stmts.push(rest.trim());break;}
    }
    return stmts.filter(s=>s&&!s.startsWith(';'));
  }
  // 文字列内カンマを無視したargs分割
  _splitArgs(s){
    const parts=[];let cur='';let inStr=false;
    for(const c of s){
      if(c==='"') inStr=!inStr;
      if(!inStr&&c===','){parts.push(cur.trim());cur='';}
      else cur+=c;
    }
    if(cur.trim()) parts.push(cur.trim());
    return parts;
  }
  // lib解決: type="sapphire/lib" タグも参照
  _resolveLibs(source){
    const lines=source.split('\n');
    const libSrcs=[];const rest=[];
    for(const line of lines){
      const m=line.trim().match(/^lib\s+([a-zA-Z_]\w*)$/);
      if(m){
        const name=m[1];
        // 1. type="sapphire/lib" タグから探す
        let src=null;
        const tag=document.querySelector(`script[type="sapphire/lib"][data-name="${name}"]`);
        if(tag) src=tag.textContent;
        // 2. localStorageから探す
        if(!src){
          try{src=localStorage.getItem(`sapphire:lib:${name}`);}catch(e){}
        }
        if(src){
          libSrcs.push(`; ── lib ${name} ──`);
          libSrcs.push(src);
        } else {
          this.warnings.push(`lib "${name}" not found`);
        }
      } else {
        rest.push(line);
      }
    }
    return[...libSrcs,...rest].join('\n');
  }
  transpile(source){
    this.reset();
    source=this._resolveLibs(source);
    const rawLines=source.split('\n');
    const registry={};
    let curName='__top__';let curType='!';let curBody=[];
    const commit=()=>{
      if(curBody.length===0&&curName==='__top__') return;
      registry[curName]={type:curType,body:curBody.join('\n')};
      this.blockTypes[curName]=curType;
    };
    let i=0;
    while(i<rawLines.length){
      const raw=rawLines[i];
      const stripped=this.stripComment(raw).trim();
      // ブロック宣言
      if(stripped.match(/^[&!@]/)){
        commit();
        curType=stripped[0];
        const decl=stripped.slice(1);
        const bi=decl.indexOf('[');
        if(curType==='&'&&bi>=0){
          curName=decl.slice(0,bi).trim();
          const ps=decl.slice(bi+1,decl.lastIndexOf(']'));
          const params=ps.split(',').map(p=>p.trim()).filter(p=>p).map(p=>p.slice(1));
          registry.__params=registry.__params||{};
          registry.__params[curName]=params;
        } else {
          curName=decl.replace(/\s*\{.*/,'').trim();
        }
        curBody=[];
        this._localVars=new Set();
        i++;continue;
      }
      if(!stripped||stripped.startsWith(';')||stripped==='}'){i++;continue;}
      if(stripped.match(/^if\b/)){
        const{text,endIdx}=this.parseIfBlock(rawLines,i);
        const js=this.translateIfBlock(text,curType,curName,i+1);
        curBody.push('          '+js);
        i=endIdx+1;continue;
      }
      const js=this.translateLine(stripped,curType,curName,i+1);
      if(js) curBody.push('          '+js);
      i++;
    }
    commit();
    // __top__ に明示ジャンプがなければ最初の !ブロックへ自動ジャンプ
    if(registry['__top__']&&!registry['__top__'].body.includes('return ')){
      const _fb=
        Object.entries(registry).find(([n,b])=>n!=='__top__'&&b.type==='!'&&!n.includes('.'))?.[0]??
        Object.keys(registry).find(n=>n!=='__top__'&&n!=='__params'&&!n.includes('.'));
      if(_fb) registry['__top__'].body+='\n          return "'+_fb+'";';
    }
    return registry;
  }
  generateOutput(registry){
    let out='';
    for(const[name,block] of Object.entries(registry)){
      if(name==='__params') continue;
      const tl={'&':'PURE','!':'SIDE','@':'LOOP'}[block.type]||'?';
      out+=`// [${tl}] ${block.type}${name}\nasync function block_${name.replace(/\./g,'_')}(mem,sys){\n`;
      out+=`  const{i32,f64,u64,q_tags,q_vals,str}=mem;\n  let pc_ret=null;\n`;
      out+=`  while(true){\n${block.body}\n    break;\n  }\n  return pc_ret;\n}\n\n`;
    }
    return out;
  }
}
</script>

<!-- ═══════════════════════════════════════════════════════
     SAPPHIRE RUNTIME — VM・sys実装
     ═══════════════════════════════════════════════════════ -->
<script id="sapphire-runtime">
const transpiler=new SapphireTranspiler();
let lastMem=null,lastRegistry=null;

function createMem(){
  return{
    i32:new Int32Array(4096),f64:new Float64Array(2048),
    u64:new BigUint64Array(512),str:[],_strMap:new Map(),
    q_tags:new Uint8Array(1024),q_vals:new Float64Array(1024),
  };
}
function str_intern(mem,s){
  if(mem._strMap.has(s)) return mem._strMap.get(s);
  const idx=mem.str.length;mem.str.push(s);mem._strMap.set(s,idx);return idx;
}
function precompileRegistry(registry,mem,sys,log){
  const cache={};
  const{i32,f64,u64,q_tags,q_vals,str}=mem;
  const si=(a,b)=>b!==undefined?str_intern(a,b):str_intern(mem,a); // 1引数(s)と2引数(mem,s)両対応
  const params=registry.__params||{};
  // UNDEFINED BLOCK バグ修正: callBlock は registry から検索
  const callBlock=(name,args=[])=>{
    const block=registry[name];
    if(!block){
      const known=Object.keys(registry).filter(n=>n!=='__params').join(', ');
      log('log-err',`UNDEFINED BLOCK: "${name}"\n  Known: ${known}`);
      return null;
    }
    return block.type==='&'
      ?callSync(cache,name,args,log)
      :callCached(cache,name,log);
  };
  for(const[name,block] of Object.entries(registry)){
    if(name==='__params') continue;
    try{
      const isSync=block.type==='&';
      const safeName=name.replace(/\./g,'_');
      const blockParams=params[name]||[];
      const paramList=blockParams.join(',');
      const fnDecl=isSync
        ?`return function block_${safeName}(${paramList}){`
        :`return async function block_${safeName}(){`;
      cache[name]=new Function(
        'i32','f64','u64','q_tags','q_vals','str','sys','callBlock','mem','str_intern',
        `"use strict";${fnDecl}let pc_ret=null;while(true){\n${block.body}\nbreak;}return pc_ret;}`
      )(i32,f64,u64,q_tags,q_vals,str,sys,callBlock,mem,si);
    }catch(e){
      log('log-err',`[COMPILE:${name}] ${e.message}`);
      cache[name]=block.type==='&'?()=>null:async()=>null;
    }
  }
  return cache;
}
function callSync(cache,name,args,log){
  const fn=cache[name];
  if(!fn){log('log-err',`CACHE MISS: "${name}"`);return null;}
  try{return fn(...args);}catch(e){log('log-err',`[${name}] ${e.message}`);return null;}
}
async function callCached(cache,name,log){
  const fn=cache[name];
  if(!fn){log('log-err',`CACHE MISS: "${name}"`);return null;}
  try{return await fn();}catch(e){log('log-err',`[${name}] ${e.message}`);return null;}
}

// ─── sys実装 (BASIC寄り命名) ──────────────────────────
function makeSys(mem,outEl,tabId){
  const pfx=tabId?`sapphire:t${tabId}:`:'sapphire:';
  const log=(cls,msg)=>{
    const d=document.createElement('div');d.className=cls;
    d.textContent=msg;outEl.appendChild(d);
    outEl.scrollTop=outEl.scrollHeight;
  };
  const sto=(k)=>pfx+'data:'+k;
  return{
    // ─── 組み込み (sys.*) ───────────────────────────
    print:  (...a)=>log('log-print',a.map(v=>typeof v==='bigint'?`0x${v.toString(16)}n`:String(v)).join(' ')),
    stop:   (msg)=>{throw new Error('STOP'+(msg?': '+msg:''));},
    beep:   ()=>{ try{const a=new AudioContext();const o=a.createOscillator();o.connect(a.destination);o.start();o.stop(a.currentTime+0.1);}catch(e){}},
    rnd:    (lo,hi)=>Math.floor(Math.random()*(Number(hi)-Number(lo)+1))+Number(lo),
    rndf:   (lo,hi)=>Math.random()*(Number(hi)-Number(lo))+Number(lo),
    wait:   async()=>{await new Promise(r=>requestAnimationFrame(r));},
    save:   (key,val)=>{try{localStorage.setItem(sto(key),String(val));}catch(e){}},
    load:   (key)=>{const v=localStorage.getItem(sto(key));return v===null?0:isNaN(v)?v:Number(v);},
    loadstr:(key)=>localStorage.getItem(sto(key))||'',
    // sys.html / sys.js — lib初期化用
    html:   (arr)=>{
      const root=document.getElementById('ext-root');
      if(root) root.insertAdjacentHTML('beforeend',Array.isArray(arr)?arr.join(''):String(arr));
    },
    js:     (arr)=>{
      try{new Function(Array.isArray(arr)?arr.join('\n'):String(arr))();}
      catch(e){log('log-err','[sys.js] '+e.message);}
    },
    // sys.export
    export: (mode,name)=>exportIDE(mode,name),
    // sys.dom
    dom:{
      show:   (id)=>{const e=document.getElementById(id);if(e)e.style.display='';},
      hide:   (id)=>{const e=document.getElementById(id);if(e)e.style.display='none';},
      toggle: (id)=>{const e=document.getElementById(id);if(e)e.style.display=e.style.display==='none'?'':'none';},
      set_text:(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;},
      get_val:(id)=>{const e=document.getElementById(id);return e?e.value:'';},
      set_val:(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;},
      add_class:(id,c)=>{document.getElementById(id)?.classList.add(c);},
      rem_class:(id,c)=>{document.getElementById(id)?.classList.remove(c);},
      add_div:  (id)=>addExtEl('div',id),
      add_canvas:(id)=>addExtEl('canvas',id),
      add_textarea:(id)=>addExtEl('textarea',id),
      add_button:(id,label)=>{const e=addExtEl('button',id);if(e&&label)e.textContent=label;return e;},
      append_to:(parent,child)=>{
        const p=document.getElementById(parent),c=document.getElementById(child);
        if(p&&c)p.appendChild(c);
      },
      set_html:(id,html)=>{const e=document.getElementById(id);if(e)e.innerHTML=html;},
      remove:  (id)=>{document.getElementById(id)?.remove();},
    },
    // sys.input
    input:{
      key:    ()=>_lastKey,
      stick:  (n)=>_stickState[n]||0,
      strig:  (n)=>_strigState[n]||0,
      mouse_x:()=>_mouseX,
      mouse_y:()=>_mouseY,
    },
    // sys.storage (互換)
    storage:{
      set:      (k,v)=>{try{localStorage.setItem(sto(k),String(v));}catch(e){}},
      get_int:  (k)=>parseInt(localStorage.getItem(sto(k))||'0')||0,
      get_float:(k)=>parseFloat(localStorage.getItem(sto(k))||'0')||0,
      get_str:  (k)=>localStorage.getItem(sto(k))||'',
      del:      (k)=>{try{localStorage.removeItem(sto(k));}catch(e){}},
      save_src: (n)=>{
        const src=document.getElementById('editor').value;
        localStorage.setItem(`sapphire:lib:${n}`,src);
        log('log-ok',`[STORAGE] saved lib:${n}`);
      },
      load_src: async(n)=>{
        const src=localStorage.getItem(`sapphire:lib:${n}`);
        if(src){document.getElementById('editor').value=src;onEdit();log('log-ok',`[STORAGE] loaded lib:${n}`);}
        else log('log-err',`[STORAGE] lib:${n} not found`);
      },
    },
    // sys.ai
    ai:{
      evaluate:(ev,persona)=>{
        const x=BigInt(ev)&BigInt(persona);
        let s=0n,t=x;while(t>0n){if(t&1n)s++;t>>=1n;}
        return Number(s>3n?3n:s);
      },
      update_mask:(target,bit)=>BigInt(target)|BigInt(bit),
    },
    // sys.net (スタブ)
    net:{
      connect:  async(url)=>log('log-warn',`[NET] connect ${url}`),
      send:     async(ch,d)=>log('log-warn',`[NET] send ch=${ch}`),
      recv:     async(ch)=>0,
      broadcast:async(d)=>log('log-warn',`[NET] broadcast`),
    },
    // sys.world (スタブ)
    world:{dist:(a,b)=>0,los:(a,b)=>1,get_tile:(x,y)=>0,get_event:()=>0},
    // sys.screen (lib screenのDSL命令をJSで直接実装)
    screen:{
      mode:(vw,vh,ratio)=>{
        const s=window._SC||{};
        s.vw=vw|0; s.vh=vh|0; s.ratio=ratio|0||1;
        s.vbuf=new Uint32Array(s.vw*s.vh);
        s.off=new OffscreenCanvas(s.vw,s.vh);
        s.offx=s.off.getContext('2d');
        s.idat=s.offx.createImageData(s.vw,s.vh);
        const c=document.getElementById('_sc');
        if(c){c.width=s.vw*s.ratio;c.height=s.vh*s.ratio;s.ctx=c.getContext('2d');}
        window._SC=s;
      },
      cls:()=>{if(window._SC?.vbuf)window._SC.vbuf.fill(0);},
      pset:(x,y,c)=>{
        const s=window._SC;if(!s?.vbuf)return;
        x=x|0;y=y|0;
        if(x>=0&&x<s.vw&&y>=0&&y<s.vh)s.vbuf[y*s.vw+x]=c|0;
      },
      line:(x0,y0,x1,y1,c)=>{
        const s=window._SC;if(!s?.vbuf)return;
        x0=x0|0;y0=y0|0;x1=x1|0;y1=y1|0;c=c|0;
        let dx=Math.abs(x1-x0),dy=Math.abs(y1-y0);
        let sx=x0<x1?1:-1,sy=y0<y1?1:-1,err=dx-dy;
        while(true){
          if(x0>=0&&x0<s.vw&&y0>=0&&y0<s.vh)s.vbuf[y0*s.vw+x0]=c;
          if(x0===x1&&y0===y1)break;
          const e2=2*err;
          if(e2>-dy){err-=dy;x0+=sx;}
          if(e2<dx){err+=dx;y0+=sy;}
        }
      },
      rect:(x,y,w,h,c)=>{
        const s=window._SC;if(!s?.vbuf)return;
        const x1=x+w-1,y1=y+h-1;
        for(let i=x;i<=x1;i++){
          if(i>=0&&i<s.vw){
            if(y>=0&&y<s.vh)s.vbuf[y*s.vw+i]=c;
            if(y1>=0&&y1<s.vh)s.vbuf[y1*s.vw+i]=c;
          }
        }
        for(let j=y;j<=y1;j++){
          if(j>=0&&j<s.vh){
            if(x>=0&&x<s.vw)s.vbuf[j*s.vw+x]=c;
            if(x1>=0&&x1<s.vw)s.vbuf[j*s.vw+x1]=c;
          }
        }
      },
      fill_rect:(x,y,w,h,c)=>{
        const s=window._SC;if(!s?.vbuf)return;
        for(let j=y;j<y+h;j++)for(let i=x;i<x+w;i++)
          if(i>=0&&i<s.vw&&j>=0&&j<s.vh)s.vbuf[j*s.vw+i]=c|0;
      },
      flip:()=>{
        const s=window._SC;if(!s?.vbuf||!s.ctx)return;
        const d=s.idat.data,v=s.vbuf;
        for(let i=0;i<v.length;i++){
          const p=v[i];
          d[i*4]=(p>>16)&0xff;d[i*4+1]=(p>>8)&0xff;
          d[i*4+2]=p&0xff;d[i*4+3]=0xff;
        }
        s.offx.putImageData(s.idat,0,0);
        s.ctx.drawImage(s.off,0,0,s.vw*s.ratio,s.vh*s.ratio);
      },
      get_w:()=>window._SC?.vw||0,
      get_h:()=>window._SC?.vh||0,
    },
    // sys.time (互換)
    time:{
      wait_frame:async()=>{await new Promise(r=>requestAnimationFrame(r));},
      get_frame:()=>_frameCount,
    },
    // 互換: sys.core.*
    core:{
      log:(...a)=>log('log-print',a.map(v=>String(v)).join(' ')),
      rand_int:(lo,hi)=>Math.floor(Math.random()*(Number(hi)-Number(lo)+1))+Number(lo),
      panic:(m)=>{throw new Error('PANIC: '+m);},
    },
  };
}

// ─── 入力状態 ────────────────────────────────────────
let _lastKey='';let _stickState={};let _strigState={};
let _mouseX=0;let _mouseY=0;let _frameCount=0;
document.addEventListener('keydown',e=>{_lastKey=e.key;});
document.addEventListener('keyup',e=>{if(_lastKey===e.key)_lastKey='';});
document.addEventListener('mousemove',e=>{_mouseX=e.clientX;_mouseY=e.clientY;});

// ─── DOM要素追加ヘルパー ───────────────────────────────
function addExtEl(tag,id){
  if(document.getElementById(id)) return document.getElementById(id);
  const el=document.createElement(tag);
  el.id=id;
  document.getElementById('ext-root').appendChild(el);
  return el;
}

// ─── VM実行 ──────────────────────────────────────────
let _vmRunning=false;let _vmAbort=false;

async function runDSL(){
  if(_vmRunning){
    _vmAbort=true;
    document.getElementById('run-btn').textContent='▶ RUN';
    document.getElementById('run-btn').style.background='';
    return;
  }
  const src=document.getElementById('editor').value;
  const conEl=document.getElementById('console');
  const jsEl=document.getElementById('js-view');
  const pill=document.getElementById('stat-pill');
  const runBtn=document.getElementById('run-btn');
  conEl.innerHTML='';jsEl.textContent='';
  pill.className='';pill.textContent='COMPILING…';
  runBtn.textContent='■ STOP';
  runBtn.style.background='linear-gradient(135deg,#7a1428,#c0273d)';
  _vmRunning=true;_vmAbort=false;

  const log=(cls,msg)=>{
    const d=document.createElement('div');d.className=cls;
    d.textContent=msg;conEl.appendChild(d);conEl.scrollTop=conEl.scrollHeight;
  };

  try{
    const registry=transpiler.transpile(src);
    // ブロック登録のデバッグ情報
    const blockNames=Object.entries(registry)
      .filter(([n])=>n!=='__params')
      .map(([n,b])=>b.type+n).join('  ');
    if(transpiler.errors.length){
      transpiler.errors.forEach(e=>{log('log-err',e);});
      _vmRunning=false;_vmAbort=false;runBtn.textContent='▶ RUN';runBtn.style.background='';
      pill.className='err';pill.textContent='ERROR';return;
    }
    if(transpiler.warnings.length){
      transpiler.warnings.forEach(w=>log('log-warn','⚠ '+w));
    }
    const mem=createMem();lastMem=mem;
    const sys=makeSys(mem,conEl,null);lastRegistry=registry;
    const jsOut=transpiler.generateOutput(registry);
    jsEl.textContent=jsOut;
    const bcEl=document.getElementById('bc-label');
    if(bcEl){
      const bl=Object.entries(registry).filter(([n])=>n!=='__params');
      const p=bl.filter(([,b])=>b.type==='&').length;
      const s=bl.filter(([,b])=>b.type==='!').length;
      const l=bl.filter(([,b])=>b.type==='@').length;
      bcEl.textContent=`${bl.length}blk &${p} !${s} @${l}`;
    }
    const cache=precompileRegistry(registry,mem,sys,log);
    log('log-sys','◆ SAPPHIRE IDE v11 BOOT');
    log('log-sys',`◆ BLOCKS: ${blockNames}`);
    log('log-sys',`◆ ${Object.keys(registry).filter(n=>n!=='__params').length} blocks compiled`);

    let firstEntry;
    if(registry['__top__']&&registry['__top__'].body.trim()){
      firstEntry='__top__'; // auto-jump付与済みなのでここから開始
    } else {
      firstEntry=
        Object.entries(registry).find(([n,b])=>n!=='__top__'&&b.type==='!'&&!n.includes('.'))?.[0]??
        Object.keys(registry).find(n=>n!=='__top__'&&n!=='__params'&&!n.includes('.'));
    }
    if(!firstEntry){log('log-warn','No entry block.');pill.textContent='EMPTY';return;}
    log('log-block',`>> ENTER ${registry[firstEntry]?.type??'?'}${firstEntry}`);

    let pc=firstEntry;let totalSteps=0;let frameSteps=0;let loopCount=0;
    const MAX_FRAME=10000;const MAX_TOTAL=500000;
    const t0=Date.now();let lastUI=t0;
    while(pc&&typeof pc==='string'&&!_vmAbort){
      totalSteps++;frameSteps++;
      if(totalSteps>MAX_TOTAL){log('log-err',`MAX_STEPS(${MAX_TOTAL}) reached`);break;}
      if(frameSteps>MAX_FRAME){
        log('log-err',`Frame step limit — add sys.wait`);break;
      }
      const block=registry[pc];
      if(!block){
        const known=Object.keys(registry).filter(n=>n!=='__params').join(', ');
        log('log-err',`UNDEFINED BLOCK: "${pc}"\n  Known: ${known}`);break;
      }
      if(block.type!=='@'){
        loopCount=0;
        if(pc!=='__top__') log('log-block',`>> ${block.type}${pc}`);
      } else {
        loopCount++;
        if(loopCount<=3) log('log-block',`>> @${pc}`);
        else if(loopCount===4) log('log-block',`>> @${pc} (continuing…)`);
      }
      pc=block.type==='&'?callSync(cache,pc,[],log):await callCached(cache,pc,log);
      if(block.type==='@') frameSteps=0; // sys.wait後のフレームリセット
      _frameCount++;
      const now=Date.now();
      if(now-lastUI>50){
        updateMemView(mem,transpiler.sym);
        lastUI=now;frameSteps=0;
        await new Promise(r=>setTimeout(r,0));
      }
    }
    const elapsed=Date.now()-t0;
    const et=document.getElementById('exec-time');
    if(et){et.textContent=`${elapsed}ms / ${totalSteps}steps`;et.style.display='';}
    if(_vmAbort){
      log('log-warn',`◆ ABORTED (${totalSteps} steps, ${elapsed}ms)`);
      pill.className='';pill.textContent='STOPPED';
    } else {
      log('log-sys',`◆ DONE — ${totalSteps} steps in ${elapsed}ms`);
      pill.className='ok';pill.textContent='OK';
    }
    updateMemView(mem,transpiler.sym);
  }catch(e){
    if(e.message==='STOP'||e.message.startsWith('STOP:')){
      const conEl2=document.getElementById('console');
      const d=document.createElement('div');d.className='log-warn';
      d.textContent='◆ '+e.message;conEl2.appendChild(d);
      pill.textContent='STOPPED';
    } else {
      log('log-err','RUNTIME ERROR: '+e.message);
      console.error(e);pill.className='err';pill.textContent='ERROR';
    }
  }finally{
    _vmRunning=false;_vmAbort=false;
    runBtn.textContent='▶ RUN';runBtn.style.background='';
  }
}
</script>

<!-- ═══════════════════════════════════════════════════════
     SAPPHIRE BASE — UI・エクスポート
     ═══════════════════════════════════════════════════════ -->
<script id="sapphire-base">
// ─── タブ切り替え ─────────────────────────────────────
function switchTab(id){
  ['ide','mem'].forEach(t=>{
    document.getElementById('view-'+t)?.classList.toggle('on',t===id);
    document.getElementById('tab-'+t)?.classList.toggle('on',t===id);
  });
  if(id==='mem'&&lastMem) updateMemView(lastMem,transpiler.sym);
  if(id==='ide') setTimeout(()=>document.getElementById('editor')?.focus(),50);
}
function switchRTab(id){
  ['log','js'].forEach(t=>{
    document.getElementById('rtab-'+t)?.classList.toggle('on',t===id);
    document.getElementById('rpanel-'+t).style.display=t===id?'flex':'none';
  });
}
function clearConsole(){
  document.getElementById('console').innerHTML='';
  document.getElementById('stat-pill').className='';
  document.getElementById('stat-pill').textContent='READY';
  const et=document.getElementById('exec-time');if(et)et.style.display='none';
  document.getElementById('js-view').textContent='; compile and run to see output';
  const bc=document.getElementById('bc-label');if(bc)bc.textContent='';
}
// ─── エディタUI ──────────────────────────────────────
let _saveTimer=null;
// ─── ドキュメントセッション管理 ──────────────────────
let _docId=(()=>{const h=location.hash.slice(1);return h||('doc_'+Date.now().toString(36));})();
location.hash=_docId;
function _saveDoc(src){try{localStorage.setItem('sapphire:doc:'+_docId,src);localStorage.setItem('sapphire:last_doc',_docId);}catch(e){}}
function newDoc(){const ta=document.getElementById('editor');if(ta.value.trim()&&!confirm('変更を破棄して新規作成しますか？'))return;_docId='doc_'+Date.now().toString(36);location.hash=_docId;ta.value=DEFAULT_PROGRAM;onEdit();ta.focus();}
function onEdit(){
  const ta=document.getElementById('editor');
  const src=ta.value;
  const lines=src.split('\n');
  const blks=(src.match(/^[&!@]/mg)||[]).length;
  const vars=new Set((src.match(/[#%~$?][a-zA-Z_]\w*/g)||[])).size;
  const st=document.getElementById('ed-stats');
  if(st)st.textContent=`${lines.length}L ${blks}B ${vars}V`;
  clearTimeout(_saveTimer);
  _saveTimer=setTimeout(()=>{
    _saveDoc(src);
  },1000);
}
function onKey(e){
  if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){e.preventDefault();runDSL();return;}
  if((e.ctrlKey||e.metaKey)&&e.key==='/'){
    e.preventDefault();
    const ta=e.target;const s=ta.selectionStart;
    const ls=ta.value.lastIndexOf('\n',s-1)+1;
    const le=ta.value.indexOf('\n',s);
    const line=ta.value.slice(ls,le<0?undefined:le);
    const stripped=line.trimStart();
    const indent=line.slice(0,line.length-stripped.length);
    let nl=stripped.startsWith('; ')?indent+stripped.slice(2):
           stripped.startsWith(';')?indent+stripped.slice(1):
           indent+'; '+stripped;
    ta.value=ta.value.slice(0,ls)+nl+ta.value.slice(le<0?ta.value.length:le);
    ta.selectionStart=ta.selectionEnd=s+(nl.length-line.length);
    onEdit();return;
  }
  if(e.key==='Tab'){
    e.preventDefault();
    const ta=e.target;const s=ta.selectionStart;const end=ta.selectionEnd;
    if(s!==end){
      const bef=ta.value.slice(0,s);const sel=ta.value.slice(s,end);const aft=ta.value.slice(end);
      const ind=e.shiftKey?sel.replace(/^  /mg,''):sel.replace(/^/mg,'  ');
      ta.value=bef+ind+aft;ta.selectionStart=s;ta.selectionEnd=s+ind.length;
    } else {
      ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(end);
      ta.selectionStart=ta.selectionEnd=s+2;
    }
    onEdit();
  }
  if(e.key==='Enter'){
    const ta=e.target;const s=ta.selectionStart;
    const line=ta.value.slice(0,s).split('\n').pop();
    const indent=line.match(/^(\s*)/)[1];
    const extra=line.trimStart().match(/^[&!@]/)?'  ':'';
    if(indent||extra){
      e.preventDefault();
      document.execCommand('insertText',false,'\n'+indent+extra);
      onEdit();
    }
  }
}
// ─── パネルリサイズ ───────────────────────────────────
function startResize(e){
  e.preventDefault();
  const panel=document.getElementById('ed-panel');
  const startX=e.clientX;const startW=panel.offsetWidth;
  document.body.classList.add('resizing');
  const onMove=(e)=>panel.style.width=Math.max(180,Math.min(900,startW+e.clientX-startX))+'px';
  const onUp=()=>{document.body.classList.remove('resizing');
    document.removeEventListener('mousemove',onMove);document.removeEventListener('mouseup',onUp);};
  document.addEventListener('mousemove',onMove);document.addEventListener('mouseup',onUp);
}
// ─── MEM VIEW ────────────────────────────────────────
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function updateMemView(mem,sym){
  const el=document.getElementById('mem-content');if(!el)return;
  const secs=[
    {sig:'#',name:'i32',col:'var(--col-i32)',get:(i)=>mem.i32[i],
     fmt:(v)=>`${v} (0x${(v>>>0).toString(16)})`},
    {sig:'%',name:'f64',col:'var(--col-f64)',get:(i)=>mem.f64[i],
     fmt:(v)=>Number.isInteger(v)?v.toFixed(1):v.toFixed(4)},
    {sig:'~',name:'u64',col:'var(--col-u64)',get:(i)=>mem.u64[i],
     fmt:(v)=>`0x${v.toString(16).padStart(4,'0')}`},
    {sig:'$',name:'str',col:'var(--col-str)',get:(i)=>mem.str[i]??'',
     fmt:(v)=>`"${v}"`},
  ];
  let html='<div class="mem-grid">';let total=0;
  for(const sec of secs){
    const vars=Object.entries(sym[sec.sig]||{});
    if(!vars.length) continue;total+=vars.length;
    html+=`<div class="mem-card"><div class="mem-chdr" style="color:${sec.col}">${sec.name} (${sec.sig})</div>`;
    for(const[name,base] of vars){
      const len=(transpiler.arrLen[sec.sig]||{})[name]??1;
      if(len>1){
        const vals=[];for(let k=0;k<len;k++) vals.push(escHtml(String(sec.fmt(sec.get(base+k)))));
        html+=`<div class="mem-entry" style="flex-direction:column;gap:1px;">
          <span style="color:${sec.col}">${sec.sig}${name}[${len}]</span>
          <span class="mem-val" style="font-size:10px">[${vals.join(', ')}]</span></div>`;
      } else {
        html+=`<div class="mem-entry">
          <span style="color:${sec.col}">${sec.sig}${name}</span>
          <span class="mem-val">${escHtml(String(sec.fmt(sec.get(base))))}</span></div>`;
      }
    }
    html+='</div>';
  }
  if(!total) html+='<div style="color:var(--text3);font-size:11px;grid-column:1/-1">No variables.</div>';
  el.innerHTML=html+'</div>';
}
// ─── エクスポート ─────────────────────────────────────
function collectLibScripts(){
  return Array.from(document.querySelectorAll('script[type="sapphire/lib"]'))
    .map(s=>`<script type="sapphire/lib" data-name="${s.dataset.name}">\n${s.textContent}\n<\/script>`)
    .join('\n');
}
function exportIDE(mode,name){
  const ts=new Date().toISOString().replace(/[:.]/g,'-').slice(0,19);
  const fname=(name||'sapphire')+'_'+ts+'.html';
  let html;
  if(!mode||mode==='ide'){
    // IDEまるごと出力（scriptタグのdata-name属性更新）
    html=document.documentElement.outerHTML;
    html=html.replace(/(<meta name="sapphire-build" content=")[^"]*(")/, `$1${new Date().toISOString()}$2`);
  } else if(mode==='app'||mode==='min'){
    // コンパイル済み+ランタイムのみ
    const src=document.getElementById('editor').value;
    const reg=transpiler.transpile(src);
    const compiled=transpiler.generateOutput(reg);
    const rtSrc=document.getElementById('sapphire-runtime').textContent;
    html=`<!DOCTYPE html>\n<html>\n<head>\n<meta charset="UTF-8">\n`+
      `<meta name="sapphire-build" content="${new Date().toISOString()}">\n`+
      `<meta name="sapphire-src" content="${name||'program'}">\n</head>\n<body>\n`+
      collectLibScripts()+'\n'+
      `<script id="sapphire-runtime">\n${rtSrc}\n<\/script>\n`+
      `<script id="compiled">\n// compiled from DSL\n${compiled}\n`+
      `// entry\n(async()=>{\nconst mem=createMem();\n`+
      `const sys=makeSys(mem,document.body,null);\n`+
      `// TODO: wire entry point\n})();\n<\/script>\n</body>\n</html>`;
    if(mode==='min') html=html.replace(/\/\/[^\n]*/g,'').replace(/\n\s*\n/g,'\n');
  }
  const blob=new Blob([html],{type:'text/html'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download=fname;a.click();
  URL.revokeObjectURL(a.href);
}
// ─── 起動時のsapphire/libタグ展開 ────────────────────
function initLibTags(){
  document.querySelectorAll('script[type="sapphire/lib"]').forEach(tag=>{
    const name=tag.dataset.name;if(!name)return;
    // localStorageに存在しないか古ければ更新
    const existing=localStorage.getItem(`sapphire:lib:${name}`);
    if(!existing) localStorage.setItem(`sapphire:lib:${name}`,tag.textContent);
  });
}
// ─── boot DSL自動実行 ────────────────────────────────
function initBoot(){
  const bootTag=document.querySelector('script[type="sapphire/dsl"][data-name="boot"]');
  if(bootTag){
    document.getElementById('editor').value=bootTag.textContent.trim();
    onEdit();
    runDSL();
  }
}
// ─── DEFAULT PROGRAM ─────────────────────────────────
const DEFAULT_PROGRAM=`; ◆ SAPPHIRE IDE v10
; Ctrl+Enter: Run  Ctrl+/: Comment  Tab: Indent
; ──────────────────────────────────
; sys.print "hello"     出力
; sys.wait              フレーム待機(rAF)
; sys.rnd 0, 255        乱数
; sys.save "k", #v      storage保存
; sys.load "k"          storage読込
; sys.stop              停止
; sys.export "ide"      IDEごとDL
; ──────────────────────────────────
; lib screen で Canvasが使える:
;   screen.mode 128, 64, 4  (VW VH ratio)
;   screen.cls
;   screen.pset #x, #y, #c  (0xRRGGBB)
;   screen.line x0,y0,x1,y1,c
;   screen.flip
; ──────────────────────────────────

#score = 0
%hp    = 100.0

-> :boot

!boot
  sys.print "SAPPHIRE IDE v10 BOOT"
  #score = sys.load "hi_score"
  sys.print "hi_score:"
  sys.print #score
  %_v = call &math.clamp [%hp, 0.0, 100.0]
  sys.print "hp clamped:"
  sys.print %_v
  -> :done

!done
  sys.save "hi_score", #score
  sys.print "done."
  -> 0

&math.clamp [%_v, %_lo, %_hi]
  if %_v < %_lo { -> %_lo }
  if %_v > %_hi { -> %_hi }
  -> %_v
`;
// ─── INIT ────────────────────────────────────────────
window.addEventListener('load',()=>{
  initLibTags();
  const ta=document.getElementById('editor');
  const pill=document.getElementById('stat-pill');
  // 同じdocIdの保存があれば復元
  const docSrc=(()=>{try{return localStorage.getItem('sapphire:doc:'+_docId);}catch(e){return null;}})();
  if(docSrc){
    ta.value=docSrc;
  } else {
    ta.value=DEFAULT_PROGRAM;
    // 別セッションの保存があればバナーで通知（自動復元しない）
    const lastId=(()=>{try{return localStorage.getItem('sapphire:last_doc');}catch(e){return null;}})();
    const lastSrc=lastId&&lastId!==_docId?(()=>{try{return localStorage.getItem('sapphire:doc:'+lastId);}catch(e){return null;}})():null;
    if(lastSrc){
      pill.textContent='RESTORE?';pill.style.cursor='pointer';pill.title='クリックで前回の作業を復元';
      pill.addEventListener('click',()=>{
        if(confirm('前回の作業を復元しますか？')){ta.value=lastSrc;_docId=lastId;location.hash=_docId;onEdit();}
        pill.textContent='READY';pill.style.cursor='';pill.title='';
      },{once:true});
    }
  }
  onEdit();
  setTimeout(()=>{document.getElementById('editor')?.focus();initBoot();},100);
});
</script>
