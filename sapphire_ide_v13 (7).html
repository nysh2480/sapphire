<!DOCTYPE html>
<html lang="ja"><head>
<meta charset="UTF-8">
<meta name="sapphire-version" content="v13">
<title>Sapphire IDE v13</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&amp;family=Syne:wght@700;900&amp;display=swap" rel="stylesheet">
<style>
:root{
  --bg:#06090f;--surface:#0d1520;--surface2:#111c2a;
  --border:#1a2a3a;--border2:#223040;
  --sapphire:#4c8ef5;--sapphire2:#1e5cd4;
  --emerald:#2de881;--amber:#f5c842;--rose:#f05575;--violet:#a78bfa;--cyan:#36d9c8;
  --text:#c8d8e8;--text2:#6a8aaa;--text3:#304a62;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{display:flex;flex-direction:column;font-family:'Space Mono',monospace;
     background:var(--bg);color:var(--text);font-size:12px}

/* ── TOOLBAR ── */
#toolbar{
  height:40px;background:var(--surface);border-bottom:1px solid var(--border);
  display:flex;align-items:center;flex-shrink:0;gap:0;
}
#logo{
  font-family:'Syne',sans-serif;font-weight:900;font-size:13px;letter-spacing:3px;
  color:var(--sapphire);padding:0 16px;border-right:1px solid var(--border);
  height:100%;display:flex;align-items:center;gap:8px;white-space:nowrap;flex-shrink:0;
}
#logo span{font-size:9px;font-weight:400;color:var(--cyan);font-family:'Space Mono',monospace;letter-spacing:1px}
#tab-bar{
  display:flex;height:40px;flex:1;overflow-x:auto;overflow-y:hidden;min-width:0;
}
#tab-bar::-webkit-scrollbar{height:2px}
#tab-bar::-webkit-scrollbar-thumb{background:var(--border2)}
.tab{
  padding:0 12px;font-size:10px;letter-spacing:1px;cursor:pointer;
  border-right:1px solid var(--border);border-bottom:2px solid transparent;
  display:flex;align-items:center;gap:6px;color:var(--text3);
  white-space:nowrap;transition:all .15s;text-transform:uppercase;flex-shrink:0;
  height:40px;
}
.tab:hover{color:var(--text2);background:var(--surface2)}
.tab.active{color:var(--sapphire);border-bottom-color:var(--sapphire);background:var(--surface2)}
.tbadge{
  font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;
}
.tb-dsl{background:#a78bfa20;color:var(--violet);border:1px solid #a78bfa30}
.tb-lib{background:#2de88120;color:var(--emerald);border:1px solid #2de88130}
.tx{
  width:14px;height:14px;display:flex;align-items:center;justify-content:center;
  border-radius:3px;font-size:11px;color:var(--text3);transition:all .1s;
}
.tx:hover{background:#f0557530;color:var(--rose)}
#btn-add{
  padding:0 12px;height:40px;color:var(--text3);cursor:pointer;border:none;
  background:transparent;font-size:18px;transition:color .15s;
  border-right:1px solid var(--border);flex-shrink:0;
}
#btn-add:hover{color:var(--sapphire)}
#actions{
  display:flex;align-items:center;gap:6px;padding:0 12px;
  border-left:1px solid var(--border);height:40px;flex-shrink:0;
}
.abtn{
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
  letter-spacing:1px;padding:4px 12px;border-radius:3px;cursor:pointer;
  border:1px solid transparent;transition:all .15s;text-transform:uppercase;
}
#btn-run{background:linear-gradient(135deg,var(--sapphire2),var(--sapphire));color:#fff}
#btn-run:hover{filter:brightness(1.15)}
#btn-save{background:transparent;color:var(--emerald);border-color:#2de88140}
#btn-save:hover{background:#2de88115;border-color:var(--emerald)}
#stat{width:6px;height:6px;border-radius:50%;background:var(--text3);transition:background .3s}
#stat.ok{background:var(--emerald);box-shadow:0 0 6px var(--emerald)}
#stat.err{background:var(--rose);box-shadow:0 0 6px var(--rose)}
#stat.run{background:var(--amber);box-shadow:0 0 6px var(--amber)}

/* ── EDITOR ── */
#editor-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.panel{display:none;flex:1;flex-direction:column;min-height:0}
.panel.active{display:flex}
textarea.ed{
  flex:1;font-family:'Space Mono',monospace;font-size:12px;line-height:1.7;
  padding:14px 16px;background:var(--surface);color:var(--text);
  border:none;outline:none;resize:none;caret-color:var(--cyan);
  overflow:auto;white-space:pre;tab-size:2;min-height:0;
}
textarea.ed::selection{background:#4c8ef530}
.emeta{
  padding:3px 12px;font-size:9px;color:var(--text3);
  background:var(--bg);border-top:1px solid var(--border);
  display:flex;justify-content:space-between;flex-shrink:0;
}

/* ── LOG ── */
#log-wrap{
  height:180px;flex-shrink:0;display:flex;flex-direction:column;
  border-top:1px solid var(--border2);background:#050810;
}
#log-bar{
  height:24px;display:flex;align-items:center;padding:0 10px;gap:8px;
  background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;
  font-size:9px;color:var(--text3);letter-spacing:1px;
}
#log-bar span{cursor:pointer}
#log-bar span:hover{color:var(--rose)}
#log{flex:1;overflow-y:auto;padding:6px 12px;font-family:'Space Mono',monospace;font-size:11px;line-height:1.8}
.ls{color:var(--sapphire);font-weight:700}
.lo{color:var(--emerald)}
.le{color:var(--rose);display:block;border-left:2px solid var(--rose);padding-left:6px;margin:1px 0;white-space:pre-wrap}
.lp{color:var(--text)}
.li{color:var(--cyan)}

/* ── MODAL ── */
#modal-bg{display:none;position:fixed;inset:0;background:#000b;z-index:9;align-items:center;justify-content:center}
#modal-bg.open{display:flex}
#modal{background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:20px;min-width:300px}
#modal h3{font-family:'Syne',sans-serif;color:var(--sapphire);margin-bottom:14px;font-size:13px;letter-spacing:2px}
#modal label{font-size:9px;color:var(--text3);letter-spacing:1px;text-transform:uppercase;display:block;margin-bottom:3px}
#modal input,#modal select{
  width:100%;font-family:'Space Mono',monospace;font-size:12px;
  background:var(--bg);border:1px solid var(--border2);color:var(--text);
  padding:6px 10px;border-radius:3px;margin-bottom:12px;outline:none;
}
#modal input:focus,#modal select:focus{border-color:var(--sapphire)}
.mbtns{display:flex;gap:8px;justify-content:flex-end}
.mbtns button{
  font-family:'Space Mono',monospace;font-size:10px;font-weight:700;
  padding:5px 14px;border-radius:3px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;
}
#mok{background:var(--sapphire2);color:#fff;border:none}
#mok:hover{background:var(--sapphire)}
#mcancel{background:transparent;color:var(--text2);border:1px solid var(--border2)}
#mcancel:hover{color:var(--rose);border-color:var(--rose)}
.tbtn{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;letter-spacing:1px;
  text-transform:uppercase;cursor:pointer;border-radius:3px;padding:2px 8px;
  border:1px solid var(--border2);background:transparent;color:var(--text3);transition:all .1s}
.tbtn:hover{color:var(--sapphire);border-color:var(--sapphire)}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
</style>
</head>
<body>

<!-- TOOLBAR -->
<div id="toolbar">
  <div id="logo">◆ SAPPHIRE <span id="vbadge">v13</span></div>
  <div id="tab-bar"></div>
  <button id="btn-add" title="タブを追加">＋</button>
  <div id="actions">
    <div id="stat"></div>
    <button class="abtn" id="btn-run">▶ RUN</button>
    <button class="abtn" id="btn-save">↓ SAVE</button>
  </div>
</div>

<!-- EDITOR -->
<div id="editor-wrap"></div>

<!-- LOG -->
<div id="log-wrap">
  <div id="log-bar">LOG <span id="btn-clr" title="クリア">CLR</span></div>
  <div id="log"></div>
</div>

<!-- MODAL -->
<div id="modal-bg" class="">
  <div id="modal">
    <h3>NEW TAB</h3>
    <label>NAME</label>
    <input id="mname" type="text" placeholder="e.g. game, mylib">
    <label>TYPE</label>
    <select id="mtype">
      <option value="dsl">DSL — 実行可能なSapphireコード</option>
      <option value="lib">LIB — ライブラリ（lib 名前 で読込）</option>
      <option value="ui">UI  — HTML断片（dom.mount で使う）</option>
      <option value="doc">DOC — ドキュメント（HTML）</option>
    </select>
    <div class="mbtns">
      <button id="mcancel">CANCEL</button>
      <button id="mok">ADD</button>
    </div>
  </div>
</div>

<!-- TRANSPILER -->
<script id="sapphire-core">
const ASYNC_SYS = new Set(['wait','net.connect','net.recv','net.send','net.migrate','net.broadcast','storage.load_src']);

class SapphireTranspiler {
  constructor() { this.reset(); }
  reset() {
    this.sym={'#':{},'%':{},'~':{},'$':{},'?':{}};
    this.arrLen={'#':{},'%':{},'~':{},'$':{},'?':{}};
    this.nextSlot={'#':0,'%':0,'~':0,'$':0,'?':0};
    this.errors=[];this.warnings=[];this.blockTypes={};this._localVars=new Set();
  }
  _register(sig,name,len){
    if(name.startsWith('_')) return null;
    if(this.sym[sig][name]===undefined){this.sym[sig][name]=this.nextSlot[sig];this.arrLen[sig][name]=len;this.nextSlot[sig]+=len;}
    return this.sym[sig][name];
  }
  addr(token){
    const sig=token[0];
    if(token[1]==='_'&&token.indexOf('[')===-1) return token.slice(1);
    const bp=token.indexOf('[');
    if(bp!==-1){
      const name=token.slice(1,bp),ie=token.slice(bp+1,token.lastIndexOf(']'));
      const base=this._register(sig,name,1),ij=this.translateExpr(ie);
      switch(sig){case '#':case '$':return `i32[${base}+(${ij})|0]`;case '%':return `f64[${base}+(${ij})|0]`;case '~':return `u64[BigInt(${base})+(BigInt(${ij}))]`;}
    }
    const name=token.slice(1),idx=this._register(sig,name,1);
    switch(sig){case '#':case '$':return `i32[${idx}]`;case '%':return `f64[${idx}]`;case '~':return `u64[${idx}]`;}
    return token;
  }
  addrLval(token){
    const sig=token[0],bp=token.indexOf('[');
    if(bp!==-1){
      const name=token.slice(1,bp),ie=token.slice(bp+1,token.lastIndexOf(']'));
      const base=this._register(sig,name,1),ij=this.translateExpr(ie);
      switch(sig){case '#':case '$':return `i32[${base}+(${ij})|0]`;case '%':return `f64[${base}+(${ij})|0]`;case '~':return `u64[BigInt(${base})+BigInt(${ij})]`;}
    }
    if(token[1]==='_') return token.slice(1);
    const name=token.slice(1),idx=this._register(sig,name,1);
    switch(sig){case '#':case '$':return `i32[${idx}]`;case '%':return `f64[${idx}]`;case '~':return `u64[${idx}]`;}
    return token.slice(1);
  }
  translateExpr(expr){
    if(!expr) return '0';
    expr=expr.trim();
    if(expr.startsWith('"')&&expr.endsWith('"')) return JSON.stringify(expr.slice(1,-1));
    if(/^-?\d+(\.\d+)?$/.test(expr)) return expr;
    if(/^[#%~$?]/.test(expr)){
      if(expr.indexOf('[')!==-1) return this.addr(expr);
      if(/^[#%~$?][a-zA-Z_]\w*$/.test(expr)) return this.addr(expr);
    }
    if(expr.startsWith('sys.')) return this.translateSys(expr).replace(/;$/,'');
    if(expr.startsWith('call ')){
      const rest=expr.slice(5).trim(),bi=rest.indexOf('['),traw=bi>=0?rest.slice(0,bi).trim():rest;
      const target=traw.match(/^[&!@]/)?traw.slice(1):traw;
      if(bi>=0){const ar=rest.slice(bi+1,rest.lastIndexOf(']')),args=ar.split(',').map(a=>this.translateExpr(a.trim())).filter(a=>a!=='');return `callBlock("${target}",[${args.join(',')}])`;}
      return `callBlock("${target}",[])`;
    }
    const ops=[['&&','&&'],['||','||'],['<=','<='],['>=','>='],['!=','!=='],['==','==='],['<','<'],['>','>'],['+',' +'],['-','-'],['*','*'],['/','/'],['%','%']];
    for(const [op,jsop] of ops){
      const i=this._findOp(expr,op);
      if(i!==-1){
        const lhs=this.translateExpr(expr.slice(0,i).trim()),rhs=this.translateExpr(expr.slice(i+op.length).trim());
        if(op==='%') return `((${lhs})%(${rhs}))`;
        return `(${lhs}${jsop}${rhs})`;
      }
    }
    if(expr.startsWith('!')) return `!(${this.translateExpr(expr.slice(1).trim())})`;
    if(expr.startsWith('-')&&expr.length>1&&/[#%~\d]/.test(expr[1])) return `-(${this.translateExpr(expr.slice(1).trim())})`;
    return expr;
  }
  _findOp(expr,op){
    let depth=0,inStr=false;
    for(let i=expr.length-op.length;i>=0;i--){
      const c=expr[i];
      if(c==='"') inStr=!inStr;
      if(inStr) continue;
      if(c===')'||c===']') depth++;
      if(c==='('||c==='[') depth--;
      if(depth===0&&expr.slice(i,i+op.length)===op) return i;
    }
    return -1;
  }
  stripComment(line){
    let inStr=false;
    for(let i=0;i<line.length;i++){
      if(line[i]==='"') inStr=!inStr;
      if(!inStr&&line[i]===';') return line.slice(0,i);
    }
    return line;
  }
  translateSys(line){
    const m=line.match(/^sys\.([\w.]+)\s*(.*)?$/);
    if(!m) return `/* bad sys: ${line} */`;
    const fn=m[1],rawArgs=(m[2]||'').trim();
    let args=[];
    if(rawArgs.startsWith('[')){
      try{const ac=rawArgs.slice(1,rawArgs.lastIndexOf(']'));args=[`[${ac.split(',').map(a=>{const t=a.trim();return t.startsWith('"')?t:this.translateExpr(t);}).join(',')}]`];}catch(e){args=[rawArgs];}
    } else if(rawArgs){
      args=rawArgs.split(',').map(a=>this.translateExpr(a.trim()));
    }
    const pre=ASYNC_SYS.has(fn)?'await ':'';
    return `${pre}sys.${fn}(${args.join(',')})`;
  }
  translateJump(line){
    const target=line.slice(2).trim();
    if(target==='@') return 'continue;';
    if(target.startsWith(':')) return `return "${target.slice(1)}";`;
    if(target==='0'||target==='null') return 'return null;';
    if(target.startsWith('%')||target.startsWith('#')) return `return ${this.addr(target)};`;
    if(target.match(/^[@!&]/)) return `return "${target.slice(1)}";`;
    if(!isNaN(target)) return 'return null;';
    return `return "${target}";`;
  }
  translateLine(raw,blockType,blockName,lineNum){
    let line=this.stripComment(raw).trim();
    if(!line||line==='}') return null;
    if(blockType==='&'&&line.startsWith('sys.')){this.errors.push(`[L${lineNum}] Purity Violation in &${blockName}`);return '/* PURITY VIOLATION */';}
    if(line.startsWith('sys.')) return this.translateSys(line)+';';
    if(/^[a-z]\w+\.[a-z]\w*/.test(line)){
      const dotIdx=line.indexOf('.'),ns=line.slice(0,dotIdx),rest=line.slice(dotIdx+1);
      const spIdx=rest.search(/\s/),cmd=spIdx>=0?rest.slice(0,spIdx):rest;
      const argsRaw=spIdx>=0?rest.slice(spIdx+1).trim():'';
      const args=argsRaw?argsRaw.split(',').map(a=>this.translateExpr(a.trim())):[];
      const pre=ASYNC_SYS.has(`${ns}.${cmd}`)?'await ':'';
      return `${pre}sys.${ns}.${cmd}(${args.join(',')});`;
    }
    if(line.startsWith('call ')){
      const rest=line.slice(5).trim(),bi=rest.indexOf('['),traw=bi>=0?rest.slice(0,bi).trim():rest;
      const target=traw.match(/^[&!@]/)?traw.slice(1):traw;
      if(bi>=0){const ar=rest.slice(bi+1,rest.lastIndexOf(']')),args=ar.split(',').map(a=>this.translateExpr(a.trim())).filter(a=>a!=='');return `pc_ret=callBlock("${target}",[${args.join(',')}]);`;}
      return `pc_ret=callBlock("${target}",[]);`;
    }
    if(line.startsWith('->')) return this.translateJump(line);
    // array assign
    {const am=line.match(/^([#%~$?][a-zA-Z_]\w*)\s*=\s*\[([^\]]*)\]/);
    if(am){const lhs=am[1],sig=lhs[0],name=lhs.slice(1),els=am[2].split(',').map(e=>e.trim()).filter(e=>e!=='');
      const base=this._register(sig,name,els.length);this.arrLen[sig][name]=els.length;
      return els.map((el,i)=>{const slot=base+i,ej=this.translateExpr(el);switch(sig){case '#':case '$':return `i32[${slot}]=(${ej})|0;`;case '%':return `f64[${slot}]=+(${ej});`;case '~':return `u64[${slot}]=BigInt(${ej});`;}}).join('\n  ');}}
    // dynamic array index assign
    {const dm=line.match(/^([#%~$?])([a-zA-Z_]\w*)\[([^\]]+)\]\s*=(?!=)\s*(.*)/s);
    if(dm){const[,sig,name,idxRaw,rhsRaw]=dm,base=this._register(sig,name,1),ij=this.translateExpr(idxRaw),rj=this.translateExpr(rhsRaw.trim());
      switch(sig){case '#':case '$':return `i32[${base}+(${ij})|0]=(${rj})|0;`;case '%':return `f64[${base}+(${ij})|0]=+(${rj});`;case '~':return `u64[BigInt(${base})+BigInt(${ij})]=BigInt(${rj});`;}}}
    // local var
    {const lv=line.match(/^([#%~$?])(_[a-zA-Z]\w*)\s*=(?!=)\s*(.*)/s);
    if(lv){const[,sig,name,rhsRaw]=lv,rj=this.translateExpr(rhsRaw.trim()),jsname=name;
      if(!this._localVars.has(jsname)){this._localVars.add(jsname);switch(sig){case '#':case '$':return `let ${jsname}=(${rj})|0;`;case '%':return `let ${jsname}=+(${rj});`;case '~':return `let ${jsname}=BigInt(${rj});`;}}
      else{switch(sig){case '#':case '$':return `${jsname}=(${rj})|0;`;case '%':return `${jsname}=+(${rj});`;case '~':return `${jsname}=BigInt(${rj});`;}}}}
    // scalar assign
    {const sa=line.match(/^([#%~$?][a-zA-Z][a-zA-Z0-9]*)\s*=(?!=)\s*(.*)/s);
    if(sa){const lhs=sa[1],rhs=sa[2].trim(),lj=this.addrLval(lhs),rj=this.translateExpr(rhs),sig=lhs[0];
      switch(sig){case '#':case '$':return `${lj}=(${rj})|0;`;case '%':return `${lj}=+(${rj});`;case '~':return `${lj}=BigInt(${rj});`;}}}
    this.warnings.push(`[L${lineNum}] Unknown: ${line.slice(0,40)}`);
    return `/* unknown: ${line.replace(/\*\//g,'* /')} */`;
  }
  parseIfBlock(lines,startIdx){
    let text='',depth=0,i=startIdx,inStr=false;
    while(i<lines.length){
      const l=this.stripComment(lines[i]).trim();text+=l+' ';
      for(const c of l){if(c==='"')inStr=!inStr;if(!inStr&&c==='{')depth++;if(!inStr&&c==='}')depth--;}
      if(depth<=0&&text.trim().length>3) break;i++;
    }
    return{text:text.trim(),endIdx:i};
  }
  splitByComma(s){
    const parts=[];let cur='',depth=0,inStr=false;
    for(const ch of s){
      if(ch==='"')inStr=!inStr;
      if(!inStr&&ch==='{')depth++;if(!inStr&&ch==='}')depth--;
      if(!inStr&&depth===0&&ch===','){parts.push(cur.trim());cur='';}else cur+=ch;
    }
    if(cur.trim())parts.push(cur.trim());return parts;
  }
  translateIfBlock(text,blockType,blockName,lineNum){
    const ifM=text.match(/^\s*if\s+/);if(!ifM)return '/* bad if */';
    const afterIf=text.slice(ifM[0].length);let bOpen=-1,inStr=false;
    for(let i=0;i<afterIf.length;i++){if(afterIf[i]==='"')inStr=!inStr;if(!inStr&&afterIf[i]==='{'){bOpen=i;break;}}
    if(bOpen<0)return '/* bad if: no { */';
    const condPart=afterIf.slice(0,bOpen).trim();
    let bClose=-1;inStr=false;
    for(let i=afterIf.length-1;i>=bOpen;i--){if(afterIf[i]==='"')inStr=!inStr;if(!inStr&&afterIf[i]==='}'){bClose=i;break;}}
    if(bClose<0)return '/* bad if: no } */';
    const inner=afterIf.slice(bOpen+1,bClose).trim();
    const branches=this.splitByComma(inner).filter(b=>b.trim());
    const cond=this.translateExpr(condPart);
    const stmts=branches.length>0&&!branches[0].includes(':')?branches:null;
    if(stmts){
      let body='';
      for(const s of stmts){const t=this.translateLine(s,blockType,blockName,lineNum);if(t)body+=`\n  ${t}`;}
      return `if(${cond}){${body}\n}`;
    }
    let out=`switch(${cond}){\n`;
    for(const br of branches){
      let ci=-1,inS=false;
      for(let i=0;i<br.length;i++){if(br[i]==='"')inS=!inS;if(!inS&&br[i]===':'){ci=i;break;}}
      if(ci<0)continue;
      const k=br.slice(0,ci).trim(),act=br.slice(ci+1).trim();
      const cl=k==='*'?'default':`case ${k}`;
      const tr=act.startsWith('->')?this.translateJump(act):this.translateLine(act,blockType,blockName,lineNum)||(act+';');
      out+=`  ${cl}: ${tr} break;\n`;
    }
    return out+'}';
  }
  _resolveLibs(source,libSources){
    const lines=source.split('\n'),libSrcs=[],rest=[];
    for(const line of lines){
      const m=line.trim().match(/^lib\s+([a-zA-Z_]\w*)$/);
      if(m){
        const name=m[1];
        let src=libSources?libSources[name]:null;
        if(!src){try{src=localStorage.getItem(`sapphire:lib:${name}`);}catch(e){}}
        if(src){libSrcs.push(`; ── lib ${name} ──`);libSrcs.push(src);}
        else this.warnings.push(`lib "${name}" not found`);
      }else rest.push(line);
    }
    return[...libSrcs,...rest].join('\n');
  }
  transpile(source,libSources){
    this.reset();
    source=this._resolveLibs(source,libSources||{});
    const rawLines=source.split('\n');
    const registry={};
    let curName='__top__',curType='!',curBody=[];
    const commit=()=>{if(curBody.length===0&&curName==='__top__')return;registry[curName]={type:curType,body:curBody.join('\n')};this.blockTypes[curName]=curType;};
    let i=0;
    while(i<rawLines.length){
      const raw=rawLines[i],stripped=this.stripComment(raw).trim();
      if(stripped.match(/^[&!@]/)){
        commit();curType=stripped[0];const decl=stripped.slice(1);
        curName=decl.replace(/\s*\{.*/,'').trim().replace(/\[.*\]/,'').trim();
        curBody=[];this._localVars=new Set();i++;continue;
      }
      if(!stripped||stripped.startsWith(';')||stripped==='}'){i++;continue;}
      if(stripped.match(/^if\b/)){
        const{text,endIdx}=this.parseIfBlock(rawLines,i);
        curBody.push('  '+this.translateIfBlock(text,curType,curName,i+1));
        i=endIdx+1;continue;
      }
      const js=this.translateLine(stripped,curType,curName,i+1);
      if(js)curBody.push('  '+js);
      i++;
    }
    commit();
    if(registry['__top__']&&!registry['__top__'].body.includes('return ')){
      const fb=Object.entries(registry).find(([n,b])=>n!=='__top__'&&b.type==='!')?.[0]??Object.keys(registry).find(n=>n!=='__top__'&&n!=='__params');
      if(fb)registry['__top__'].body+=`\n  return "${fb}";`;
    }
    return registry;
  }
}
</script>

<script id="sapphire-runtime-src">
function createMem(){
  return{i32:new Int32Array(4096),f64:new Float64Array(2048),u64:new BigUint64Array(512),str:[],_strMap:new Map(),q_tags:new Uint8Array(1024),q_vals:new Float64Array(1024)};
}
function makeSys(mem,logFn){
  return{
    print:(...a)=>logFn('log-print',a.map(v=>typeof v==='bigint'?`0x${v.toString(16)}n`:String(v)).join(' ')),
    stop:(msg)=>{throw new Error('STOP'+(msg?': '+msg:''));},
    beep:()=>{try{const a=new AudioContext(),o=a.createOscillator();o.connect(a.destination);o.start();o.stop(a.currentTime+0.1);}catch(e){}},
    rnd:(lo,hi)=>Math.floor(Math.random()*(Number(hi)-Number(lo)+1))+Number(lo),
    rndf:(lo,hi)=>Math.random()*(Number(hi)-Number(lo))+Number(lo),
    wait:async()=>{await new Promise(r=>requestAnimationFrame(r));},
    save:(key,val)=>{try{localStorage.setItem('sap:'+key,String(val));}catch(e){}},
    load:(key)=>{const v=localStorage.getItem('sap:'+key);return v===null?0:isNaN(v)?v:Number(v);},
    dom:{
      show:(id)=>{const e=document.getElementById(id);if(e)e.style.display='';},
      hide:(id)=>{const e=document.getElementById(id);if(e)e.style.display='none';},
      set_text:(id,v)=>{const e=document.getElementById(id);if(e)e.textContent=v;},
      get_val:(id)=>{const e=document.getElementById(id);return e?e.value:'';},
      set_val:(id,v)=>{const e=document.getElementById(id);if(e)e.value=v;},
    },
    core:{
      log:(...a)=>logFn('log-print',a.map(v=>String(v)).join(' ')),
      rand_int:(lo,hi)=>Math.floor(Math.random()*(Number(hi)-Number(lo)+1))+Number(lo),
      panic:(m)=>{throw new Error('PANIC: '+m);},
    },
  };
}
function precompileRegistry(registry,mem,sys,logFn){
  const cache={};
  const{i32,f64,u64,q_tags,q_vals,str}=mem;
  const callBlock=(name,args=[])=>{
    if(!cache[name]){logFn('log-err',`UNDEFINED BLOCK: "${name}"`);return null;}
    try{const r=cache[name](...args);return r instanceof Promise?r.catch(e=>logFn('log-err',`[${name}] ${e.message}`)):r;}
    catch(e){logFn('log-err',`[${name}] ${e.message}`);return null;}
  };
  for(const[name,block]of Object.entries(registry)){
    if(name==='__params')continue;
    try{
      cache[name]=new Function('i32','f64','u64','q_tags','q_vals','str','sys','callBlock',
        `"use strict";return async function block_${name.replace(/\./g,'_')}(..._args){let pc_ret=null;while(true){\n${block.body}\nbreak;}return pc_ret;}`
      )(i32,f64,u64,q_tags,q_vals,str,sys,callBlock);
    }catch(e){logFn('log-err',`[COMPILE:${name}] ${e.message}`);cache[name]=async()=>null;}
  }
  return cache;
}
async function runVM(source,logFn,libSources){
  const transpiler=new SapphireTranspiler();
  const registry=transpiler.transpile(source,libSources||{});
  for(const w of transpiler.warnings)logFn('log-warn',w);
  if(transpiler.errors.length>0){for(const e of transpiler.errors)logFn('log-err',e);return null;}
  const mem=createMem();
  const sys=makeSys(mem,logFn);
  const cache=precompileRegistry(registry,mem,sys,logFn);
  let current='__top__';
  while(current){
    const fn=cache[current];
    if(!fn){logFn('log-err',`Missing block: "${current}"`);break;}
    try{current=await fn();}catch(e){
      if(e.message&&e.message.startsWith('STOP'))logFn('log-ok','■ '+e.message);
      else logFn('log-err',`[${current}] ${e.message}`);
      break;
    }
  }
  return{transpiler,registry,mem};
}
</script>

<script>
'use strict';

// ══ Storage ═══════════════════════════════════════════
// dsl/lib : script[type="sapphire/tab"]  read/write: textContent
// doc/ui  : sapphire-html[style=none]    read/write: innerHTML

function getAllTabEls() {
  return [
    ...document.querySelectorAll('script[type="sapphire/tab"][data-tab-name]'),
    ...document.querySelectorAll('sapphire-html[data-tab-name]')
  ].sort((a,b) => (+a.dataset.tabOrder||0) - (+b.dataset.tabOrder||0));
}
function getTabEl(name) {
  return document.querySelector(`script[type="sapphire/tab"][data-tab-name="${name}"]`)
      || document.querySelector(`sapphire-html[data-tab-name="${name}"]`);
}
function getTabContent(name) {
  const el = getTabEl(name);
  if (!el) return '';
  return el.tagName === 'SCRIPT' ? el.textContent : el.innerHTML;
}
function setTabContent(name, str) {
  const el = getTabEl(name);
  if (!el) return;
  if (el.tagName === 'SCRIPT') el.textContent = str;
  else el.innerHTML = str;
}
function getLibSources() {
  const libs = {};
  for (const el of getAllTabEls())
    if (el.dataset.tabType === 'lib') libs[el.dataset.tabName] = el.textContent;
  return libs;
}

// ══ State ═════════════════════════════════════════════
// panels: Map<name, panelElement>  生成済みパネルのキャッシュ
let active = null;
const panels = new Map();

// ══ Tab bar ═══════════════════════════════════════════
function renderTabBar() {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  for (const el of getAllTabEls()) {
    const name = el.dataset.tabName;
    const type = el.dataset.tabType;
    const d = document.createElement('div');
    d.className = 'tab' + (name === active ? ' active' : '');
    d.innerHTML =
      `<span class="tbadge tb-${type}">${type.toUpperCase()}</span>` +
      esc(name) +
      `<span class="tx" data-x="${esc(name)}">×</span>`;
    d.onclick = e => e.target.dataset.x ? closeTab(e.target.dataset.x) : activateTab(name);
    bar.appendChild(d);
  }
}

// ══ Panel (lazy) ══════════════════════════════════════
function buildPanel(name) {
  const el      = getTabEl(name);
  if (!el) return null;
  const type    = el.dataset.tabType;
  const content = getTabContent(name);
  const wrap    = document.getElementById('editor-wrap');

  const panel = document.createElement('div');
  panel.className = 'panel';
  panel.dataset.p = name;

  if (type === 'doc' || type === 'ui') {
    // ── HTML types: preview + edit toggle ──
    const bar = document.createElement('div');
    bar.className = 'emeta';
    const btn = document.createElement('button');
    btn.className = 'tbtn';
    btn.textContent = 'EDIT';
    const info = document.createElement('span');
    info.style.marginLeft = 'auto';
    info.textContent = type === 'ui' ? 'UI — dom.mount で使用' : 'DOC — HTML直接編集可';
    bar.append(btn, info);

    const preview = document.createElement('div');
    preview.style.cssText = 'flex:1;overflow-y:auto;padding:20px 24px;background:var(--surface)';
    preview.innerHTML = content;

    const ta = document.createElement('textarea');
    ta.className = 'ed';
    ta.spellcheck = false;
    ta.style.display = 'none';
    ta.value = content;
    ta.onkeydown = tabKey;

    btn.onclick = () => {
      if (ta.style.display === 'none') {
        ta.value = preview.innerHTML;
        preview.style.display = 'none';
        ta.style.display = '';
        btn.textContent = 'PREVIEW';
      } else {
        preview.innerHTML = ta.value;
        ta.style.display = 'none';
        preview.style.display = '';
        btn.textContent = 'EDIT';
      }
    };

    panel.append(bar, preview, ta);
    // store getter function: always returns current content
    panels.set(name, { panel, getContent: () => ta.style.display === 'none' ? preview.innerHTML : ta.value });

  } else {
    // ── dsl/lib: plain textarea ──
    const hint = type === 'lib'
      ? `lib ${name} で読込可`
      : 'Sapphire DSL — Ctrl+Enter で実行';
    const ta = document.createElement('textarea');
    ta.className = 'ed';
    ta.spellcheck = false;
    ta.value = content;
    ta.onkeydown = tabKey;
    ta.oninput = () => {
      const nl = '\n';
      const l  = ta.value.split(nl).length;
      const b  = new Blob([ta.value]).size;
      meta.querySelector('span').textContent = `${l}L ${b}B`;
    };
    const meta = document.createElement('div');
    meta.className = 'emeta';
    meta.innerHTML = `<span>—</span><span style="margin-left:auto">${hint}</span>`;
    panel.append(ta, meta);
    panels.set(name, { panel, getContent: () => ta.value });
    ta.oninput();
  }

  wrap.appendChild(panel);
  return panel;
}

function tabKey(e) {
  if (e.key !== 'Tab') return;
  e.preventDefault();
  const ta = e.target;
  const s  = ta.selectionStart;
  ta.value = ta.value.slice(0,s) + '  ' + ta.value.slice(ta.selectionEnd);
  ta.selectionStart = ta.selectionEnd = s + 2;
}

// ══ Activate ══════════════════════════════════════════
function activateTab(name) {
  active = name;

  // タブバー更新
  renderTabBar();

  // パネル生成（未生成のみ）
  if (!panels.has(name)) buildPanel(name);

  // 表示切替
  document.querySelectorAll('#editor-wrap .panel').forEach(p =>
    p.classList.toggle('active', p.dataset.p === name));
}

function closeTab(name) {
  if (getAllTabEls().length <= 1) return;
  getTabEl(name)?.remove();
  panels.get(name)?.panel.remove();
  panels.delete(name);
  if (active === name) {
    const rem = getAllTabEls();
    if (rem.length) activateTab(rem[rem.length-1].dataset.tabName);
  } else {
    renderTabBar();
  }
}

// ══ Modal ═════════════════════════════════════════════
function openModal() {
  document.getElementById('mname').value = '';
  document.getElementById('mtype').value = 'dsl';
  document.getElementById('modal-bg').classList.add('open');
  setTimeout(() => document.getElementById('mname').focus(), 40);
}
function closeModal() { document.getElementById('modal-bg').classList.remove('open'); }
function confirmAdd() {
  const name = document.getElementById('mname').value.trim().replace(/[^a-zA-Z0-9_-]/g,'');
  const type = document.getElementById('mtype').value;
  if (!name || getTabEl(name)) return;
  const nl = '\n';
  const defaults = {
    dsl: '; ' + name + nl + nl + '!main' + nl + '  sys.print "' + name + '"' + nl + '  sys.stop' + nl,
    lib: '; lib ' + name + nl + nl + '&hello' + nl + '  sys.print "hello from ' + name + '"' + nl,
    ui:  '<!-- ' + name + ' -->' + nl + '<div id="' + name + '-root">' + nl + '  <p>' + name + '</p>' + nl + '</div>' + nl,
    doc: '<h1>' + name + '</h1>' + nl + '<p>ドキュメントをここに記述</p>' + nl,
  };
  const content = defaults[type] || '';
  let el;
  if (type === 'dsl' || type === 'lib') {
    el = document.createElement('script');
    el.type = 'sapphire/tab';
    el.textContent = content;
  } else {
    el = document.createElement('sapphire-html');
    el.style.display = 'none';
    el.innerHTML = content;
  }
  el.dataset.tabName  = name;
  el.dataset.tabType  = type;
  el.dataset.tabOrder = getAllTabEls().length;
  document.body.appendChild(el);
  activateTab(name);
  closeModal();
}

// ══ Log ═══════════════════════════════════════════════
function log(cls, msg) {
  const out = document.getElementById('log');
  const d   = document.createElement('div');
  d.className = cls; d.textContent = String(msg);
  out.appendChild(d); out.scrollTop = out.scrollHeight;
}

// ══ RUN ═══════════════════════════════════════════════
async function run() {
  if (!active) return;
  const el = getTabEl(active);
  if (!el || el.dataset.tabType !== 'dsl') {
    log('li', 'DSLタブを選択してください'); return;
  }
  const src = panels.get(active)?.getContent() ?? getTabContent(active);
  document.getElementById('log').innerHTML = '';
  document.getElementById('stat').className = 'run';
  log('ls', `▶ RUN [${active}]`);
  const t0 = performance.now();
  try {
    const ok = await runVM(src, log, getLibSources());
    const ms = (performance.now()-t0).toFixed(1);
    document.getElementById('stat').className = ok ? 'ok' : 'err';
    if (ok) log('lo', `✓ ${ms}ms`);
  } catch(e) {
    log('le', e.message);
    document.getElementById('stat').className = 'err';
  }
}

// ══ SAVE ══════════════════════════════════════════════
function save() {
  // Step1: 全パネルの現在内容をストレージに書き戻す
  for (const [name, {getContent}] of panels) {
    setTabContent(name, getContent());
  }
  // Step2: バージョンインクリメント
  const m = document.querySelector('meta[name="sapphire-version"]');
  const v = 'v' + ((parseInt((m?.getAttribute('content')||'v12').replace('v',''))||12) + 1);
  m?.setAttribute('content', v);
  document.title = `Sapphire IDE ${v}`;
  document.getElementById('vbadge').textContent = v;
  // Step3: 動的生成したDOM要素をouterHTMLに含めないよう一時的に空にする
  const wrap   = document.getElementById('editor-wrap');
  const tabBar = document.getElementById('tab-bar');
  const logEl  = document.getElementById('log');
  const wSaved = wrap.innerHTML;
  const tSaved = tabBar.innerHTML;
  const lSaved = logEl.innerHTML;
  wrap.innerHTML   = '';
  tabBar.innerHTML = '';
  logEl.innerHTML  = '';
  const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
  wrap.innerHTML   = wSaved;   // 復元
  tabBar.innerHTML = tSaved;
  logEl.innerHTML  = lSaved;
  // Step4: BlobURL → ダウンロード
  const url = URL.createObjectURL(new Blob([html],{type:'text/html'}));
  const a   = document.createElement('a');
  a.href = url; a.download = `sapphire_ide_${v}.html`; a.click();
  setTimeout(() => URL.revokeObjectURL(url), 9000);
  log('lo', `↓ sapphire_ide_${v}.html`);
  document.getElementById('stat').className = 'ok';
}

// ══ Utils ═════════════════════════════════════════════
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ══ Init ══════════════════════════════════════════════
(()=>{
  document.getElementById('btn-run').onclick   = run;
  document.getElementById('btn-save').onclick  = save;
  document.getElementById('btn-add').onclick   = openModal;
  document.getElementById('mok').onclick       = confirmAdd;
  document.getElementById('mcancel').onclick   = closeModal;
  document.getElementById('btn-clr').onclick   = () => document.getElementById('log').innerHTML = '';
  document.getElementById('modal-bg').addEventListener('keydown', e => {
    if (e.key === 'Escape') closeModal();
    if (e.key === 'Enter')  confirmAdd();
  });
  document.addEventListener('keydown', e => {
    if ((e.ctrlKey||e.metaKey) && e.key === 'Enter') { e.preventDefault(); run(); }
    if ((e.ctrlKey||e.metaKey) && e.key === 's')     { e.preventDefault(); save(); }
  });

  const ver  = document.querySelector('meta[name="sapphire-version"]')?.getAttribute('content') || 'v12';
  document.getElementById('vbadge').textContent = ver;

  // タブバー描画 → 最初のタブをアクティブ化（パネルも生成される）
  const tabs = getAllTabEls();
  renderTabBar();
  if (tabs.length) activateTab(tabs[0].dataset.tabName);

  log('ls', `◆ Sapphire IDE ${ver}`);
  log('li', `tabs: ${tabs.map(e=>e.dataset.tabName+'('+e.dataset.tabType+')').join(', ')}`);
  log('li', 'Ctrl+Enter: RUN  |  Ctrl+S: SAVE');
})();
</script>
