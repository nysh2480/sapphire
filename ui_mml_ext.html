<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="sph-ext" content="ui_mml">
  <meta name="sph-version" content="3.2">
  <title>UI GENERATOR EXT</title>
</head>
<body>

<!-- 
  UI_MML EXT v3.2
  [B] Base: UI AST to HTML Compiler & Component Engine
  [A] Action: Dynamic GUI Rendering & Interaction Hub
-->

<script type="sph/meta" data-ext-id="ui_mml">
{
  "cat": "B",
  "version": "3.2",
  "label": "UI GENERATOR",
  "icon": "🎨",
  "consumes": ["media_core", "media_definition"],
  "produces": ["ui_dom", "interaction_event"],
  "signals": [
    "ui:rebuilt",
    "ui:interaction",
    "ui:preset_registered",
    "ui:tab_changed",
    "ui:error"
  ],
  "permissions": ["dom"]
}
</script>

<script type="sph/doc" data-ext-id="ui_mml">
{
  "title": "UI_MML v3.2 Specification",
  "description": "A declarative UI language for AI to build GUIs. It maps MML @UI blocks to interactive Sapphire components.",
  "syntax": {
    "block": "@UI id { label: string, layout: 'v'|'h', elements: [...] }",
    "types": {
      "slider": "Numeric control. params: min, max, step, unit",
      "button": "Action trigger. params: action, variant('ok'|'err'|'acc')",
      "toggle": "Boolean switch (0/1).",
      "select": "Dropdown menu. params: options(array)",
      "group":  "Nested container. params: label, layout, elements",
      "tabs":   "Tabbed navigation. params: items(array of {label, elements})",
      "repeater": "Dynamic list based on data. params: source, template",
      "point_canvas": "Graph editor for ADSR/Filters.",
      "grid_canvas": "Grid editor for Piano Rolls/Sequencers.",
      "color": "Color picker. target: hex string"
    }
  },
  "ai_prompt": "Design a @UI block. Use 'tabs' to organize complex settings. Use 'grid_canvas' for time-based sequencing. Target format: 'waves.@id.param'."
}
</script>

<script type="sph/sec" id="ui-mml-guide">
<style>
  .ui-guide { font-family: var(--sph-font); font-size: 11px; padding: 12px; line-height: 1.6; background: var(--sph-surface); border-radius: 6px; }
  .ui-tag { color: var(--sph-accent); font-weight: bold; background: var(--sph-bg); padding: 1px 4px; border-radius: 3px; }
  .ui-sample { border: 1px dashed var(--sph-border); padding: 10px; margin: 10px 0; background: var(--sph-bg); color: var(--sph-dim); }
</style>
<div class="ui-guide">
  <div class="sph-label" style="color:var(--sph-accent); margin-bottom:8px;">◆ UI_MML v3.2 COMPONENT GUIDE</div>
  <p>New in v3.2:</p>
  <ul>
    <li><span class="ui-tag">tabs</span>: Create multi-page interfaces.</li>
    <li><span class="ui-tag">grid_canvas</span>: Interactive sequencing grid.</li>
    <li><span class="ui-tag">repeater</span>: Auto-generate UI from data arrays.</li>
  </ul>
  <div class="ui-sample">
    @UI my_app { <br>
    &nbsp;&nbsp;tabs: [<br>
    &nbsp;&nbsp;&nbsp;&nbsp;{ label: "Osc", elements: [...] },<br>
    &nbsp;&nbsp;&nbsp;&nbsp;{ label: "FX", elements: [...] }<br>
    &nbsp;&nbsp;]<br>
    }
  </div>
</div>
</script>

<script type="sph/ext" data-ext-id="ui_mml">
(function(){
  'use strict';

  const _presets = new Map();

  // ── B: Compiler & Renderer ──
  const Compiler = {
    element: (el) => {
      const id = `ui-${Math.random().toString(36).slice(2, 9)}`;
      const target = el.target || '';
      
      switch(el.type) {
        case 'slider':
          return sph.ui.row(el.name, 
            sph.ui.slider(id, el.min || 0, el.max || 1, el.val || el.min || 0, '')
            .replace('oninput="', `oninput="sph.call('ui_mml.handle_input', ['${target}', +this.value]); `)
          );

        case 'button':
          return `<div style="margin: 2px 0;">${sph.ui.btn(el.name, `sph.call('${el.action || 'ide.log'}')`, el.variant || 'acc')}</div>`;

        case 'toggle':
          return sph.ui.row(el.name, `
            <input type="checkbox" class="sph-input" style="width:16px; height:16px; accent-color:var(--sph-ok);" 
              onchange="sph.call('ui_mml.handle_input', ['${target}', this.checked ? 1 : 0])">
          `);

        case 'select':
          const opts = (el.options || []).map(o => `<option value="${o}">${o}</option>`).join('');
          return sph.ui.row(el.name, `
            <select class="sph-input" style="flex:1" onchange="sph.call('ui_mml.handle_input', ['${target}', this.value])">
              ${opts}
            </select>
          `);

        case 'color':
          return sph.ui.row(el.name, `
            <input type="color" class="sph-input" style="width:100%; height:24px; padding:1px;" 
              oninput="sph.call('ui_mml.handle_input', ['${target}', this.value])">
          `);

        case 'group':
          const gLayout = el.layout === 'h' ? 'display:flex; gap:8px; align-items:flex-end;' : '';
          const gChildren = (el.elements || []).map(child => Compiler.element(child)).join('');
          return `
            <div style="margin-top:8px; padding:8px; border:1px solid var(--sph-border)55; border-radius:4px;">
              ${el.label ? `<div class="sph-label" style="font-size:8px; margin-bottom:4px; opacity:0.6;">${el.label}</div>` : ''}
              <div style="${gLayout}">${gChildren}</div>
            </div>`;

        case 'tabs':
          const tabId = `tabs-${id}`;
          const buttons = (el.items || []).map((item, i) => 
            `<button class="sph-btn" style="flex:1; font-size:9px;" onclick="ui_mml_switch_tab('${tabId}', ${i})">${item.label}</button>`
          ).join('');
          const contents = (el.items || []).map((item, i) => 
            `<div class="${tabId}-content" style="display:${i===0?'block':'none'}; margin-top:8px;">
              ${(item.elements || []).map(child => Compiler.element(child)).join('')}
            </div>`
          ).join('');
          return `
            <div id="${tabId}" style="margin-top:10px;">
              <div style="display:flex; gap:2px; border-bottom:1px solid var(--sph-border); padding-bottom:4px;">${buttons}</div>
              ${contents}
            </div>
            <script>
              window.ui_mml_switch_tab = (parentId, index) => {
                const contents = document.querySelectorAll('.' + parentId + '-content');
                contents.forEach((c, i) => c.style.display = i === index ? 'block' : 'none');
                sph.emit('ui:tab_changed', { parentId, index });
              };
            <\/script>`;

        case 'point_canvas':
          const pcInit = `setTimeout(() => {
            const c = document.getElementById('${id}'); if(!c) return;
            const ctx = c.getContext('2d');
            let pts = ${JSON.stringify(el.points || [])}, drag = null;
            const draw = () => {
              ctx.fillStyle = '#0d1520'; ctx.fillRect(0,0,c.width,c.height);
              ctx.strokeStyle = 'var(--sph-accent)'; ctx.lineWidth = 2; ctx.beginPath();
              pts.forEach((p, i) => i === 0 ? ctx.moveTo(p.x*c.width, (1-p.y)*c.height) : ctx.lineTo(p.x*c.width, (1-p.y)*c.height));
              ctx.stroke();
              pts.forEach(p => { ctx.fillStyle = 'var(--sph-accent)'; ctx.beginPath(); ctx.arc(p.x*c.width, (1-p.y)*c.height, 4, 0, Math.PI*2); ctx.fill(); });
            };
            c.onmousedown = (e) => {
              const r = c.getBoundingClientRect(); const mx = (e.clientX - r.left) / r.width; const my = 1 - (e.clientY - r.top) / r.height;
              drag = pts.find(p => Math.abs(p.x - mx) < 0.05 && Math.abs(p.y - my) < 0.05);
            };
            window.addEventListener('mousemove', (e) => {
              if(!drag) return; const r = c.getBoundingClientRect();
              if(drag.axis !== 'y') drag.x = Math.max(0, Math.min(1, (e.clientX - r.left) / r.width));
              if(drag.axis !== 'x') drag.y = Math.max(0, Math.min(1, 1 - (e.clientY - r.top) / r.height));
              draw(); sph.call('ui_mml.handle_input', ['${target}', pts]);
            });
            window.addEventListener('mouseup', () => drag = null); draw();
          }, 50);`;
          return `<div class="sph-section"><div class="sph-label">${el.name}</div>
                  <canvas id="${id}" width="300" height="80" style="width:100%; background:#000; cursor:crosshair;"></canvas>
                  <script>${pcInit}<\/script></div>`;

        case 'grid_canvas':
          const gcConfig = el.config || { steps: 16, min: 24, max: 84 };
          const gcInit = `setTimeout(() => {
            const c = document.getElementById('${id}'); if(!c) return;
            const ctx = c.getContext('2d');
            const steps = ${gcConfig.steps}, rows = ${gcConfig.max - gcConfig.min + 1};
            const draw = () => {
              ctx.fillStyle = '#06090f'; ctx.fillRect(0,0,c.width,c.height);
              ctx.strokeStyle = 'var(--sph-border)'; ctx.lineWidth = 0.5;
              for(let i=0; i<=steps; i++) { ctx.beginPath(); ctx.moveTo(i*(c.width/steps), 0); ctx.lineTo(i*(c.width/steps), c.height); ctx.stroke(); }
              for(let i=0; i<=rows; i++) { ctx.beginPath(); ctx.moveTo(0, i*(c.height/rows)); ctx.lineTo(c.width, i*(c.height/rows)); ctx.stroke(); }
            };
            c.onclick = (e) => {
              const r = c.getBoundingClientRect();
              const x = Math.floor((e.clientX - r.left) / (r.width / steps));
              const y = Math.floor((e.clientY - r.top) / (r.height / rows));
              sph.call('ui_mml.handle_input', ['${target}', { x, y: ${gcConfig.max} - y, action: 'toggle' }]);
              ctx.fillStyle = 'var(--sph-accent)';
              ctx.fillRect(x*(c.width/steps)+1, y*(c.height/rows)+1, (c.width/steps)-2, (c.height/rows)-2);
            };
            draw();
          }, 50);`;
          return `<div class="sph-section"><div class="sph-label">${el.name}</div>
                  <canvas id="${id}" width="600" height="150" style="width:100%; background:#000; cursor:pointer;"></canvas>
                  <script>${gcInit}<\/script></div>`;

        default:
          return `<div class="sph-meta">? Unknown: ${el.type}</div>`;
      }
    },

    build: (uiDefs) => {
      if (!uiDefs || !uiDefs.length) return '';
      return uiDefs.map(def => {
        const layout = def.layout === 'h' ? 'display:flex; gap:12px; flex-wrap:wrap;' : 'display:flex; flex-direction:column; gap:4px;';
        const content = (def.elements || []).map(el => Compiler.element(el)).join('');
        return `
          <div class="sph-section" id="ui-block-${def.id}" style="margin-bottom:12px;">
            <div class="sph-ph" style="margin-bottom:10px; border-bottom: 1px solid var(--sph-border)aa;">
              <span class="sph-label" style="color:var(--sph-accent); letter-spacing:1px;">◆ ${def.label || def.id}</span>
            </div>
            <div style="${layout}">${content}</div>
          </div>
        `;
      }).join('');
    }
  };

  // ── API: Control Layer ──
  sph.mount('ui_mml', 'UI GEN', '🎨', {
    panel: () => document.getElementById('ui-mml-guide').innerHTML,
    
    api: {
      build: (uiDefs) => {
        try {
          const html = Compiler.build(uiDefs);
          sph.emit('ui:rebuilt', { count: uiDefs.length });
          return html;
        } catch (e) {
          sph.emit('ui:error', { message: e.message });
          return `<div class="le">UI Build Error: ${e.message}</div>`;
        }
      },

      register_preset: (id, def) => {
        _presets.set(id, def);
        sph.emit('ui:preset_registered', { id });
      },

      instantiate: (presetId, targetId) => {
        const template = _presets.get(presetId);
        if (!template) return '';
        const instance = JSON.parse(JSON.stringify(template).replace(/\$TARGET/g, targetId));
        return Compiler.build([instance]);
      },

      handle_input: (targetPath, value) => {
        sph.call('media_core.update_param', [targetPath, value]);
        sph.emit('ui:interaction', { target: targetPath, value: value });
      },

      get_prompt: () => {
        const doc = sph.get('ui_mml.commands').find(c => c.name === 'ui_mml.get_prompt');
        return doc ? doc.desc : "Create @UI blocks to control parameters.";
      }
    },

    on: {
      'ide-ready': () => {
        sph.call('abcd.register', ['ui_mml', 'B']);
      }
    }
  });
})();
</script>

<!-- 
  UI_MML DSL Library v3.2
  High-level orchestration for dynamic GUIs.
-->
<script type="sph/lib" data-tab-name="ui_mml_lib">
; lib ui_mml_lib
; Advanced UI orchestration for Sapphire DSL.

; --- Add a UI block from a preset ---
!ui.add_preset [$_preset_id, $_target_id]
  $html = ui_mml.instantiate $_preset_id $_target_id
  media_studio.mount_gui $html
  RET 1

; --- Show a temporary notification ---
!ui.toast [$_msg, $_variant]
  sys.print "[UI:" $_variant "] " $_msg
  RET 1

; --- Clear the dynamic GUI area ---
!ui.clear
  media_studio.clear_gui
  RET 1
</script>

</body>
</html>
